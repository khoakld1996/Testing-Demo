<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula - Thiết Kế & Đồng Bộ Câu Hỏi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --primary: #448aff; --secondary: #00e676; --accent: #7c4dff;
      --glass: rgba(10, 15, 28, 0.9); --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                  url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center;
      background-size: cover; background-attachment: fixed; color: var(--text);
      display: flex; justify-content: center; padding: 40px 20px;
    }
    .container { width: 100%; max-width: 950px; }
    .glass-panel {
      background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border);
      border-radius: 30px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }
    .nav-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
    }
    .btn-nav {
      width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-nav:hover { background: var(--primary); transform: translateY(-2px); }
    h2 { 
      font-size: 1.6rem; text-align: center; margin-bottom: 25px; letter-spacing: 2px;
      background: linear-gradient(to right, #90caf9, #00e5ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;
    }
    .setup-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px; background: rgba(68, 138, 255, 0.1); border: 1px solid rgba(68, 138, 255, 0.2);
      padding: 20px; border-radius: 20px; margin-bottom: 25px;
    }
    .form-group { margin-bottom: 25px; }
    label { display: block; margin-bottom: 10px; font-size: 0.75rem; color: #90caf9; text-transform: uppercase; font-weight: 700; }
    .input-control {
      width: 100%; padding: 15px 20px; border-radius: 16px; border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.4); color: white; outline: none; transition: 0.3s;
    }
    .ans-row {
      display: flex; gap: 12px; align-items: center; margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.04); padding: 12px; border-radius: 16px;
    }
    .btn-add {
      background: rgba(68, 138, 255, 0.1); color: var(--primary); padding: 8px 15px;
      border-radius: 10px; border: 1px dashed var(--primary); cursor: pointer; font-weight: 700;
    }
    .btn-save {
      width: 100%; padding: 20px; border-radius: 20px; border: none; margin-top: 30px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; font-weight: 800; cursor: pointer; transition: 0.4s;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .preview-box {
      width: 80px; height: 80px; border-radius: 12px; border: 2px solid var(--primary);
      overflow: hidden; display: none; position: relative; flex-shrink: 0;
    }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; }
    .badge-info { font-size: 0.75rem; color: #00e676; margin-top: 8px; display: block; }
  </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
  <div class="glass-panel">
    <div class="nav-header">
      <button class="btn-nav" onclick="location.href='question-list.html'"><i class="fas fa-arrow-left"></i></button>
      <div id="testInfo" style="font-weight: 800; color: #90caf9; font-size: 0.9rem;">BÀI THI: ĐANG TẢI...</div>
      <button class="btn-nav" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i></button>
    </div>

    <h2 id="pageTitle"><i class="fas fa-sync-alt"></i> THIẾT KẾ & ĐỒNG BỘ</h2>

    <div class="setup-grid">
      <div>
        <label><i class="fas fa-clock"></i> Thời gian toàn bài (Phút)</label>
        <input type="number" id="testTime" class="input-control" value="15" min="1">
      </div>
      <div>
        <label><i class="fas fa-star"></i> Chế độ điểm</label>
        <select id="scoreMode" class="input-control" onchange="toggleScoreUI()">
          <option value="equal">Chia đều tổng điểm</option>
          <option value="custom">Tùy chỉnh từng câu</option>
        </select>
      </div>
      <div id="boxTotalScore">
        <label><i class="fas fa-bullseye"></i> Tổng điểm bài thi</label>
        <input type="number" id="totalScore" class="input-control" value="10" min="1" oninput="calculatePreviewPoints()">
        <span id="scorePreview" class="badge-info">Đang tính toán...</span>
      </div>
      <div id="boxPoint" style="display: none;">
        <label><i class="fas fa-check-double"></i> Điểm câu này</label>
        <input type="number" id="qPoint" class="input-control" value="1" step="0.1" min="0">
      </div>
    </div>
    
    <div class="form-group">
      <label>Nội dung câu hỏi</label>
      <textarea id="qText" class="input-control" rows="3" placeholder="Nhập câu hỏi..."></textarea>
    </div>

    <div class="form-group">
      <label>Hình ảnh minh họa</label>
      <div style="display:flex; gap:15px; align-items: center; background: rgba(255,255,255,0.03); padding:15px; border-radius:18px;">
        <div id="qPrevBox" class="preview-box">
          <img id="qPrevImg" src="">
          <button style="position:absolute; top:0; right:0; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer" onclick="clearMedia()">×</button>
        </div>
        <input type="text" id="qUrl" class="input-control" style="flex:1" placeholder="Link ảnh HTTPS..." oninput="handleLinkInput(this.value)">
        <label class="btn-nav"><i class="fas fa-upload"></i><input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)"></label>
        <input type="hidden" id="qData">
      </div>
    </div>

    <div class="form-group">
      <label>Dạng câu hỏi</label>
      <select id="qType" class="input-control" onchange="renderEditor()">
        <option value="single">Trắc nghiệm (1 đáp án)</option>
        <option value="multiple">Trắc nghiệm (Nhiều đáp án)</option>
        <option value="tf">Đúng / Sai</option>
        <option value="matching">Ghép nối vế</option>
        <option value="ordering">Sắp xếp thứ tự</option>
        <option value="fill">Điền khuyết</option>
      </select>
    </div>

    <div id="answerArea">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <label style="margin:0;">Cấu hình đáp án</label>
        <button id="addBtn" class="btn-add" onclick="addRow()">+ Thêm dòng</button>
      </div>
      <div id="ansList"></div>
    </div>

    <button id="saveBtn" class="btn-save" onclick="saveData()">LƯU & ĐỒNG BỘ TOÀN BÀI</button>
  </div>
</div>

<script>
// --- PHẦN CẤU HÌNH ---
const API_URL = "https://script.google.com/macros/s/AKfycbyf4LJfPW0pXSpegPOg03WxmtaebP6WnTwo3If2tLPr8NltxPyqd5LgtCtHgnq8Pxi4/exec"; // Sẽ thay sau khi gửi Code.gs
let isEditMode = false;
let originalQuestionText = ""; 
let currentQuestionCount = 0;

window.onload = async () => {
    const testData = JSON.parse(localStorage.getItem("currentTest"));
    if (!testData) return location.href = 'dashboard.html';
    
    document.getElementById("testInfo").innerText = "BÀI THI: " + testData.name.toUpperCase();
    
    // Kiểm tra xem là Sửa hay Thêm mới
    const editDataString = localStorage.getItem("editQuestionData");
    if (editDataString && editDataString !== "null") {
        isEditMode = true;
        const editData = JSON.parse(editDataString);
        originalQuestionText = editData.question;
        document.getElementById("pageTitle").innerHTML = '<i class="fas fa-edit"></i> CHỈNH SỬA CÂU HỎI';
        fillEditData(editData);
    } else {
        renderEditor();
    }

    // Lấy số câu hiện có để tính điểm
    await fetchQuestionStats(testData.id);
};

async function fetchQuestionStats(testId) {
    try {
        const resp = await fetch(`${API_URL}?action=getQuestions&testId=${testId}`);
        const data = await resp.json();
        currentQuestionCount = Array.isArray(data) ? data.filter(q => q.question.trim() !== "").length : 0;
        
        if(currentQuestionCount > 0) {
            const sample = data[0];
            document.getElementById("testTime").value = sample.testTime || 15;
            document.getElementById("scoreMode").value = sample.scoreMode || "equal";
            document.getElementById("totalScore").value = sample.totalScore || 10;
            toggleScoreUI();
        }
        calculatePreviewPoints();
    } catch (e) { console.error("Lỗi tải thông số:", e); }
}

function calculatePreviewPoints() {
    const total = parseFloat(document.getElementById("totalScore").value) || 0;
    // Nếu đang SỬA, số câu giữ nguyên. Nếu THÊM MỚI, số câu = hiện tại + 1
    let totalInFuture = isEditMode ? currentQuestionCount : (currentQuestionCount + 1);
    if (totalInFuture <= 0) totalInFuture = 1;

    const perQ = (total / totalInFuture).toFixed(2);
    const label = isEditMode ? "Số câu hiện tại" : "Số câu sau khi thêm";
    
    document.getElementById("scorePreview").innerHTML = 
        `<i class="fas fa-info-circle"></i> ${label}: <b>${totalInFuture}</b>. Dự kiến: ~ <b>${perQ}</b> điểm/câu.`;
}

function toggleScoreUI() {
    const mode = document.getElementById("scoreMode").value;
    document.getElementById("boxTotalScore").style.display = (mode === "equal") ? "block" : "none";
    document.getElementById("boxPoint").style.display = (mode === "custom") ? "block" : "none";
}

function renderEditor() {
    if (isEditMode) return;
    const type = document.getElementById("qType").value;
    const list = document.getElementById("ansList");
    list.innerHTML = "";
    document.getElementById("addBtn").style.display = (["tf", "fill"].includes(type)) ? "none" : "block";
    
    if (type === "tf") {
        list.innerHTML = `<div class="ans-row"><select id="tfCorrect" class="input-control"><option value="Đúng">ĐÚNG</option><option value="Sai">SAI</option></select></div>`;
    } else if (type === "fill") {
        list.innerHTML = `<input type="text" id="fillAns" class="input-control" placeholder="Đáp án đúng...">`;
    } else {
        addRow(); addRow();
    }
}

function addRow(data = null) {
    const type = document.getElementById("qType").value;
    const list = document.getElementById("ansList");
    const div = document.createElement("div");
    div.className = "ans-row animate__animated animate__fadeInUp";
    
    if (type === "single" || type === "multiple") {
        const inputType = (type === "single") ? "radio" : "checkbox";
        div.innerHTML = `
            <input type="${inputType}" name="ansMark" class="is-correct" ${data?.isCorrect ? 'checked' : ''}>
            <input type="text" class="ans-text input-control" placeholder="Đáp án..." value="${data?.text || ''}">
            <i class="fas fa-trash-alt" style="color:#ff5252; cursor:pointer;" onclick="this.parentElement.remove()"></i>`;
    } else if (type === "matching") {
        div.innerHTML = `
            <input type="text" class="l-val input-control" placeholder="Vế Trái" value="${data?.left || ''}">
            <input type="text" class="r-val input-control" placeholder="Vế Phải" value="${data?.right || ''}">
            <i class="fas fa-trash-alt" style="color:#ff5252; cursor:pointer;" onclick="this.parentElement.remove()"></i>`;
    } else if (type === "ordering") {
        div.innerHTML = `
            <input type="text" class="ord-val input-control" placeholder="Thứ tự..." value="${data?.text || ''}">
            <i class="fas fa-trash-alt" style="color:#ff5252; cursor:pointer;" onclick="this.parentElement.remove()"></i>`;
    }
    list.appendChild(div);
}

function fillEditData(data) {
    document.getElementById("qText").value = data.question || "";
    document.getElementById("qType").value = data.type || "single";
    if(data.image) updatePreview(data.image);
    
    const list = document.getElementById("ansList");
    list.innerHTML = "";
    const ansObj = typeof data.answer === 'string' ? JSON.parse(data.answer) : data.answer;

    if (data.type === "tf") {
        list.innerHTML = `<div class="ans-row"><select id="tfCorrect" class="input-control"><option value="Đúng">ĐÚNG</option><option value="Sai">SAI</option></select></div>`;
        document.getElementById("tfCorrect").value = ansObj.correct || "Đúng";
    } else if (data.type === "fill") {
        list.innerHTML = `<input type="text" id="fillAns" class="input-control" placeholder="Đáp án đúng..." value="${ansObj.correct || ''}">`;
    } else if (ansObj.items) {
        ansObj.items.forEach(it => addRow(it));
    }
}

async function saveData() {
    const btn = document.getElementById("saveBtn");
    const testData = JSON.parse(localStorage.getItem("currentTest"));
    const question = document.getElementById("qText").value.trim();
    if (!question) return Swal.fire("Lỗi", "Nhập câu hỏi!", "error");

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG ĐỒNG BỘ...';

    const type = document.getElementById("qType").value;
    let payloadAnswers = { items: [] };

    if (type === "tf") payloadAnswers.correct = document.getElementById("tfCorrect").value;
    else if (type === "fill") payloadAnswers.correct = document.getElementById("fillAns").value;
    else {
        document.querySelectorAll(".ans-row").forEach(row => {
            if (type === "single" || type === "multiple") 
                payloadAnswers.items.push({ text: row.querySelector(".ans-text").value, isCorrect: row.querySelector(".is-correct").checked });
            else if (type === "matching") 
                payloadAnswers.items.push({ left: row.querySelector(".l-val").value, right: row.querySelector(".r-val").value });
            else if (type === "ordering") 
                payloadAnswers.items.push({ text: row.querySelector(".ord-val").value });
        });
    }

    const finalData = {
        action: "saveQuestion",
        testId: testData.id,
        testTime: document.getElementById("testTime").value,
        scoreMode: document.getElementById("scoreMode").value,
        totalScore: document.getElementById("totalScore").value,
        points: document.getElementById("qPoint").value,
        type: type,
        question: question,
        oldQuestion: isEditMode ? originalQuestionText : "",
        image: document.getElementById("qData").value || document.getElementById("qUrl").value,
        answer: JSON.stringify(payloadAnswers)
    };

    try {
        await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(finalData) });
        Swal.fire({ icon: 'success', title: 'ĐÃ ĐỒNG BỘ', timer: 1200, showConfirmButton: false });
        localStorage.removeItem("editQuestionData");
        setTimeout(() => location.href = 'question-list.html', 1300);
    } catch (err) {
        Swal.fire("Lỗi", "Lỗi kết nối!", "error");
        btn.disabled = false;
        btn.innerText = "LƯU & ĐỒNG BỘ TOÀN BÀI";
    }
}

// Media Helpers
function handleFile(input) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => updatePreview(e.target.result);
        reader.readAsDataURL(file);
    }
}
function handleLinkInput(val) { if(val.length > 10) updatePreview(val); }
function updatePreview(src) {
    document.getElementById('qPrevBox').style.display = 'block';
    document.getElementById('qPrevImg').src = src;
    document.getElementById('qData').value = src;
}
function clearMedia() {
    document.getElementById('qPrevBox').style.display = 'none';
    document.getElementById('qData').value = '';
}
</script>
</body>
</html>

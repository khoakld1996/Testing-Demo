<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Nebula — Thiết Kế Câu Hỏi</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
</head>
<body class="aq-body">

<div class="container" style="width:100%;max-width:960px">
<div class="glass-panel">

  <!-- NAV HEADER -->
  <div class="nav-header-aq">
    <button class="btn-nav" title="Danh sách câu hỏi" onclick="location.href='question-list.html'">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div id="testInfo" style="font-size:.78rem;font-weight:700;color:var(--text2)">BÀI THI: ĐANG TẢI...</div>
    <button class="btn-nav" title="Trang quản trị" onclick="location.href='dashboard.html'">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
  </div>

  <!-- TITLE -->
  <h2 class="aq-title" id="pageTitle">
    <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:var(--primary);flex-shrink:0">
      <path d="M14 6l-1-2H5v17h2v-7h5l1 2h7V6h-6zm4 8h-4l-1-2H7V6h5l1 2h5v6z"/>
    </svg>
    THIẾT KẾ CÂU HỎI NEBULA
  </h2>

  <!-- CÀI ĐẶT -->
  <div class="setup-grid">
    <div>
      <label class="form-group-aq" style="display:block">
        <span style="font-size:.72rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:6px">
          <svg style="width:13px;height:13px;fill:#90caf9" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
          Thời gian (Phút)
        </span>
        <input type="number" id="testTime" class="input-control" value="45" style="margin-top:8px">
      </label>
    </div>
    <div>
      <label class="form-group-aq" style="display:block">
        <span style="font-size:.72rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px">Cách tính điểm</span>
        <select id="scoreMode" class="input-control" onchange="toggleScoreUI();calculatePreviewPoints()" style="margin-top:8px">
          <option value="equal">Chia đều tổng điểm</option>
          <option value="custom">Tùy chỉnh điểm riêng</option>
        </select>
      </label>
    </div>
    <div id="boxTotalScore">
      <label class="form-group-aq" style="display:block">
        <span style="font-size:.72rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px">Tổng điểm bài thi</span>
        <input type="number" id="totalScore" class="input-control" value="10" oninput="calculatePreviewPoints()" style="margin-top:8px">
        <span id="scorePreview" class="badge-info"></span>
      </label>
    </div>
    <div id="boxPoint" style="display:none">
      <label class="form-group-aq" style="display:block">
        <span style="font-size:.72rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px">Điểm cho câu này</span>
        <input type="number" id="qPoint" class="input-control" value="1" step="0.1" style="margin-top:8px">
      </label>
    </div>
  </div>

  <!-- NỘI DUNG CÂU HỎI -->
  <div class="form-group-aq">
    <label>
      <svg style="width:13px;height:13px;fill:#90caf9" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      Nội dung câu hỏi <span style="color:var(--danger)">*</span>
    </label>
    <textarea id="qText" class="input-control" rows="3" placeholder="Nhập câu hỏi tại đây..."></textarea>
  </div>

  <!-- ẢNH -->
  <div class="form-group-aq">
    <label>
      <svg style="width:13px;height:13px;fill:#90caf9" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      Ảnh minh họa (tùy chọn)
    </label>
    <div style="display:flex;gap:14px;align-items:center;background:rgba(255,255,255,.03);padding:14px;border-radius:14px;border:1px dashed var(--border2)">
      <div id="qPrevBox" class="preview-box">
        <img id="qPrevImg" src="" alt="preview">
        <button class="btn-clear-img" onclick="clearMedia()" title="Xóa">×</button>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px">
        <input type="text" id="qUrl" class="input-control" placeholder="Dán link ảnh (https://...)" oninput="handleLinkInput(this.value)">
        <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;background:rgba(79,172,254,.1);color:var(--primary);padding:9px 16px;border-radius:10px;border:1px dashed rgba(79,172,254,.4);width:fit-content;font-size:.8rem;font-weight:700">
          <svg style="width:14px;height:14px;fill:currentColor" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
          Tải ảnh lên
          <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">
        </label>
      </div>
      <input type="hidden" id="qData">
    </div>
  </div>

  <!-- LOẠI CÂU HỎI -->
  <div class="form-group-aq">
    <label>
      <svg style="width:13px;height:13px;fill:#90caf9" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      Dạng câu hỏi
    </label>
    <select id="qType" class="input-control" onchange="renderEditor();showTypeHint()">
      <optgroup label="── Trắc nghiệm ──">
        <option value="single">📌 Một đáp án đúng (Radio)</option>
        <option value="multiple">☑️ Nhiều đáp án đúng (Checkbox)</option>
        <option value="tf">✅ Đúng / Sai</option>
        <option value="image_choice">🖼 Chọn hình ảnh</option>
      </optgroup>
      <optgroup label="── Tương tác ──">
        <option value="matching">🔗 Ghép cặp</option>
        <option value="ordering">🔢 Sắp xếp thứ tự</option>
        <option value="scale">⭐ Thang điểm đánh giá</option>
      </optgroup>
      <optgroup label="── Điền chữ ──">
        <option value="fill">✏️ Điền khuyết tự do</option>
        <option value="fill_bank">🗂 Điền khuyết có gợi ý (Word Bank)</option>
        <option value="numeric">🔢 Điền số</option>
      </optgroup>
    </select>
  </div>

  <!-- TYPE HINT -->
  <div id="typeHint" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg>
    <span id="typeHintText"></span>
  </div>

  <!-- KHU VỰC ĐÁP ÁN -->
  <div id="answerArea">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <label id="ansLabel" style="margin:0;font-size:.72rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:6px">
        <svg style="width:13px;height:13px;fill:#90caf9" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        Thiết lập đáp án
      </label>
      <button id="addBtn" class="btn-add-ans" onclick="addAnsRow()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Thêm phương án
      </button>
    </div>
    <div id="ansList"></div>
  </div>

  <!-- KẾT QUẢ CHẤM ĐIỂM -->
  <div class="correct-area">
    <label>
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      Mã chấm điểm (tự động)
    </label>
    <input type="text" id="finalCorrect" class="input-control" readonly
      style="border-color:var(--accent);color:var(--accent);font-weight:700;background:rgba(0,230,118,.04);margin-top:8px"
      placeholder="Hệ thống tự tạo sau khi thiết lập đáp án...">
    <span class="badge-info" id="correctHint"></span>
  </div>

  <!-- NÚT LƯU -->
  <button id="saveBtn" class="btn-save-aq" onclick="saveData()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor">
      <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
    </svg>
    ĐỒNG BỘ LÊN CLOUD HỆ THỐNG
  </button>

</div>
</div>

<script src="script.js" defer></script>
<script>
window.onload = async function(){
  if(typeof nbAddQuestionInit === 'function') nbAddQuestionInit();

  const testData = nb.json('currentTest', null);
  if(!testData){ location.href = 'dashboard.html'; return; }
  document.getElementById('testInfo').innerText = 'BÀI THI: ' + testData.name.toUpperCase();

  const editStr = localStorage.getItem('editQuestionData');
  if(editStr && editStr !== 'null'){
    window._aqEditMode = true;
    const editData = JSON.parse(editStr);
    window._aqOriginalQ = editData.question;
    document.getElementById('pageTitle').innerHTML = `
      <svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:var(--primary);flex-shrink:0">
        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
      </svg> CẬP NHẬT CÂU HỎI`;
    if(typeof fillEditData === 'function') fillEditData(editData);
  }

  await fetchQuestionStats(testData.id);
  if(typeof showTypeHint === 'function') showTypeHint();
};

function showTypeHint(){
  const type = document.getElementById('qType').value;
  const hints = {
    single:      'Radio — Học sinh chọn 1 đáp án. Tick radio vào đáp án chính xác.',
    multiple:    'Checkbox — Có thể chọn nhiều đáp án đúng. Tick tất cả đáp án đúng.',
    tf:          'True/False — Học sinh chọn Đúng hoặc Sai.',
    image_choice:'Chọn ảnh — Mỗi phương án có hình ảnh minh họa kèm nhãn.',
    matching:    'Kéo thả — Học sinh ghép vế A với vế B tương ứng.',
    ordering:    'Kéo thả — Học sinh sắp xếp lại thứ tự đúng từ trên xuống.',
    scale:       'Thang đo — Học sinh chọn mức độ từ 1 đến max. Phù hợp khảo sát.',
    fill:        'Tự gõ — Học sinh nhập đáp án tự do. Có thể có nhiều đáp án được chấp nhận (phân cách "|").',
    fill_bank:   'Word Bank — Học sinh chọn từ một ngân hàng từ gợi ý. Hàng đầu tiên là đáp án đúng bắt buộc; các hàng sau là từ mồi nhử hoặc đáp án thay thế.',
    numeric:     'Số học — Học sinh nhập một con số cụ thể.',
  };
  const chints = {
    single:      'Đáp án = text của radio được tick.',
    multiple:    'Đáp án = các text được tick, phân cách "|".',
    tf:          'Đáp án = "Đúng" hoặc "Sai".',
    image_choice:'Đáp án = nhãn text của ảnh được chọn.',
    matching:    'Đáp án = cặp "VếA-VếB" phân cách "|".',
    ordering:    'Đáp án = thứ tự đúng phân cách "|".',
    scale:       'Đáp án = số nguyên trong khoảng 1–max.',
    fill:        'Đáp án = tất cả từ chấp nhận, phân cách "|".',
    fill_bank:   'Đáp án = hàng đầu (đúng) + hàng có tick, phân cách "|". Ngân hàng gồm tất cả hàng.',
    numeric:     'Đáp án = số chính xác.',
  };
  const ansLabels = {
    single:'Các phương án (tick radio = đúng)',
    multiple:'Các phương án (tick checkbox = đúng)',
    matching:'Cặp ghép: Vế A ↔ Vế B',
    ordering:'Các mục (theo đúng thứ tự từ trên xuống)',
    fill:'Đáp án chấp nhận (có thể nhiều)',
    fill_bank:'Ngân hàng từ (hàng 1 = đáp án chính)',
    tf:'',scale:'',numeric:'',image_choice:'Phương án có hình ảnh',
  };
  const he=document.getElementById('typeHint'),ht=document.getElementById('typeHintText');
  if(he&&ht){
    if(hints[type]){he.style.display='flex';ht.textContent=hints[type];}
    else he.style.display='none';
  }
  const lbl=document.getElementById('ansLabel');
  if(lbl){
    const t=ansLabels[type]||'Thiết lập đáp án';
    lbl.innerHTML=`<svg style="width:13px;height:13px;fill:#90caf9" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg> ${t}`;
  }
  const ch=document.getElementById('correctHint');
  if(ch)ch.textContent=chints[type]||'';
}
</script>
</body>
</html>

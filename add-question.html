<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Nebula - Thiết Kế Câu Hỏi</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
</head>
<body class="aq-body">

<div class="container animate__animated animate__fadeIn" style="width:100%;max-width:960px">
  <div class="glass-panel">

    <!-- NAV HEADER -->
    <div class="nav-header-aq">
      <button class="btn-nav" title="Quay lại" onclick="location.href='question-list.html'">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div id="testInfo" style="font-weight:800;color:#90caf9;font-size:.9rem;text-align:center;flex:1;padding:0 12px">
        BÀI THI: ĐANG TẢI...
      </div>
      <button class="btn-nav" title="Trang quản trị" onclick="location.href='dashboard.html'">
        <i class="fas fa-home"></i>
      </button>
    </div>

    <h2 class="aq-title" id="pageTitle">
      <i class="fas fa-atom"></i> THIẾT KẾ CÂU HỎI NEBULA
    </h2>

    <!-- CÀI ĐẶT BÀI THI -->
    <div class="setup-grid">
      <div>
        <label class="form-group-aq" style="display:block">
          <span style="font-size:.75rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px">
            <i class="fas fa-hourglass-half"></i> Thời gian (Phút)
          </span>
          <input type="number" id="testTime" class="input-control" value="15" style="margin-top:8px">
        </label>
      </div>
      <div>
        <label class="form-group-aq" style="display:block">
          <span style="font-size:.75rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px">
            <i class="fas fa-chart-pie"></i> Cách tính điểm
          </span>
          <select id="scoreMode" class="input-control" onchange="toggleScoreUI()" style="margin-top:8px">
            <option value="equal">Chia đều tổng điểm</option>
            <option value="custom">Tùy chỉnh điểm riêng</option>
          </select>
        </label>
      </div>
      <div id="boxTotalScore">
        <label class="form-group-aq" style="display:block">
          <span style="font-size:.75rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px">
            Tổng điểm bài thi
          </span>
          <input type="number" id="totalScore" class="input-control" value="10"
            oninput="calculatePreviewPoints()" style="margin-top:8px">
          <span id="scorePreview" class="badge-info"></span>
        </label>
      </div>
      <div id="boxPoint" style="display:none">
        <label class="form-group-aq" style="display:block">
          <span style="font-size:.75rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px">
            Điểm cho câu này
          </span>
          <input type="number" id="qPoint" class="input-control" value="1" step="0.1" style="margin-top:8px">
        </label>
      </div>
    </div>

    <!-- NỘI DUNG CÂU HỎI -->
    <div class="form-group-aq">
      <label><i class="fas fa-pencil-alt"></i> Nội dung câu hỏi <span style="color:var(--danger)">*</span></label>
      <textarea id="qText" class="input-control" rows="3"
        placeholder="Nhập câu hỏi tại đây..."></textarea>
    </div>

    <!-- ẢNH CÂU HỎI -->
    <div class="form-group-aq">
      <label><i class="fas fa-image"></i> Ảnh minh họa câu hỏi (tùy chọn)</label>
      <div style="display:flex;gap:14px;align-items:center;background:rgba(255,255,255,.03);padding:14px;border-radius:18px;border:1px dashed var(--border2)">
        <div id="qPrevBox" class="preview-box">
          <img id="qPrevImg" src="" alt="preview">
          <button class="btn-clear-img" onclick="clearMedia()" title="Xóa ảnh">×</button>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <input type="text" id="qUrl" class="input-control"
            placeholder="Dán link ảnh (https://...)" oninput="handleLinkInput(this.value)">
          <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;
            background:rgba(79,172,254,.1);color:var(--primary);padding:8px 16px;border-radius:10px;
            border:1px dashed rgba(79,172,254,.4);width:fit-content;font-size:.8rem;font-weight:700">
            <i class="fas fa-upload"></i> Tải ảnh lên
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">
          </label>
        </div>
        <input type="hidden" id="qData">
      </div>
    </div>

    <!-- LOẠI CÂU HỎI -->
    <div class="form-group-aq">
      <label><i class="fas fa-list-ul"></i> Dạng câu hỏi</label>
      <select id="qType" class="input-control" onchange="renderEditor()">
        <optgroup label="── Trắc nghiệm ──">
          <option value="single">📌 Một đáp án đúng (Radio)</option>
          <option value="multiple">☑️ Nhiều đáp án đúng (Checkbox)</option>
          <option value="tf">✅ Đúng / Sai (True-False)</option>
        </optgroup>
        <optgroup label="── Tương tác ──">
          <option value="matching">🔗 Ghép cặp tương ứng</option>
          <option value="ordering">🔢 Sắp xếp theo thứ tự</option>
        </optgroup>
        <optgroup label="── Tự luận ──">
          <option value="fill">✏️ Điền khuyết (nhiều đáp án)</option>
        </optgroup>
      </select>
    </div>

    <!-- KHU VỰC ĐÁP ÁN -->
    <div id="answerArea">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <label id="ansLabel" style="margin:0;font-size:.75rem;color:#90caf9;text-transform:uppercase;font-weight:700;letter-spacing:1px">
          <i class="fas fa-th-list"></i> Thiết lập đáp án
        </label>
        <button id="addBtn" class="btn-add-ans" onclick="addAnsRow()">
          <i class="fas fa-plus"></i> Thêm phương án
        </button>
      </div>
      <div id="ansList"></div>
    </div>

    <!-- TYPE HINTS -->
    <div id="typeHint" style="margin-top:12px;padding:12px 16px;border-radius:12px;
      background:rgba(79,172,254,.06);border:1px solid rgba(79,172,254,.15);
      font-size:.78rem;color:rgba(255,255,255,.55);display:none">
    </div>

    <!-- KẾT QUẢ CHẤM ĐIỂM -->
    <div class="correct-area">
      <label style="color:var(--success)">
        <i class="fas fa-fingerprint"></i> Dữ liệu chấm điểm
      </label>
      <input type="text" id="finalCorrect" class="input-control" readonly
        style="border-color:var(--success);color:var(--success);font-weight:700;
          background:rgba(0,230,118,.04);margin-top:8px"
        placeholder="Hệ thống sẽ tự tạo mã chấm điểm...">
      <span class="badge-info" id="correctHint"></span>
    </div>

    <!-- NÚT LƯU -->
    <button id="saveBtn" class="btn-save-aq" onclick="saveData()">
      <i class="fas fa-cloud-upload-alt"></i> ĐỒNG BỘ LÊN CLOUD HỆ THỐNG
    </button>

  </div>
</div>

<script src="script.js" defer></script>
<script>
/* ─── Khởi tạo trang ─── */
window.onload = async function(){
  nbAddQuestionInit(); /* từ script.js */

  const testData = JSON.parse(localStorage.getItem('currentTest'));
  if(!testData) return location.href = 'dashboard.html';
  document.getElementById('testInfo').innerText = 'BÀI THI: ' + testData.name.toUpperCase();

  const editDataString = localStorage.getItem('editQuestionData');
  if(editDataString && editDataString !== 'null'){
    window._aqEditMode = true;
    const editData = JSON.parse(editDataString);
    window._aqOriginalQ = editData.question;
    document.getElementById('pageTitle').innerHTML = '<i class="fas fa-pen-nib"></i> CẬP NHẬT CÂU HỎI';
    fillEditData(editData);
  } else {
    renderEditor();
  }
  await fetchQuestionStats(testData.id);
  showTypeHint();
};

/* ─── Hint theo loại câu hỏi ─── */
function showTypeHint(){
  const type = document.getElementById('qType').value;
  const hints = {
    single:   'Chọn 1 đáp án đúng. Đánh dấu radio vào đáp án chính xác.',
    multiple: 'Có thể chọn nhiều đáp án đúng. Đánh dấu tất cả đáp án đúng.',
    tf:       'Học sinh chọn Đúng hoặc Sai.',
    matching: 'Nhập cặp vế A – vế B. Học sinh kéo ghép tương ứng.',
    ordering: 'Nhập từng bước/mục theo thứ tự đúng. Học sinh kéo sắp xếp lại.',
    fill:     'Điền khuyết. Có thể thêm nhiều đáp án được chấp nhận (phân cách bằng "|").',
  };
  const hintEl = document.getElementById('typeHint');
  if(hints[type]){
    hintEl.style.display = 'block';
    hintEl.innerHTML = `<i class="fas fa-lightbulb" style="color:var(--warning)"></i> ${hints[type]}`;
  } else {
    hintEl.style.display = 'none';
  }
  /* Cập nhật label đáp án */
  const labels = {
    single:'Các phương án (đánh radio vào đáp án đúng)',
    multiple:'Các phương án (tick checkbox vào đáp án đúng)',
    matching:'Ghép cặp vế A ↔ vế B',
    ordering:'Các mục (theo thứ tự đúng từ trên xuống)',
    fill:'Đáp án chấp nhận (có thể thêm nhiều)',
    tf:'Lựa chọn đúng/sai',
  };
  const ansLbl = document.getElementById('ansLabel');
  if(ansLbl) ansLbl.innerHTML = `<i class="fas fa-th-list"></i> ${labels[type]||'Thiết lập đáp án'}`;

  /* Hint đúng */
  const chints = {
    single:'Đáp án đúng sẽ được ghi tự động khi tick radio.',
    multiple:'Nhiều đáp án đúng phân cách bằng "|".',
    matching:'Định dạng: VếA-VếB | VếA-VếB | ...',
    ordering:'Thứ tự đúng từ trái sang phải, phân cách bằng "|".',
    fill:'Tất cả đáp án được chấp nhận, phân cách bằng "|".',
    tf:'Giá trị: "Đúng" hoặc "Sai".',
  };
  const cHint = document.getElementById('correctHint');
  if(cHint) cHint.innerText = chints[type]||'';
}

/* Hook qType onchange để cập nhật hint */
document.addEventListener('DOMContentLoaded', function(){
  const qTypeEl = document.getElementById('qType');
  if(qTypeEl){
    const orig = qTypeEl.onchange;
    qTypeEl.addEventListener('change', function(){
      if(orig) orig.call(this);
      showTypeHint();
    });
  }
});
</script>
</body>
</html>

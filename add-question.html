<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Thêm câu hỏi mới</title>
  
  <style>
    /* (Giữ nguyên toàn bộ phần CSS ở đây để đảm bảo giao diện đẹp) */
    :root {
      --primary: #4facfe; --secondary: #00c6ff; --accent: #00ffcc;
      --success: #2ecc71; --danger: #e74c3c; --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7); --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      min-height: 100vh; background: linear-gradient(135deg, #2c3e50, #4facfe);
      display: flex; justify-content: center; align-items: flex-start;
      padding: 20px 10px; color: var(--text-main);
    }
    .container { width: 100%; max-width: 800px; }
    .box {
      background: var(--glass-bg); backdrop-filter: blur(20px);
      border-radius: 24px; padding: 30px; border: 1px solid var(--glass-border);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .q-banner { background: rgba(0, 114, 255, 0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--secondary); }
    .form-group { margin-bottom: 15px; }
    .input-control {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2); color: white; outline: none;
    }
    #answerArea { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 20px 0; }
    .btn-save {
      background: linear-gradient(135deg, var(--secondary), #0072ff);
      color: white; width: 100%; padding: 15px; border-radius: 12px; border: none;
      cursor: pointer; font-weight: bold; font-size: 1.1em;
    }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="container">
  <div class="box">
    <div class="header">
      <h2>➕ Thêm câu hỏi mới</h2>
      <a href="dashboard.html" style="color:white; text-decoration:none;">🏠 Home</a>
    </div>

    <div id="testInfo" class="q-banner">
      ⏳ Đang tải thông tin bài test...
    </div>

    <div class="form-group">
      <label>📌 Nội dung câu hỏi</label>
      <textarea id="question" class="input-control" placeholder="Nhập câu hỏi tại đây..."></textarea>
    </div>

    <div class="form-group">
      <label>📌 Loại câu hỏi</label>
      <select id="type" class="input-control" onchange="changeType()">
        <option value="mcq">Trắc nghiệm (4 đáp án)</option>
        <option value="tf">Đúng / Sai</option>
        <option value="essay">Tự luận ngắn</option>
      </select>
    </div>

    <div id="answerArea">
      <!-- Vùng nhập đáp án sẽ thay đổi dựa trên loại câu hỏi -->
      <div id="mcqBox">
        <input type="text" id="a" class="input-control" placeholder="Đáp án A">
        <input type="text" id="b" class="input-control" placeholder="Đáp án B">
        <input type="text" id="c" class="input-control" placeholder="Đáp án C">
        <input type="text" id="d" class="input-control" placeholder="Đáp án D">
        <label>Đáp án đúng:</label>
        <select id="correct" class="input-control">
          <option value="A">A</option><option value="B">B</option>
          <option value="C">C</option><option value="D">D</option>
        </select>
      </div>

      <div id="tfBox" style="display:none;">
        <select id="tfCorrect" class="input-control">
          <option value="Đúng">Đúng</option>
          <option value="Sai">Sai</option>
        </select>
      </div>

      <div id="essayBox" style="display:none;">
        <textarea id="essayAnswer" class="input-control" placeholder="Nhập đáp án mẫu..."></textarea>
      </div>
    </div>

    <button id="btnSave" class="btn-save" onclick="saveQuestion()">💾 Lưu câu hỏi</button>

    <div style="margin-top:20px; display:flex; gap:10px;">
      <a href="question-list.html" style="flex:1; text-align:center; color:var(--accent);">📋 Xem danh sách</a>
      <a href="dashboard.html" style="flex:1; text-align:center; color:white;">⬅️ Dashboard</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
const test = JSON.parse(localStorage.getItem("currentTest"));

window.onload = () => {
  if(!test) {
    alert("Vui lòng chọn bài test trước!");
    location.href = "dashboard.html";
  }
  document.getElementById("testInfo").innerHTML = `📘 Đang thêm câu hỏi cho: <b>${test.name}</b>`;
};

// Chuyển đổi giao diện nhập đáp án
function changeType() {
  const type = document.getElementById("type").value;
  document.getElementById("mcqBox").style.display = type === "mcq" ? "block" : "none";
  document.getElementById("tfBox").style.display = type === "tf" ? "block" : "none";
  document.getElementById("essayBox").style.display = type === "essay" ? "block" : "none";
}

// HÀM LƯU CÂU HỎI LÊN SERVER
async function saveQuestion() {
  const btn = document.getElementById("btnSave");
  const qText = document.getElementById("question").value.trim();
  const qType = document.getElementById("type").value;

  if(!qText) return alert("Vui lòng nhập nội dung câu hỏi!");

  let answerData = {};
  if(qType === "mcq") {
    answerData = {
      a: document.getElementById("a").value,
      b: document.getElementById("b").value,
      c: document.getElementById("c").value,
      d: document.getElementById("d").value,
      correct: document.getElementById("correct").value
    };
  } else if(qType === "tf") {
    answerData = { correct: document.getElementById("tfCorrect").value };
  } else {
    answerData = { correct: document.getElementById("essayAnswer").value };
  }

  btn.disabled = true;
  btn.innerText = "⏳ Đang lưu...";

  try {
    const response = await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        action: "addQuestion",
        testId: test.id,
        question: qText,
        type: qType,
        answers: answerData
      })
    });

    const result = await response.json();
    if(result.status === "ok") {
      alert("✅ Đã thêm câu hỏi thành công!");
      document.getElementById("question").value = ""; // Xóa trắng để nhập câu tiếp theo
    }
  } catch (err) {
    alert("❌ Lỗi kết nối máy chủ!");
  } finally {
    btn.disabled = false;
    btn.innerText = "💾 Lưu câu hỏi";
  }
}
</script>

</body>
</html>

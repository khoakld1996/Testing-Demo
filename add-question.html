<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thêm câu hỏi</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

  <h2>➕ Thêm câu hỏi</h2>

  <!-- HIỂN THỊ TEST -->
  <div id="testInfo" style="margin-bottom:15px; font-weight:bold;"></div>

  <!-- LOẠI -->
  <h4>📌 Loại câu hỏi</h4>
  <select id="type" onchange="changeType()">
    <option value="mcq">Trắc nghiệm một đáp án</option>
    <option value="multiple">Trắc nghiệm nhiều đáp án</option>
    <option value="truefalse">Đúng / Sai</option>
    <option value="fill">Điền khuyết</option>
    <option value="matching">Nối cặp</option>
    <option value="ordering">Sắp xếp</option>
    <option value="image">Câu hỏi hình ảnh</option>
    <option value="audio">Câu hỏi âm thanh</option>
    <option value="code">Câu hỏi code</option>
    <option value="external">Liên kết ngoài</option>
  </select>

  <!-- CÂU HỎI -->
  <textarea id="question" placeholder="Nhập câu hỏi"></textarea>

  <!-- MCQ -->
  <div id="mcqBox">
    <input id="a" placeholder="A">
    <input id="b" placeholder="B">
    <input id="c" placeholder="C">
    <input id="d" placeholder="D">

    <select id="correct">
      <option value="A">Đáp án đúng A</option>
      <option value="B">Đáp án đúng B</option>
      <option value="C">Đáp án đúng C</option>
      <option value="D">Đáp án đúng D</option>
    </select>
  </div>

  <!-- MULTIPLE -->
  <div id="multiBox" style="display:none;">
    <input id="m1" placeholder="Đáp án 1">
    <input id="m2" placeholder="Đáp án 2">
    <input id="m3" placeholder="Đáp án 3">
    <input id="m4" placeholder="Đáp án 4">

    <!-- ✅ FIX QUAN TRỌNG -->
    <input id="multiCorrect" placeholder="Đáp án đúng (vd: 1,3)">
  </div>

  <!-- TRUE FALSE -->
  <div id="tfBox" style="display:none;">
    <select id="tfCorrect">
      <option value="true">Đúng</option>
      <option value="false">Sai</option>
    </select>
  </div>

  <!-- FILL -->
  <div id="fillBox" style="display:none;">
    <input id="fillAnswer" placeholder="Đáp án đúng">
  </div>

  <!-- MATCHING -->
  <div id="matchingBox" style="display:none;">
    <div id="pairsContainer"></div>
    <button class="btn" onclick="addPair()">➕ Thêm cặp</button>
  </div>

  <!-- ORDERING -->
  <div id="orderingBox" style="display:none;">
    <div id="stepsContainer"></div>
    <button class="btn" onclick="addStep()">➕ Thêm bước</button>
  </div>

  <!-- IMAGE -->
  <div id="imageBox" style="display:none;">
    <input id="imageUrl" placeholder="Link ảnh">
     <input type="file" id="imageFile" accept="image/*">
  </div>

  <!-- AUDIO -->
  <div id="audioBox" style="display:none;">
    <input id="audioUrl" placeholder="Link audio">
  </div>

  <!-- CODE -->
  <div id="codeBox" style="display:none;">
    <textarea id="codeContent" placeholder="Nhập đoạn code"></textarea>
    <input id="codeAnswer" placeholder="Đáp án">
  </div>

  <!-- EXTERNAL -->
  <div id="externalBox" style="display:none;">
    <input id="externalLink" placeholder="Dán link web">
  </div>

  <!-- BUTTON -->
  <br><br>

  <button class="btn-save" onclick="addQuestion()">💾 Lưu câu hỏi</button>

  <button class="btn" onclick="go('question-list.html')">
    📋 Danh sách câu hỏi
  </button>

  <button class="btn" onclick="go('dashboard.html')">
    🏠 Dashboard
  </button>

</div>

<script src="script.js"></script>

<script>

// ===== HIỂN THỊ TÊN TEST (CHUẨN) =====
const test = JSON.parse(localStorage.getItem("currentTest"));

if(test){
  document.getElementById("testInfo").innerHTML = `
    📘 <b>${test.name}</b><br>
    <small>${test.desc || ""}</small>
  `;
}else{
  document.getElementById("testInfo").innerText =
    "⚠️ Chưa chọn bài test";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Online | Premium Edition</title>
  
  <!-- FontAwesome cho icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --accent: #00ffcc;
      --deep-bg: #0f172a;
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      overflow: hidden;
      position: relative;
      background: var(--deep-bg);
    }

    /* Hình nền có chiều sâu */
    .bg-image {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
      filter: brightness(0.4);
      z-index: -2;
    }

    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, transparent 0%, var(--deep-bg) 100%);
      z-index: -1;
    }

    /* Hiệu ứng đốm sáng Neon */
    .orb {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: var(--primary);
      filter: blur(140px);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }
    .orb-2 { right: -10%; bottom: -10%; background: var(--accent); opacity: 0.1; }

    /* Hạt sáng bay lơ lửng */
    .particle {
      position: absolute;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.3;
      animation: float-particle var(--duration) linear infinite;
    }

    @keyframes float-particle {
      from { transform: translateY(0) translateX(0); opacity: 0; }
      50% { opacity: 0.5; }
      to { transform: translateY(-100vh) translateX(20px); opacity: 0; }
    }

    .container { position: relative; z-index: 10; width: 100%; max-width: 480px; padding: 20px; }

    .box {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 40px;
      padding: 60px 45px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: reveal 1s ease-out;
    }

    /* Hiệu ứng lóa sáng quét qua Card */
    .box::before {
      content: "";
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-container {
      margin-bottom: 30px;
      position: relative;
      display: inline-block;
    }

    .logo-icon { 
      font-size: 70px; 
      background: linear-gradient(135deg, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(79, 172, 254, 0.5));
      animation: float 4s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -1px;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p { 
      color: var(--text-muted); 
      font-size: 1.05rem; 
      margin-bottom: 40px; 
      line-height: 1.6;
    }

    .menu-actions { display: flex; flex-direction: column; gap: 16px; }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .btn-student { 
      background: linear-gradient(135deg, var(--primary), #3b82f6); 
      color: white; 
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
    }
    
    /* Shimmer Effect cho nút chính */
    .btn-student::after {
      content: "";
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: 0.5s;
    }
    .btn-student:hover::after { left: 100%; }

    .btn-student:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.6);
    }

    .btn-admin { 
      background: rgba(255, 255, 255, 0.03); 
      color: white; 
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
    }
    .btn-admin:hover { 
      background: rgba(255, 255, 255, 0.08); 
      border-color: var(--primary);
      transform: translateY(-3px); 
    }

    .footer-text { 
      margin-top: 45px; 
      font-size: 0.7rem; 
      color: rgba(255, 255, 255, 0.25); 
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .fade-out {
      opacity: 0;
      transform: scale(0.97);
      transition: 0.4s ease-out;
    }
  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="orb" id="orb1"></div>
  <div class="orb orb-2" id="orb2"></div>

  <div class="container">
    <div class="box" id="mainBox">
      <div class="logo-container">
        <i class="fas fa-rocket logo-icon"></i>
      </div>
      <h1>QUIZ ONLINE</h1>
      <p>Nền tảng ôn luyện trắc nghiệm tối ưu <br> kiến tạo tri thức tương lai</p>

      <div class="menu-actions">
        <button class="btn btn-student" onclick="goTo('login.html?role=student')">
          <i class="fas fa-graduation-cap"></i> Học sinh đăng nhập
        </button>
        
        <button class="btn btn-admin" onclick="goTo('login.html?role=admin')">
          <i class="fas fa-shield-halved"></i> Khu vực quản trị
        </button>
      </div>

      <div class="footer-text">
        Premium Edition • 2026 • Kieu Le Dang Khoa
      </div>
    </div>
  </div>

  <script>
    // Tạo hạt bụi sáng bay lơ lửng
    function createParticles() {
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1 + 'px';
        p.style.width = size;
        p.style.height = size;
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = Math.random() * 100 + 'vh';
        p.style.setProperty('--duration', Math.random() * 10 + 10 + 's');
        p.style.animationDelay = Math.random() * 5 + 's';
        document.body.appendChild(p);
      }
    }
    createParticles();

    function goTo(url) {
      document.getElementById('mainBox').classList.add('fade-out');
      setTimeout(() => {
        window.location.href = url;
      }, 400);
    }

    // Hiệu ứng tương tác chuột cao cấp
    document.addEventListener('mousemove', (e) => {
      const { clientX, clientY } = e;
      const x = (clientX - window.innerWidth / 2) / 35;
      const y = (clientY - window.innerHeight / 2) / 35;
      
      const orb1 = document.getElementById('orb1');
      const orb2 = document.getElementById('orb2');
      const box = document.getElementById('mainBox');
      
      orb1.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`;
      orb2.style.transform = `translate(${-x}px, ${-y}px)`;
      
      // Hiệu ứng nghiêng nhẹ cho hộp (Tilt effect)
      box.style.transform = `perspective(1000px) rotateY(${x/2}deg) rotateX(${-y/2}deg)`;
    });
  </script>
</body>
</html>

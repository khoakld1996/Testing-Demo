<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Online - Hệ thống luyện tập</title>
  
  <style>
    /* Định nghĩa màu sắc đồng bộ với các trang Admin */
    :root {
      --primary: #4facfe;
      --secondary: #00c6ff;
      --accent: #00ffcc;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #2c3e50 0%, #4facfe 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      overflow: hidden;
    }

    /* Hiệu ứng vòng tròn trang trí phía sau */
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      filter: blur(80px);
      z-index: -1;
      opacity: 0.2;
    }
    body::before { width: 300px; height: 300px; top: 10%; left: 10%; }
    body::after { width: 250px; height: 250px; bottom: 10%; right: 10%; }

    .container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    .box {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 40px 30px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-icon {
      font-size: 60px;
      margin-bottom: 15px;
      display: inline-block;
      filter: drop-shadow(0 0 10px var(--accent));
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(to right, #ffffff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 35px;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 15px;
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    /* Nút chính - Bắt đầu */
    .btn-primary {
      background: linear-gradient(135deg, var(--secondary), #0072ff);
      color: white;
      box-shadow: 0 8px 20px rgba(0, 114, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(0, 114, 255, 0.4);
      filter: brightness(1.1);
    }

    /* Nút phụ - Đăng nhập/Vai trò */
    .btn-outline {
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid var(--glass-border);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .footer-text {
      margin-top: 30px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
    }

  </style>
</head>
<body>

<div class="container">
  <div class="box">
    <div class="logo-icon">🎯</div>
    <h1>Quiz Online</h1>
    <p>Nâng cao kiến thức mỗi ngày</p>

    <div class="menu-actions">
      <!-- Thay đổi 'go' thành hàm bạn đã viết trong script.js -->
      <button class="btn btn-primary" onclick="location.href='name.html'">
        🚀 Bắt đầu ngay
      </button>
      
      <button class="btn btn-outline" onclick="location.href='role.html'">
        👤 Quản trị viên
      </button>
    </div>

    <div class="footer-text">
      Version 2.0 • Powered by Kieu Le Dang Khoa
    </div>
  </div>
</div>

<!-- Nếu bạn có file script.js chung, hãy giữ nó -->
<script src="script.js"></script>

</body>
</html>

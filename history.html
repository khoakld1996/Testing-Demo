<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Lịch Sử Làm Bài | Nebula</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <script src="script.js" defer></script>
</head>
<body class="hist-body">

<div class="hist-container">

  <!-- Header -->
  <div class="hist-header">
    <a href="select.html" class="hist-back-btn" title="Quay lại">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <div>
      <div class="hist-title">LỊCH SỬ LÀM BÀI</div>
      <div class="hist-student" id="histStudentName">Đang tải...</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="hist-stats" id="histStats">
    <div class="hist-stat"><span class="hist-stat-n">—</span><span class="hist-stat-l">Lần làm</span></div>
    <div class="hist-stat"><span class="hist-stat-n">—</span><span class="hist-stat-l">Điểm TB</span></div>
    <div class="hist-stat"><span class="hist-stat-n">—</span><span class="hist-stat-l">Cao nhất</span></div>
  </div>

  <!-- Filter -->
  <div class="hist-filter-bar">
    <select id="histFilter" onchange="if(window._histFilterFn)window._histFilterFn(this.value)">
      <option value="all">📋 Tất cả</option>
      <option value="sys">🖥 Hệ thống</option>
      <option value="isp">🌠 iSpring</option>
    </select>
  </div>

  <!-- List -->
  <div id="histList">
    <!-- Skeleton while loading -->
    <div class="hist-list-inner">
      <div class="hist-skeleton"></div>
      <div class="hist-skeleton"></div>
      <div class="hist-skeleton"></div>
      <div class="hist-skeleton"></div>
    </div>
  </div>

</div>

<script>
  /* Override nbHistoryInit to expose filter function */
  document.addEventListener('DOMContentLoaded', function(){
    if(typeof nbHistoryInit === 'function') nbHistoryInit();
  });
</script>
</body>
</html>

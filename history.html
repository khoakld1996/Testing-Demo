<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Sử Bài Làm | Quiz Online</title>
  <style>
    :root {
      --primary: #4facfe; 
      --accent: #00ffcc; 
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.8); 
      --glass-border: rgba(255, 255, 255, 0.1);
      --success: #2ecc71; 
      --error: #ff4757;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container { width: 100%; max-width: 800px; animation: fadeInPage 0.5s ease; }
    @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
    
    .header-box {
      width: 100%; 
      background: var(--card); 
      backdrop-filter: blur(12px);
      padding: 25px; 
      border-radius: 20px; 
      border: 1px solid var(--glass-border);
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .btn-home {
      padding: 12px 24px; 
      background: linear-gradient(135deg, var(--primary), #00f2fe);
      color: white; 
      border: none; 
      border-radius: 12px; 
      cursor: pointer; 
      text-decoration: none; 
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
    }
    .btn-home:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }

    /* Danh sách bài thi */
    .history-item {
      background: var(--card); 
      border-radius: 20px; 
      border: 1px solid var(--glass-border);
      margin-bottom: 15px; 
      overflow: hidden; 
      transition: all 0.3s ease;
    }
    
    .item-summary {
      padding: 20px; 
      cursor: pointer; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      position: relative;
    }
    .item-summary:hover { background: rgba(255,255,255,0.05); }
    
    .test-info h4 { color: var(--accent); margin-bottom: 6px; font-size: 1.25rem; }
    .test-info small { color: var(--text-muted); display: block; font-size: 0.9rem; }

    .score-badge {
      text-align: center;
      padding: 10px;
      min-width: 80px;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      border: 1px solid var(--primary);
    }
    .score-val { display: block; font-size: 1.4rem; font-weight: 800; color: var(--primary); }
    .score-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; }

    /* Chi tiết bài làm */
    .item-details {
      max-height: 0; 
      overflow: hidden; 
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(15, 23, 42, 0.6);
    }
    .item-details.active { max-height: 10000px; border-top: 1px solid var(--glass-border); }

    .filter-bar {
      padding: 15px 25px;
      background: rgba(255,255,255,0.03);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--glass-border);
    }
    .filter-bar label { font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text-muted); }
    .filter-bar input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--error); }

    .review-content { padding: 25px; }

    .review-card {
      background: rgba(255,255,255,0.03); 
      padding: 18px; 
      border-radius: 15px;
      margin-bottom: 20px; 
      border-left: 6px solid transparent;
      transition: 0.3s;
    }
    .review-card.correct { border-left-color: var(--success); }
    .review-card.incorrect { border-left-color: var(--error); }

    .q-header { font-weight: 600; margin-bottom: 12px; line-height: 1.5; color: #f1f5f9; font-size: 1.05rem; }
    .q-img-review { max-width: 100%; max-height: 200px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--glass-border); }
    
    .ans-box { 
      font-size: 0.95rem; 
      padding: 10px 14px; 
      border-radius: 8px; 
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-ans-box { background: rgba(255,255,255,0.05); color: #cbd5e1; }
    .correct-ans-box { background: rgba(46, 204, 113, 0.15); color: var(--success); font-weight: 600; margin-top: 12px; }

    .no-data { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    
    /* Mobile Responsive */
    @media (max-width: 600px) {
      .header-box { flex-direction: column; text-align: center; gap: 15px; }
      .item-summary { padding: 15px; }
      .test-info h4 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-box">
      <div>
        <h2 style="background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Lịch Sử Bài Làm</h2>
        <p id="studentDisplay" style="font-size: 0.85rem; color: var(--accent); font-weight: 500;"></p>
      </div>
      <a href="index.html" class="btn-home">🏠 Làm bài tiếp</a>
    </div>

    <div id="historyList"></div>
  </div>

<script>
  window.onload = () => {
    const name = localStorage.getItem("studentName") || "Học sinh";
    const school = localStorage.getItem("schoolName") || "";
    document.getElementById("studentDisplay").innerText = `Học sinh: ${name} ${school ? '• ' + school : ''}`;
    renderHistory();
  };

  function renderHistory() {
    const history = JSON.parse(localStorage.getItem("quizHistory") || "[]");
    const container = document.getElementById("historyList");

    if (history.length === 0) {
      container.innerHTML = `
        <div class="no-data">
          <div style="font-size: 4rem; margin-bottom: 15px;">📊</div>
          <p>Bạn chưa có dữ liệu bài làm nào.</p>
        </div>`;
      return;
    }

    container.innerHTML = ""; 

    history.forEach((record, index) => {
      const item = document.createElement("div");
      item.className = "history-item";
      
      let html = `
        <div class="item-summary" onclick="toggleDetails(${index})">
          <div class="test-info">
            <h4>${record.testName}</h4>
            <small>📅 ${record.date}</small>
            <small>✅ Đúng: ${record.correctText} câu</small>
          </div>
          <div class="score-badge">
            <span class="score-val">${record.score}</span>
            <span class="score-label">Điểm</span>
          </div>
        </div>
        <div class="item-details" id="details-${index}">
          <div class="filter-bar">
             <label><input type="checkbox" onchange="filterWrong(this, ${index})"> Chỉ hiện câu sai</label>
          </div>
          <div class="review-content">
      `;

      record.review.forEach((q, i) => {
        const statusClass = q.isRight ? "correct" : "incorrect";
        const icon = q.isRight ? "✅" : "❌";
        
        let correctTxt = "";
        if (q.type === "mcq") {
          correctTxt = q.details.items.filter(it => it.isCorrect).map(it => it.text).join(", ");
        } else if (q.type === "tf") {
          correctTxt = q.details.correct === "true" ? "Đúng" : "Sai";
        } else {
          correctTxt = q.details.items.join(" / ");
        }

        html += `
          <div class="review-card ${statusClass}">
            <div class="q-header">Câu ${i+1}: ${q.question}</div>
            ${q.image ? `<img src="${q.image}" class="q-img-review">` : ''}
            
            <div class="ans-box user-ans-box">
              <span>${icon}</span>
              <span>Lựa chọn của bạn: <b>${formatUserAns(q)}</b></span>
            </div>

            ${!q.isRight ? `
              <div class="ans-box correct-ans-box">
                <span>💡 Đáp án đúng: ${correctTxt}</span>
              </div>` : ''}
          </div>
        `;
      });

      html += `</div></div>`;
      item.innerHTML = html;
      container.appendChild(item);
    });
  }

  function formatUserAns(q) {
    if (!q.userAns || (Array.isArray(q.userAns) && q.userAns.length === 0)) return "Bỏ trống";
    if (q.type === "mcq") {
      return q.userAns.map(idx => q.details.items[idx].text).join(", ");
    }
    if (q.type === "tf") return q.userAns === "true" ? "Đúng" : "Sai";
    return q.userAns;
  }

  function toggleDetails(index) {
    const el = document.getElementById(`details-${index}`);
    const isAlreadyActive = el.classList.contains("active");
    
    // KÍCH HOẠT: Đóng tất cả các bài khác trước khi mở bài mới
    document.querySelectorAll('.item-details').forEach(d => d.classList.remove('active'));

    // Nếu cái đang chọn chưa mở thì mới mở nó ra
    if (!isAlreadyActive) {
      el.classList.add("active");
      // Cuộn nhẹ xuống để thấy nội dung vừa mở
      setTimeout(() => {
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 300);
    }
  }

  function filterWrong(checkbox, index) {
    const container = document.getElementById(`details-${index}`);
    const cards = container.querySelectorAll('.review-card');
    cards.forEach(card => {
      if (checkbox.checked) {
        if (card.classList.contains('correct')) card.style.display = 'none';
      } else {
        card.style.display = 'block';
      }
    });
  }
</script>
</body>
</html>

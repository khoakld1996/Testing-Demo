<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Sử Bài Làm | Nebula Quiz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    :root {
      --primary: #4facfe; --accent: #00ffcc; --bg: #0b0f1a;
      --card: rgba(30,41,59,0.75); --glass-border: rgba(255,255,255,0.1);
      --text: #f8fafc; --correct: #00ffcc; --wrong: #ff4757; --ispring: #f97316;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body {
      min-height:100vh;
      background: var(--bg) url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
      background-size:cover; background-blend-mode:overlay; color:var(--text); padding:20px;
    }
    .container { width:100%; max-width:850px; margin:0 auto; }

    /* HEADER */
    .header-box {
      background:var(--card); backdrop-filter:blur(15px);
      padding:20px 25px; border-radius:20px; border:1px solid var(--glass-border);
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:20px; box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }
    .btn-back {
      padding:11px 22px; background:rgba(255,255,255,0.07);
      color:#fff; border:1px solid var(--glass-border); border-radius:12px;
      cursor:pointer; font-weight:700; display:flex; align-items:center; gap:8px; transition:0.3s;
      text-decoration:none;
    }
    .btn-back:hover { background:rgba(255,255,255,0.13); }

    /* VIEW 1 - DANH SÁCH */
    #viewList { display:block; }
    #viewDetail { display:none; }

    .history-item {
      background:var(--card); border-radius:16px; border:1px solid var(--glass-border);
      margin-bottom:12px; cursor:pointer; transition:all 0.25s; backdrop-filter:blur(10px);
      display:grid; grid-template-columns:1fr 80px 110px 36px;
      align-items:center; gap:12px; padding:18px 22px;
    }
    .history-item:hover { background:rgba(79,172,254,0.08); border-color:var(--primary); transform:translateX(5px); }
    .test-name  { font-weight:700; color:var(--accent); font-size:1rem; }
    .test-time  { color:#94a3b8; font-size:0.78rem; margin-top:4px; display: flex; gap: 8px; align-items: center; }
    .ispring-badge { background: rgba(249, 115, 22, 0.15); color: var(--ispring); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; border: 1px solid rgba(249, 115, 22, 0.3); }
    
    .score-box  { text-align:center; font-size:1.5rem; font-weight:900; color:#fff; }
    .score-lbl  { font-size:0.58rem; color:var(--primary); font-weight:400; display:block; margin-top:-2px; }
    .total-box  { text-align:right; color:var(--accent); font-size:0.9rem; font-weight:700; white-space:nowrap; }
    .arr        { color:#334155; text-align: right; }
    .history-item:hover .arr { color:var(--primary); }

    .loader  { text-align:center; padding:60px; }
    .no-data { text-align:center; padding:80px 20px; opacity:0.5; }
    .no-data i { font-size:2.5rem; margin-bottom:12px; display:block; color: var(--primary); }

    /* VIEW 2 - CHI TIẾT BÀI */
    .detail-back {
      display:flex; align-items:center; gap:12px; margin-bottom:18px;
    }
    .btn-sm {
      padding:9px 18px; border-radius:11px; border:1px solid var(--glass-border);
      background:rgba(255,255,255,0.06); color:#fff; cursor:pointer;
      font-weight:700; display:flex; align-items:center; gap:7px; transition:0.2s;
    }
    .btn-sm:hover { background:rgba(255,255,255,0.12); }

    .detail-summary {
      background:var(--card); border:1px solid var(--glass-border);
      border-radius:18px; padding:20px 22px; margin-bottom:18px;
    }
    .detail-title { font-size:1.1rem; font-weight:800; color:#fff; margin-bottom:12px; }
    .chips { display:flex; gap:10px; flex-wrap:wrap; }
    .chip {
      padding:6px 14px; border-radius:10px; font-size:0.76rem; font-weight:700;
      display:flex; align-items:center; gap:6px;
    }
    .chip-score   { background:rgba(79,172,254,0.12); color:var(--primary); border:1px solid rgba(79,172,254,0.3); }
    .chip-correct { background:rgba(0,255,204,0.1);   color:var(--correct); border:1px solid rgba(0,255,204,0.25); }
    .chip-wrong   { background:rgba(255,71,87,0.1);   color:var(--wrong);   border:1px solid rgba(255,71,87,0.25); }
    .chip-time    { background:rgba(255,255,255,0.05); color:#94a3b8; border:1px solid var(--glass-border); }
    .chip-ispring { background:rgba(249,115,22,0.1);  color:var(--ispring); border:1px solid rgba(249,115,22,0.25); }

    /* DANH SÁCH CÂU HỎI */
    .q-list { display:flex; flex-direction:column; gap:10px; }

    .q-item {
      border-radius:14px; border:1px solid var(--glass-border);
      background:rgba(255,255,255,0.02); overflow:hidden; cursor:pointer; transition:0.2s;
    }
    .q-item:hover { background:rgba(255,255,255,0.05); }
    .q-header { display:flex; align-items:center; gap:12px; padding:14px 18px; }
    .q-badge {
      min-width:32px; height:32px; border-radius:10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:0.78rem; font-weight:800;
    }
    .q-badge.correct { background:rgba(0,255,204,0.15); color:var(--correct); border:1px solid rgba(0,255,204,0.3); }
    .q-badge.wrong   { background:rgba(255,71,87,0.15);  color:var(--wrong);   border:1px solid rgba(255,71,87,0.3); }
    .q-badge.unanswered { background:rgba(255,255,255,0.1); color:#94a3b8; border:1px solid var(--glass-border); }
    
    .q-preview { flex:1; font-size:0.9rem; color:#e2e8f0; line-height:1.4; }
    .q-pts     { font-size:0.72rem; font-weight:700; color:var(--primary); white-space:nowrap; }
    .q-arrow   { color:#475569; font-size:0.75rem; transition:transform 0.2s; }
    .q-item.open .q-arrow { transform:rotate(180deg); }

    .q-detail { display:none; padding:0 18px 16px; border-top:1px solid rgba(255,255,255,0.05); }
    .q-item.open .q-detail { display:block; }
    .detail-inner { padding-top:12px; }

    .d-label { font-size:0.67rem; text-transform:uppercase; letter-spacing:1px; color:#475569; margin-bottom:6px; font-weight:700; }

    .opt-item {
      padding:9px 13px; border-radius:10px; font-size:0.85rem;
      background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
      display:flex; align-items:center; gap:8px; color:#94a3b8; margin-bottom:6px;
    }
    .opt-item.is-correct { background:rgba(0,255,204,0.08); border-color:rgba(0,255,204,0.3); color:var(--correct); }
    .opt-item.is-wrong   { background:rgba(255,71,87,0.08);  border-color:rgba(255,71,87,0.3);  color:var(--wrong); }

    .correct-answer-box {
      background:rgba(0,255,204,0.07); border:1px solid rgba(0,255,204,0.2);
      border-radius:10px; padding:9px 13px; font-size:0.85rem;
      color:var(--correct); display:flex; align-items:center; gap:8px;
    }
    .divider { height:1px; background:rgba(255,255,255,0.05); margin:10px 0; }
    .loading-questions { text-align:center; padding:40px; color:#475569; }

    @media(max-width:600px) {
      .history-item { grid-template-columns:1fr 60px; }
      .total-box, .arr { display:none; }
    }
  </style>
</head>
<body>
<div class="container">

  <div id="viewList">
    <div class="header-box">
      <div>
        <h2 style="color:#fff; font-size:1.3rem; font-weight:800">📋 Lịch Sử Bài Làm</h2>
        <p id="studentDisplay" style="color:var(--primary); font-size:0.85rem; margin-top:4px;"></p>
      </div>
      <a href="select.html" class="btn-back"><i class="fas fa-play-circle"></i> Tiếp tục thi</a>
    </div>
    <div id="historyList">
      <div class="loader"><i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--primary);margin-bottom:12px;display:block"></i><p>Đang đồng bộ dữ liệu...</p></div>
    </div>
  </div>

  <div id="viewDetail">
    <div class="detail-back">
      <button class="btn-sm" onclick="backToList()"><i class="fas fa-arrow-left"></i> Quay lại</button>
      <span id="detailTestName" style="font-weight:800; font-size:1rem; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></span>
    </div>

    <div class="detail-summary" id="detailSummary"></div>

    <div class="q-list" id="qDetailList">
      </div>
  </div>

</div>

<script>
  // ==========================================
  // URL CỦA GOOGLE APPS SCRIPT CỦA BẠN
  // ==========================================
  const API = "https://script.google.com/macros/s/AKfycbx_C8-ifdrwU4V4peQITzXC1-zbxZGAwtOvfFkMisr9kUk2nvNx-DkBXH_4W5CDICWs/exec";

  let allResults = [];
  let currentRecord = null;

  // ── FORMAT TIME CHUẨN ──
  // Xử lý tốt cả định dạng yyyy-MM-dd HH:mm:ss của AppScript và ISO
  function fmtTime(val) {
    if (!val) return "—";
    try {
      let s = String(val).trim();
      // AppScript format: "yyyy-MM-dd HH:mm:ss" hoặc "dd/MM/yyyy HH:mm:ss"
      // Safari không parse "yyyy-MM-dd HH:mm:ss" → thay space bằng T, bỏ giây nếu cần
      if (/^\d{4}-\d{2}-\d{2}\s/.test(s)) {
        s = s.replace(" ", "T"); // "2026-04-03T14:30:00"
      } else if (/^\d{2}\/\d{2}\/\d{4}\s/.test(s)) {
        // Đổi dd/MM/yyyy HH:mm:ss → yyyy-MM-ddTHH:mm:ss
        const [datePart, timePart] = s.split(" ");
        const [d2, m2, y2] = datePart.split("/");
        s = `${y2}-${m2}-${d2}T${timePart || "00:00:00"}`;
      }
      const d = new Date(s);
      if (isNaN(d.getTime())) return val;
      return d.toLocaleString("vi-VN", {
        hour: "2-digit", minute: "2-digit",
        day: "2-digit", month: "2-digit", year: "numeric"
      });
    } catch(e) { return val; }
  }

  // ── INIT ──
  window.onload = () => {
    const name   = localStorage.getItem("studentName") || "Học sinh";
    const school = localStorage.getItem("schoolName")  || "";
    document.getElementById("studentDisplay").innerText = `🚀 ${name}${school ? " | " + school : ""}`;
    loadHistory(name);
  };

  // ── LOAD DANH SÁCH BÀI LÀM TỪ GOOGLE SHEET ──
  async function loadHistory(studentName) {
    const el = document.getElementById("historyList");
    try {
      // Gọi API với filter student để giảm dữ liệu trả về
      const res  = await fetch(`${API}?action=getResults&student=${encodeURIComponent(studentName)}`);
      const data = await res.json();
      allResults = Array.isArray(data) ? data : [];

      // Lọc thêm phòng khi API chưa hỗ trợ param student
      const mine = allResults
        .filter(r => String(r.student || "").trim().toLowerCase() === studentName.trim().toLowerCase())
        .reverse();

      if (!mine.length) {
        el.innerHTML = `<div class="no-data"><i class="fas fa-ghost"></i><p>Bạn chưa thực hiện bài thi nào.</p></div>`;
        return;
      }

      el.innerHTML = mine.map((r, i) => {
        const name = r.testName || r.testname || "Bài thi";
        const isIspring = name.toLowerCase().includes("[ispring]") || name.toLowerCase().includes("ispring:");
        
        // Hiển thị tên (bỏ chữ [iSpring] nếu có để UI đẹp hơn)
        const displayName = name.replace(/\[iSpring\]/ig, '').replace(/iSpring:/ig, '').trim();

        // Xử lý điểm (tránh lỗi NaN)
        const rawScore = r.score;
        let scoreDisplay = "0";
        if (rawScore !== undefined && rawScore !== null) {
          const numScore = parseFloat(rawScore);
          scoreDisplay = isNaN(numScore) ? rawScore : numScore.toFixed(1).replace(/\.0$/, "");
        }

        const total = r.total || "—";
        const time  = r.time || "";
        
        const rec = { ...r, displayName, isIspring };

        return `
          <div class="history-item animate__animated animate__fadeInUp" style="animation-delay:${i*0.04}s"
               onclick='prepareDetail(${i})'>
            <div>
              <div class="test-name">${displayName}</div>
              <div class="test-time">
                <i class="far fa-clock"></i> ${fmtTime(time)}
                ${isIspring ? `<span class="ispring-badge">iSpring</span>` : ""}
              </div>
            </div>
            <div class="score-box">${scoreDisplay}<span class="score-lbl">ĐIỂM</span></div>
            <div class="total-box"><i class="fas fa-check-double"></i> ${total}</div>
            <div class="arr"><i class="fas fa-chevron-right"></i></div>
          </div>`;
      }).join("");

      // Gán lại mine vào biến toàn cục để truy xuất khi click
      window.mineResults = mine;

    } catch(e) {
      console.error("Lỗi:", e);
      el.innerHTML = `<div class="no-data"><i class="fas fa-wifi"></i><p>Lỗi kết nối máy chủ.</p></div>`;
    }
  }

  // Hàm trung gian truyền index thay vì string JSON để tránh lỗi
  function prepareDetail(index) {
    if (window.mineResults && window.mineResults[index]) {
      const rec = window.mineResults[index];
      // Tự bổ sung thêm flag isIspring để openDetail xử lý
      const name = rec.testName || rec.testname || "";
      rec.isIspring = name.toLowerCase().includes("[ispring]") || name.toLowerCase().includes("ispring:");
      rec.displayName = name.replace(/\[iSpring\]/ig, '').replace(/iSpring:/ig, '').trim();
      openDetail(rec);
    }
  }

  // ── MỞ CHI TIẾT BÀI ──
  async function openDetail(record) {
    currentRecord = record;

    document.getElementById("viewList").style.display   = "none";
    document.getElementById("viewDetail").style.display = "block";
    document.getElementById("detailTestName").innerText = record.displayName || "Bài thi";

    // Format điểm
    const numScore = parseFloat(record.score);
    const scoreStr = isNaN(numScore) ? record.score : numScore.toFixed(1).replace(/\.0$/,"");
    
    // Tách câu đúng / tổng số câu
    const total = String(record.total || "");
    const [correctStr, totalStr] = total.includes("/") ? total.split("/") : ["0", "0"];
    const correctCount = parseInt(correctStr) || 0;
    const totalQCount = parseInt(totalStr) || 0;
    const wrongCount = totalQCount - correctCount;

    // RENDER BẢNG TÓM TẮT (SUMMARY)
    let summaryHtml = `<div class="detail-title">${record.displayName}</div><div class="chips">`;
    summaryHtml += `<span class="chip chip-score"><i class="fas fa-trophy"></i> ${scoreStr} điểm</span>`;
    
    // Nếu là bài Nebula thì hiện chi tiết đúng sai, nếu là iSpring thì hiện Tag iSpring
    if (record.isIspring) {
      summaryHtml += `<span class="chip chip-ispring"><i class="fas fa-gamepad"></i> Bài tập iSpring</span>`;
      summaryHtml += `<span class="chip chip-correct"><i class="fas fa-bullseye"></i> Tỉ lệ: ${total}</span>`;
    } else {
      summaryHtml += `<span class="chip chip-correct"><i class="fas fa-check"></i> ${correctCount} câu đúng</span>`;
      summaryHtml += `<span class="chip chip-wrong"><i class="fas fa-times"></i> ${wrongCount} câu sai</span>`;
    }
    
    summaryHtml += `<span class="chip chip-time"><i class="far fa-clock"></i> ${fmtTime(record.time)}</span></div>`;
    document.getElementById("detailSummary").innerHTML = summaryHtml;

    // RENDER CHI TIẾT BÊN DƯỚI
    const el = document.getElementById("qDetailList");
    
    if (record.isIspring) {
      // BÀI ISPRING: Không gọi API lấy câu hỏi, chỉ hiện thông báo
      el.innerHTML = `
        <div class="no-data animate__animated animate__fadeIn">
          <i class="fas fa-box-open" style="font-size:3rem; margin-bottom:15px; color:var(--ispring)"></i>
          <h3 style="color:#fff; margin-bottom:8px;">Hệ thống SCORM / iSpring</h3>
          <p style="color:#94a3b8; font-size:0.9rem; line-height:1.5; padding: 0 20px;">
            Hệ thống đã ghi nhận điểm số tổng quát của bạn.<br>
            Chi tiết từng câu hỏi đúng/sai được quản lý nội bộ bên trong file bài giảng iSpring.
          </p>
        </div>`;
    } else {
      // BÀI NEBULA: Gọi API lấy câu hỏi để so sánh
      await loadNebulaQuestions(record.testName || record.testname);
    }
  }

  // ── LOAD CÂU HỎI CHO BÀI NEBULA ──
  async function loadNebulaQuestions(rawTestName) {
    const el = document.getElementById("qDetailList");
    el.innerHTML = `<div class="loading-questions"><i class="fas fa-spinner fa-spin"></i> Đang tải đáp án chi tiết...</div>`;

    try {
      // 1. Tìm testId từ DB
      const testsRes = await fetch(`${API}?action=getTests`);
      const tests = await testsRes.json();
      const found = tests.find(t => (t.name || "").trim().toLowerCase() === (rawTestName || "").trim().toLowerCase());

      if (!found) {
        el.innerHTML = `<div class="loading-questions" style="color:var(--wrong)">Bài thi này đã bị xóa hoặc thay đổi trên hệ thống.</div>`;
        return;
      }

      // 2. Tải danh sách câu hỏi gốc
      const qRes = await fetch(`${API}?action=getQuestions&testId=${encodeURIComponent(found.id)}`);
      const qList = await qRes.json();

      if (!qList.length) {
        el.innerHTML = `<div class="loading-questions">Không tìm thấy câu hỏi nào.</div>`;
        return;
      }

      // 3. Lấy đáp án của học sinh từ record
      let studentAnswers = {};
      if (currentRecord.answers) {
        try {
          studentAnswers = typeof currentRecord.answers === 'string' ? JSON.parse(currentRecord.answers) : currentRecord.answers;
        } catch(e) { studentAnswers = {}; }
      }

      // 4. Render từng câu
      el.innerHTML = qList.map((q, idx) => {
        const studentAns = studentAnswers[q.question] || "";
        const correctAns = String(q.correct || "").trim();
        const pts = parseFloat(q.points) || 0;

        const isCorrect = checkAns(q, studentAns, correctAns);
        const status = studentAns ? (isCorrect ? "correct" : "wrong") : "unanswered";

        const badgeClass = status === "correct" ? "correct" : (status === "wrong" ? "wrong" : "unanswered");
        const badgeIcon = status === "correct" ? "fa-check" : (status === "wrong" ? "fa-times" : "fa-minus");

        return `
          <div class="q-item" id="qd${idx}">
            <div class="q-header" onclick="toggleQ(${idx})">
              <div class="q-badge ${badgeClass}">
                <i class="fas ${badgeIcon}"></i>
              </div>
              <div class="q-preview">Câu ${idx+1}: ${q.question}</div>
              ${pts > 0 ? `<div class="q-pts">${pts}đ</div>` : ""}
              <i class="fas fa-chevron-down q-arrow"></i>
            </div>
            <div class="q-detail">
              <div class="detail-inner">
                ${q.image && q.image.length > 10 ? `<img src="${q.image}" style="width:100%;border-radius:10px;margin-bottom:10px;max-height:200px;object-fit:contain;background:rgba(0,0,0,0.2)">` : ""}
                ${renderDetail(q, studentAns, correctAns, status)}
              </div>
            </div>
          </div>`;
      }).join("");

    } catch(e) {
      console.error("Lỗi tải câu hỏi:", e);
      el.innerHTML = `<div class="loading-questions" style="color:var(--wrong)">Lỗi kết nối khi lấy chi tiết câu hỏi.</div>`;
    }
  }

  // ── TOGGLE ĐÓNG MỞ CÂU HỎI ──
  function toggleQ(idx) {
    document.getElementById(`qd${idx}`).classList.toggle("open");
  }

  // ── HÀM CHẤM LẠI ĐỂ HIỆN TRẠNG THÁI ──
  function checkAns(q, studentAns, correctAns) {
    if (!studentAns) return false;
    const type = (q.type || "single").toLowerCase();
    
    const cleanOrder = (s) => s ? String(s).split('|').map(x => x.trim().toLowerCase()).join('|') : "";
    const cleanArr = (s) => s ? String(s).split('|').map(x => x.trim().toLowerCase()).sort().join('|') : "";
    
    if (type === "ordering") {
      return cleanOrder(studentAns) === cleanOrder(correctAns);
    } else if (type === "multiple" || type === "matching") {
      return cleanArr(studentAns) === cleanArr(correctAns);
    } else {
      return String(studentAns).trim().toLowerCase() === String(correctAns).trim().toLowerCase();
    }
  }

  // ── RENDER CHI TIẾT TỪNG CÂU BÊN TRONG BÀI NEBULA ──
  function renderDetail(q, studentAns, correctAns, status) {
    const type = (q.type || "single").toLowerCase();
    let html = "";

    // Dạng Trắc nghiệm (có options)
    if (["single", "mcq", "tf", "multiple"].includes(type)) {
      let opts = [];
      try {
        const det = typeof q.answer === "string" ? JSON.parse(q.answer) : q.answer;
        opts = (det?.items || []).map(o => typeof o === "object" ? o.text : o);
      } catch(e) {}
      if (type === "tf") opts = ["Đúng", "Sai"];

      if (opts.length) {
        html += `<div class="d-label">Các lựa chọn</div>`;
        
        // Mảng các đáp án học sinh đã chọn (cho câu nhiều đáp án)
        const chosenArr = String(studentAns).split('|').map(s => s.trim());
        const correctArr = String(correctAns).split('|').map(s => s.trim());

        opts.forEach(opt => {
          const optText = String(opt).trim();
          const isCorr = correctArr.includes(optText);
          const isChosen = chosenArr.includes(optText);
          
          let cls = "", icon = "fa-circle";
          if (type === "multiple") icon = "fa-square";

          if (isCorr && isChosen) { cls = "is-correct"; icon = "fa-check-circle"; }
          else if (isChosen && !isCorr) { cls = "is-wrong"; icon = "fa-times-circle"; }
          else if (isCorr && !isChosen) { cls = "is-correct"; icon = "fa-check-circle"; } // Hiện đáp án đúng bị bỏ lỡ
          
          html += `<div class="opt-item ${cls}"><i class="fas ${icon}"></i>${opt}</div>`;
        });
        return html;
      }
    }

    // Dạng Sắp xếp (Ordering)
    if (type === "ordering") {
      html += `<div class="d-label">Thứ tự bạn đã xếp</div>`;
      html += `<div class="opt-item ${status==='correct'?'is-correct':'is-wrong'}">
                 <i class="fas fa-list-ol"></i> ${studentAns ? String(studentAns).replace(/\|/g, " ➔ ") : "(Chưa làm)"}
               </div>`;
      if (status !== 'correct') {
        html += `<div class="divider"></div><div class="d-label">Thứ tự đúng</div>`;
        html += `<div class="correct-answer-box"><i class="fas fa-star"></i>${String(correctAns).replace(/\|/g, " ➔ ")}</div>`;
      }
      return html;
    }

    // Dạng Nối chéo (Matching)
    if (type === "matching") {
      html += `<div class="d-label">Các cặp bạn ghép</div>`;
      html += `<div class="opt-item ${status==='correct'?'is-correct':'is-wrong'}">
                 <i class="fas fa-link"></i> ${studentAns ? String(studentAns).replace(/\|/g, "<br>") : "(Chưa ghép)"}
               </div>`;
      if (status !== 'correct') {
        html += `<div class="divider"></div><div class="d-label">Đáp án đúng</div>`;
        html += `<div class="correct-answer-box"><i class="fas fa-star"></i>${String(correctAns).replace(/\|/g, "<br>")}</div>`;
      }
      return html;
    }

    // Dạng Điền khuyết (Fill) hoặc khác
    if (studentAns) {
      html += `<div class="d-label">Bài làm của bạn</div>`;
      html += `<div class="opt-item ${status === 'correct' ? 'is-correct' : 'is-wrong'}">
                 <i class="fas ${status === 'correct' ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>
                 ${studentAns}
               </div><div class="divider"></div>`;
    } else {
      html += `<div class="opt-item is-wrong"><i class="fas fa-minus"></i>(Không có câu trả lời)</div><div class="divider"></div>`;
    }

    html += `<div class="d-label">Đáp án đúng</div>`;
    html += `<div class="correct-answer-box"><i class="fas fa-star"></i>${correctAns || "—"}</div>`;
    return html;
  }

  // ── QUAY LẠI ──
  function backToList() {
    document.getElementById("viewDetail").style.display = "none";
    document.getElementById("viewList").style.display   = "block";
  }
</script>
</body>

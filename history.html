<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Sử Bài Làm | Nebula Quiz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4facfe; --accent: #00ffcc; --bg: #0b0f1a;
      --card: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      background: var(--bg) url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
      background-size: cover; background-blend-mode: overlay;
      color: var(--text); padding: 20px;
    }

    .container { width: 100%; max-width: 850px; margin: 0 auto; }
    
    .header-box {
      background: var(--card); backdrop-filter: blur(15px);
      padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border);
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .btn-select {
      padding: 12px 24px; background: linear-gradient(135deg, var(--primary), #00f2fe);
      color: #0b0f1a; border: none; border-radius: 12px; 
      cursor: pointer; text-decoration: none; font-weight: bold;
      display: flex; align-items: center; gap: 8px; transition: 0.3s;
    }
    .btn-select:hover { transform: translateY(-2px); filter: brightness(1.1); }

    .history-item {
      background: var(--card); border-radius: 15px; border: 1px solid var(--glass-border);
      margin-bottom: 12px; overflow: hidden; transition: 0.3s;
    }

    .item-summary {
      padding: 18px 25px; display: grid; grid-template-columns: 2fr 1fr 1fr;
      align-items: center; cursor: pointer;
    }

    .test-name { font-weight: 700; color: var(--accent); font-size: 1.1rem; }
    .test-time { color: #94a3b8; font-size: 0.8rem; margin-top: 4px; }
    .score-box { text-align: center; font-size: 1.3rem; font-weight: 800; color: #fff; }
    .correct-box { text-align: right; color: #94a3b8; font-size: 0.9rem; }

    .loader { text-align: center; padding: 50px; }
    .fa-spin { font-size: 2.5rem; color: var(--primary); margin-bottom: 15px; }

    .no-data { text-align: center; padding: 100px 20px; opacity: 0.6; }
    
    @media (max-width: 600px) {
      .item-summary { grid-template-columns: 1fr; gap: 10px; text-align: center; }
      .correct-box { text-align: center; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-box">
    <div>
      <h2 style="color: #fff;">Lịch Sử Bài Làm</h2>
      <p id="studentDisplay" style="color: var(--primary); font-size: 0.9rem;"></p>
    </div>
    <a href="select.html" class="btn-select">
      <i class="fas fa-edit"></i> Làm bài tiếp
    </a>
  </div>

  <div id="historyList">
    <div class="loader">
      <i class="fas fa-spinner fa-spin"></i>
      <p>Đang quét dữ liệu từ vệ tinh...</p>
    </div>
  </div>
</div>

<script>
  // LINK API được dán tại đây
  const API_URL = "https://script.google.com/macros/s/AKfycbyX7PCWMwmKw86Iv3fsGX8vwTMYOCovEupXgxbzKLP7kSwMIoiVOfiQ1c60IR3tc4Hr/exec";

  window.onload = () => {
    const name = localStorage.getItem("studentName") || "Học sinh";
    const school = localStorage.getItem("studentClass") || localStorage.getItem("schoolName") || "";
    document.getElementById("studentDisplay").innerText = `🚀 Tên Học Sinh: ${name} ${school ? ' | ' + school : ''}`;
    
    fetchHistoryFromSheets(name);
  };

  async function fetchHistoryFromSheets(studentName) {
    const container = document.getElementById("historyList");
    
    try {
      // Gọi API lấy dữ liệu (Action getResults bạn cần thêm vào Apps Script)
      const response = await fetch(`${API_URL}?action=getResults`);
      const allData = await response.json();

      // Lọc dữ liệu của học sinh hiện tại
      const myHistory = allData.filter(row => row.student === studentName);

      if (myHistory.length === 0) {
        container.innerHTML = `<div class="no-data"><i class="fas fa-ghost fa-3x"></i><p style="margin-top:15px">Chưa có dữ liệu bài làm trên hệ thống.</p></div>`;
        return;
      }

      // Hiển thị danh sách (Bài mới nhất lên đầu)
      container.innerHTML = "";
      myHistory.reverse().forEach(record => {
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerHTML = `
          <div class="item-summary">
            <div>
              <div class="test-name">${record.testName}</div>
              <div class="test-time"><i class="far fa-calendar-alt"></i> ${record.time}</div>
            </div>
            <div class="score-box">${record.score} <small style="font-size:0.7rem">ĐIỂM</small></div>
            <div class="correct-box">
               <span style="color: var(--accent)"><i class="fas fa-check-circle"></i> ${record.total}</span>
            </div>
          </div>
        `;
        container.appendChild(item);
      });

    } catch (error) {
      console.error("Lỗi:", error);
      container.innerHTML = `<div class="no-data"><p style="color: #ff4757">Không thể kết nối với máy chủ dữ liệu.</p></div>`;
    }
  }
</script>

</body>
</html>

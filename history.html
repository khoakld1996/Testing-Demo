<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch Sử Bài Làm | Nebula Quiz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4facfe; --accent: #00ffcc; --bg: #0b0f1a;
      --card: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      background: var(--bg) url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
      background-size: cover; background-blend-mode: overlay;
      color: var(--text); padding: 20px;
    }

    .container { width: 100%; max-width: 850px; margin: 0 auto; }
    
    .header-box {
      background: var(--card); backdrop-filter: blur(15px);
      padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border);
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .btn-select {
      padding: 12px 24px; background: linear-gradient(135deg, var(--primary), #00f2fe);
      color: #0b0f1a; border: none; border-radius: 12px; 
      cursor: pointer; text-decoration: none; font-weight: bold;
      display: flex; align-items: center; gap: 8px; transition: 0.3s;
    }
    .btn-select:hover { transform: translateY(-2px); filter: brightness(1.1); }

    .history-item {
      background: var(--card); border-radius: 15px; border: 1px solid var(--glass-border);
      margin-bottom: 12px; overflow: hidden; transition: 0.3s;
      backdrop-filter: blur(10px);
    }

    .item-summary {
      padding: 18px 25px; 
      display: grid; 
      grid-template-columns: 1fr 80px 100px; /* Cố định độ rộng cột để không bị đè chữ */
      align-items: center; 
      gap: 15px;
    }

    .test-name { font-weight: 700; color: var(--accent); font-size: 1.1rem; line-height: 1.3; }
    .test-time { color: #94a3b8; font-size: 0.85rem; margin-top: 6px; }
    
    .score-box { 
      text-align: center; 
      font-size: 1.5rem; 
      font-weight: 900; 
      color: #fff;
    }
    .score-label { font-size: 0.6rem; font-weight: 400; color: var(--primary); margin-top: -4px; }

    .correct-box { 
      text-align: right; 
      color: var(--accent); 
      font-size: 0.95rem; 
      font-weight: 600;
      white-space: nowrap;
    }

    .loader { text-align: center; padding: 50px; }
    .fa-spin { font-size: 2.5rem; color: var(--primary); margin-bottom: 15px; }
    .no-data { text-align: center; padding: 100px 20px; opacity: 0.6; }
    
    @media (max-width: 600px) {
      .item-summary { grid-template-columns: 1fr 1fr; }
      .score-box { text-align: left; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-box">
    <div>
      <h2 style="color: #fff;">Lịch Sử Bài Làm</h2>
      <p id="studentDisplay" style="color: var(--primary); font-size: 0.9rem; margin-top: 5px;"></p>
    </div>
    <a href="select.html" class="btn-select">
      <i class="fas fa-play-circle"></i> Tiếp tục
    </a>
  </div>

  <div id="historyList">
    <div class="loader">
      <i class="fas fa-spinner fa-spin"></i>
      <p>Đang đồng bộ dữ liệu...</p>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzAnLalxZL4W3fcKLrScY-xI4gv1Pez9oYRC5z7kueRQVXDGvuigJ-NbN45dJoBLQBg/exec";

  // Hàm định dạng ngày tháng sang Việt Nam
  function formatTime(val) {
    if (!val) return "---";
    const d = new Date(val);
    if (isNaN(d.getTime())) return val;
    return d.toLocaleString('vi-VN', {
      hour: '2-digit', minute: '2-digit',
      day: '2-digit', month: '2-digit', year: 'numeric'
    });
  }

  window.onload = () => {
    const name = localStorage.getItem("studentName") || "Học sinh";
    const school = localStorage.getItem("className") || localStorage.getItem("schoolName") || "";
    document.getElementById("studentDisplay").innerText = `🚀 Thí sinh: ${name} ${school ? ' | ' + school : ''}`;
    fetchHistoryFromSheets(name);
  };

  async function fetchHistoryFromSheets(studentName) {
    const container = document.getElementById("historyList");
    
    try {
      const response = await fetch(`${API_URL}?action=getResults`);
      const allData = await response.json();

      const myHistory = allData.filter(row => String(row.student).trim() === studentName.trim());

      if (myHistory.length === 0) {
        container.innerHTML = `<div class="no-data"><p>Bạn chưa thực hiện bài thi nào.</p></div>`;
        return;
      }

      container.innerHTML = "";
      myHistory.reverse().forEach(record => {
        const item = document.createElement("div");
        item.className = "history-item";
        
        // KIỂM TRA LỖI KHOANH ĐỎ: Nếu total là ngày tháng thì biến nó thành "Xong" 
        // hoặc giữ nguyên nếu nó là dạng "3/3"
        let totalVal = String(record.total);
        if (totalVal.includes('T') && totalVal.includes('Z')) {
            totalVal = "Hoàn thành";
        }

        // Tương tự cho score nếu bị lỗi ngày tháng
        let scoreVal = String(record.score);
        if (scoreVal.includes('T') && scoreVal.includes('Z')) {
            scoreVal = "---";
        }

        item.innerHTML = `
          <div class="item-summary">
            <div>
              <div class="test-name">${record.testName || 'Bài thi'}</div>
              <div class="test-time"><i class="far fa-clock"></i> ${formatTime(record.time)}</div>
            </div>
            <div class="score-box">
                ${scoreVal}
                <div class="score-label">ĐIỂM</div>
            </div>
            <div class="correct-box">
               <i class="fas fa-check-double"></i> ${totalVal}
            </div>
          </div>
        `;
        container.appendChild(item);
      });

    } catch (error) {
      container.innerHTML = `<div class="no-data"><p>Lỗi kết nối máy chủ.</p></div>`;
    }
  }
</script>

</body>
</html>

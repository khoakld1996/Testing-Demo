<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Lịch Sử Bài Làm | Nebula</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="hist-pg-body">
<div class="hist-pg-wrap">

  <!-- Header -->
  <div class="hist-pg-header">
    <h2><i class="fas fa-history"></i> Lịch Sử Bài Làm</h2>
    <a href="select.html" class="btn btn-glow"><i class="fas fa-play"></i> Thi tiếp</a>
  </div>

  <!-- Tabs -->
  <div class="hist-tabs">
    <button class="hist-tab-btn active" id="tabAll" onclick="switchTab('all')">
      <i class="fas fa-list"></i> Tất cả <span class="hist-tab-count" id="cntAll"></span>
    </button>
    <button class="hist-tab-btn" id="tabSys" onclick="switchTab('sys')">
      <i class="fas fa-database"></i> Hệ thống <span class="hist-tab-count" id="cntSys"></span>
    </button>
    <button class="hist-tab-btn isp-tab" id="tabIsp" onclick="switchTab('isp')">
      <i class="fas fa-rocket"></i> iSpring <span class="hist-tab-count" id="cntIsp"></span>
    </button>
  </div>

  <!-- Stats -->
  <div class="hist-stats-grid">
    <div class="hist-stat-card">
      <h2 id="stTotal" style="color:var(--primary)">0</h2>
      <p><i class="fas fa-book-open" style="margin-right:4px;opacity:.5"></i>Bài làm</p>
    </div>
    <div class="hist-stat-card">
      <h2 id="stAvg" style="color:var(--accent)">—</h2>
      <p><i class="fas fa-chart-line" style="margin-right:4px;opacity:.5"></i>Điểm TB</p>
    </div>
    <div class="hist-stat-card">
      <h2 id="stBest" style="color:var(--ispring)">—</h2>
      <p><i class="fas fa-star" style="margin-right:4px;opacity:.5"></i>Cao nhất</p>
    </div>
  </div>

  <!-- List View -->
  <div id="viewList">
    <div id="histList">
      <div class="hist-loading"><i class="fas fa-spinner fa-spin"></i><span>Đang tải lịch sử...</span></div>
    </div>
  </div>

  <!-- Detail View -->
  <div id="viewDetail" style="display:none">
    <button class="hist-back-btn" onclick="backToList()">
      <i class="fas fa-arrow-left"></i> Quay lại
    </button>
    <div id="detSum" class="hist-det-summary"></div>
    <div id="detQs"></div>
  </div>

</div>
<script src="script.js"></script>
<script>
const API = window.API;
let allRecs = [], curTab = "all";
const studentName = localStorage.getItem("studentName") || "Học sinh";

window.onload = async () => { await loadHistory(); };

async function loadHistory() {
  try {
    const [sysRes, ispRes] = await Promise.all([
      fetch(API + "?action=getResults&student=" + encodeURIComponent(studentName)).then(r => r.json()),
      fetch(API + "?action=getIspringResults&student=" + encodeURIComponent(studentName)).then(r => r.json())
    ]);
    const sys = (Array.isArray(sysRes) ? sysRes : [])
      .filter(r => String(r.student).trim().toLowerCase() === studentName.toLowerCase())
      .map(r => ({ ...r, _type: "sys" }));
    const isp = (Array.isArray(ispRes) ? ispRes : [])
      .filter(r => String(r.student).trim().toLowerCase() === studentName.toLowerCase())
      .map(r => ({ ...r, _type: "isp" }));
    allRecs = [...sys, ...isp].sort((a,b) => nbParseDate(b.time) - nbParseDate(a.time));
    updateStats(); updateCounts(); renderList(curTab);
  } catch(e) {
    document.getElementById("histList").innerHTML = '<div class="nodata"><i class="fas fa-wifi" style="font-size:2rem;display:block;margin-bottom:10px"></i>Lỗi kết nối</div>';
  }
}

function updateStats() {
  const sc = allRecs.map(r => parseFloat(r.score)||0);
  document.getElementById("stTotal").textContent = allRecs.length;
  document.getElementById("stAvg").textContent   = sc.length ? (sc.reduce((a,b)=>a+b,0)/sc.length).toFixed(1) : "—";
  document.getElementById("stBest").textContent  = sc.length ? Math.max(...sc).toFixed(1) : "—";
}

function updateCounts() {
  const s = allRecs.filter(r=>r._type==="sys").length;
  const i = allRecs.filter(r=>r._type==="isp").length;
  document.getElementById("cntAll").textContent = `(${allRecs.length})`;
  document.getElementById("cntSys").textContent = `(${s})`;
  document.getElementById("cntIsp").textContent = `(${i})`;
}

function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll(".hist-tab-btn").forEach(b => b.classList.remove("active"));
  ({ all:"tabAll",sys:"tabSys",isp:"tabIsp" })[tab] && document.getElementById(({ all:"tabAll",sys:"tabSys",isp:"tabIsp" })[tab]).classList.add("active");
  renderList(tab);
}

function renderList(tab) {
  const el = document.getElementById("histList");
  const recs = allRecs.filter(r => tab==="sys"?r._type==="sys":tab==="isp"?r._type==="isp":true);
  if (!recs.length) { el.innerHTML='<div class="nodata"><i class="fas fa-inbox" style="font-size:2rem;display:block;margin-bottom:10px"></i>Chưa có lịch sử</div>'; return; }
  el.innerHTML = recs.map(r => {
    const isp   = r._type==="isp";
    const name  = (r.testName||"").replace(/\[iSpring\]/ig,"").trim();
    const score = parseFloat(r.score||0).toFixed(1).replace(/\.0$/,"");
    const col   = score>=8?"var(--accent)":score>=5?"var(--primary)":"var(--danger)";
    const badge = isp
      ? `<span class="hist-badge badge-isp"><i class="fas fa-rocket"></i> iSpring</span>`
      : `<span class="hist-badge badge-sys"><i class="fas fa-database"></i> Hệ thống</span>`;
    return `<div class="hist-item" onclick="openDetail(${allRecs.indexOf(r)})">
      <div class="hist-item-info">
        <div class="hist-item-name">${name}</div>
        <div class="hist-item-meta"><span><i class="far fa-clock"></i> ${nbFmtTime(r.time)}</span>${badge}</div>
      </div>
      <div class="hist-score" style="color:${col}">${score}</div>
      <i class="fas fa-chevron-right hist-arrow"></i>
    </div>`;
  }).join("");
}

async function openDetail(idx) {
  const rec = allRecs[idx];
  document.getElementById("viewList").style.display   = "none";
  document.getElementById("viewDetail").style.display = "block";
  window.scrollTo(0,0);
  const name  = (rec.testName||"").replace(/\[iSpring\]/ig,"").trim();
  const score = parseFloat(rec.score||0).toFixed(1);
  const isIsp = rec._type==="isp";
  const ispBadge = isIsp ? `<span class="hist-det-badge" style="background:rgba(249,115,22,.12);color:var(--ispring);border-color:rgba(249,115,22,.25)"><i class="fas fa-rocket"></i> iSpring</span>` : "";
  document.getElementById("detSum").innerHTML = `
    <h3>${name}</h3>
    <div class="hist-det-badges">
      <span class="hist-det-badge score"><i class="fas fa-star"></i> ${score} điểm</span>
      <span class="hist-det-badge"><i class="fas fa-check-double"></i> ${rec.total||"—"}</span>
      <span class="hist-det-badge"><i class="far fa-clock"></i> ${nbFmtTime(rec.time)}</span>
      ${ispBadge}
    </div>`;
  const qEl = document.getElementById("detQs");
  if (isIsp) {
    qEl.innerHTML = `<div class="hist-stat-card" style="text-align:center;padding:36px 20px"><i class="fas fa-rocket fa-3x" style="color:var(--ispring);display:block;margin-bottom:14px"></i><p style="opacity:.65">Bài thi iSpring không lưu chi tiết câu hỏi.</p></div>`;
    return;
  }
  qEl.innerHTML = '<div class="hist-loading"><i class="fas fa-spinner fa-spin"></i><span>Đang tải câu hỏi...</span></div>';
  try {
    const tests = await fetch(API+"?action=getTests").then(r=>r.json());
    const found = tests.find(t=>(t.name||"").trim().toLowerCase()===name.toLowerCase());
    if (!found) { qEl.innerHTML='<div class="nodata">Không tìm thấy đề thi</div>'; return; }
    const qlist = await fetch(API+"?action=getQuestions&testId="+found.id).then(r=>r.json());
    let ans = {};
    try { ans = typeof rec.answers==="string"?JSON.parse(rec.answers):(rec.answers||{}); } catch(e){}
    if (!qlist.length) { qEl.innerHTML='<div class="nodata">Chưa có câu hỏi</div>'; return; }
    const icons  = { c:"check-circle",  w:"times-circle", u:"minus-circle" };
    const colors = { c:"var(--accent)", w:"var(--danger)", u:"var(--muted)" };
    qEl.innerHTML = qlist.map((q,i) => {
      const sa = ans[q.question]||"", ca = String(q.correct||"").trim();
      const ok = typeof nbCheckAns==="function"?nbCheckAns(q.type,sa,ca):false;
      const st = !sa?"u":ok?"c":"w";
      return `<div class="hist-q-card"><i class="fas fa-${icons[st]}" style="color:${colors[st]}"></i><span>${i+1}. ${q.question}</span></div>`;
    }).join("");
  } catch(e) { qEl.innerHTML='<div class="nodata">Lỗi tải câu hỏi</div>'; }
}

function backToList() {
  document.getElementById("viewDetail").style.display = "none";
  document.getElementById("viewList").style.display   = "block";
}
</script>
</body>
</html>

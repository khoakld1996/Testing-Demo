<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <!-- ✅ QUAN TRỌNG CHO MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <div class="container">
    <div class="box">

      <h2>📊 Kết quả</h2>

      <p id="name"></p>
      <p id="score"></p>
      <p id="percent"></p>

      <button class="btn" onclick="go('index.html')">Về trang chủ</button>

    </div>
  </div>
</div>

<script>
let name = localStorage.getItem("username");
let score = parseInt(localStorage.getItem("score") || 0);
let total = parseInt(localStorage.getItem("total") || 0);

document.getElementById("name").innerText = "Học sinh: " + name;
document.getElementById("score").innerText = "Điểm: " + score + "/" + total;

let percent = total ? Math.round((score / total) * 100) : 0;
document.getElementById("percent").innerText = "Tỉ lệ: " + percent + "%";
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nebula | iSpring</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --p:#4facfe; --a:#00ffcc; --o:#f97316; --d:#ff4757;
      --bg:#0b0f1a; --bd:rgba(255,255,255,.1);
      --sf:rgba(15,23,42,.97); --mu:rgba(255,255,255,.45);
      --hh:52px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:#f1f5f9;
      font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

    /* HEADER */
    #hdr{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--hh);
      display:flex;align-items:center;padding:0 12px;gap:8px;
      background:rgba(11,15,26,.98);border-bottom:1px solid var(--bd);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
    .hl{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden}
    .hl i{color:var(--o);font-size:1rem;flex-shrink:0}
    .hn{font-size:.84rem;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;
      text-overflow:ellipsis;flex:1}
    .hbg{font-size:.58rem;padding:2px 7px;border-radius:20px;font-weight:700;
      background:rgba(249,115,22,.15);color:var(--o);border:1px solid rgba(249,115,22,.3);
      flex-shrink:0;white-space:nowrap}
    .hr{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .hst{font-size:.68rem;color:var(--mu);max-width:88px;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis}
    @media(max-width:400px){.hst{display:none}}

    #pgb{position:fixed;top:var(--hh);left:0;right:0;height:2px;
      background:rgba(249,115,22,.15);z-index:499}
    #pgf{height:100%;width:0;background:var(--o);transition:width .5s;border-radius:2px}

    /* EXIT BTN */
    #btnX{display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:10px;
      border:none;font-size:.72rem;font-weight:700;font-family:inherit;
      transition:.2s;cursor:pointer;white-space:nowrap}
    #btnX.lk{background:rgba(255,255,255,.05);color:rgba(255,255,255,.2);
      cursor:not-allowed;pointer-events:none}
    #btnX.wn{background:rgba(249,115,22,.14);color:var(--o);
      border:1px solid rgba(249,115,22,.3)}
    #btnX.fr{background:rgba(255,71,87,.14);color:var(--d);
      border:1px solid rgba(255,71,87,.25)}
    #btnX.wn:active,#btnX.fr:active{opacity:.7}

    /* FRAME */
    #wrap{position:fixed;top:calc(var(--hh) + 2px);left:0;right:0;bottom:0}
    #frame{width:100%;height:100%;border:none;display:block}

    /* LOADING */
    #ld{position:fixed;inset:0;z-index:900;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .sp{width:44px;height:44px;border:3px solid rgba(249,115,22,.2);
      border-top-color:var(--o);border-radius:50%;animation:sp .8s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .lt{font-size:.86rem;color:var(--mu)}
    .ln{font-size:.74rem;color:var(--o);font-weight:600;max-width:260px;text-align:center}

    /* CONFIRM DIALOG */
    #dlg{display:none;position:fixed;inset:0;z-index:9000;
      background:rgba(5,8,20,.92);backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      align-items:center;justify-content:center;padding:20px}
    #dlg.on{display:flex}
    .db{background:var(--sf);border:1px solid rgba(249,115,22,.3);
      border-radius:22px;padding:28px 22px;max-width:340px;width:100%;
      text-align:center;animation:pi .2s cubic-bezier(.34,1.56,.64,1)}
    @keyframes pi{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
    .de{font-size:2rem;margin-bottom:10px}
    .dh{font-size:1.05rem;font-weight:800;margin-bottom:7px}
    .dp{font-size:.8rem;color:var(--mu);line-height:1.6;margin-bottom:20px}
    .dbs{display:flex;flex-direction:column;gap:9px}
    .dbt{padding:13px;border-radius:12px;border:none;cursor:pointer;
      font-size:.82rem;font-weight:700;font-family:inherit;transition:.2s}
    .dbt:active{opacity:.72}
    .ds{background:rgba(79,172,254,.14);color:var(--p);border:1px solid rgba(79,172,254,.25)}
    .ds:hover{background:var(--p);color:#0b0f1a}
    .dl{background:rgba(255,71,87,.1);color:var(--d);border:1px solid rgba(255,71,87,.2)}
    .dl:hover{background:var(--d);color:#fff}

    /* RESULT */
    #res{display:none;position:fixed;inset:0;z-index:8000;background:var(--bg);
      overflow-y:auto;-webkit-overflow-scrolling:touch}
    #res.on{display:block}
    .ri{min-height:100%;display:flex;align-items:center;justify-content:center;
      padding:20px 14px 44px}
    .rc{width:100%;max-width:420px;background:rgba(15,23,42,.97);
      border:1px solid var(--bd);border-radius:24px;padding:30px 22px;
      text-align:center;box-shadow:0 28px 70px rgba(0,0,0,.65)}
    .rt{font-size:3.4rem;margin-bottom:8px;animation:fl 3s ease-in-out infinite}
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .rh{font-size:1.6rem;font-weight:900;margin-bottom:4px;
      background:linear-gradient(to right,#fff,var(--a));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .rs{font-size:.65rem;color:var(--mu);text-transform:uppercase;
      letter-spacing:2px;margin-bottom:22px}

    /* ring */
    .rg{position:relative;width:128px;height:128px;margin:0 auto 22px}
    .rg svg{position:absolute;inset:0;transform:rotate(-90deg)}
    .rb{fill:none;stroke:rgba(249,115,22,.15);stroke-width:7}
    .rf{fill:none;stroke:var(--o);stroke-width:7;stroke-linecap:round;
      transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
    .rin{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center}
    .rsc{font-size:2.5rem;font-weight:900;line-height:1;
      background:linear-gradient(135deg,#fff,var(--o));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .rl{font-size:.6rem;color:var(--o);font-weight:700;margin-top:2px}

    /* info box */
    .ib{background:rgba(0,0,0,.22);border-radius:16px;
      border:1px solid var(--bd);padding:14px 16px;margin-bottom:20px}
    .ir{display:flex;justify-content:space-between;align-items:center;
      padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.82rem}
    .ir:last-child{border:none}
    .il{color:var(--mu);display:flex;align-items:center;gap:7px}
    .iv{font-weight:700;color:#fff;text-align:right;max-width:55%}
    .iv.g{color:var(--a)} .iv.w{color:var(--o)} .iv.b{color:var(--d)}

    /* sync */
    #sy{font-size:.72rem;margin-bottom:14px;display:flex;
      align-items:center;justify-content:center;gap:6px;min-height:20px}
    #sy.sav{color:var(--o)} #sy.ok{color:var(--a)} #sy.er{color:var(--d)}

    /* result btns */
    .rbs{display:flex;flex-direction:column;gap:9px}
    .rb2{padding:13px;border-radius:12px;border:none;cursor:pointer;
      font-size:.83rem;font-weight:700;font-family:inherit;
      display:flex;align-items:center;justify-content:center;gap:7px;transition:.2s}
    .rb2:active{opacity:.75}
    .rry{background:rgba(249,115,22,.13);color:var(--o);border:1px solid rgba(249,115,22,.25)}
    .rry:hover{background:var(--o);color:#fff}
    .rmn{background:linear-gradient(135deg,var(--p),#00f2fe);color:#0b0f1a}
    .rmn:hover{filter:brightness(1.08)}
    .rhs{background:rgba(255,255,255,.05);color:rgba(255,255,255,.65);border:1px solid var(--bd)}
    .rhs:hover{background:rgba(255,255,255,.1)}

    /* ERROR */
    #er{display:none;position:fixed;inset:0;z-index:9900;background:var(--bg);
      flex-direction:column;align-items:center;justify-content:center;
      gap:12px;padding:24px;text-align:center}
    #er.on{display:flex}
    .eic{font-size:2.8rem;color:var(--d)}
    .eh{font-size:1.15rem;font-weight:800}
    .ep{font-size:.8rem;color:var(--mu);line-height:1.6;max-width:280px}
    .eb{margin-top:6px;padding:11px 24px;border-radius:12px;border:none;
      background:rgba(79,172,254,.14);color:var(--p);
      border:1px solid rgba(79,172,254,.25);
      cursor:pointer;font-size:.82rem;font-weight:700;font-family:inherit}
    .eb:hover{background:var(--p);color:#0b0f1a}

    @media(max-width:420px){
      :root{--hh:48px}
      .rc{padding:24px 16px}
      .rg{width:116px;height:116px}
      .rsc{font-size:2.1rem}
      .rh{font-size:1.4rem}
    }
  </style>
</head>
<body>
<div id="hdr">
  <div class="hl"><i class="fas fa-rocket"></i>
    <span class="hn" id="hdT">Đang tải...</span>
    <span class="hbg">iSpring</span>
  </div>
  <div class="hr">
    <span class="hst" id="hdS"></span>
    <button id="btnX" class="lk" onclick="onExit()"><i class="fas fa-times"></i> Thoát</button>
  </div>
</div>
<div id="pgb"><div id="pgf"></div></div>

<div id="wrap"><iframe id="frame" allow="fullscreen" allowfullscreen></iframe></div>

<div id="ld">
  <div class="sp"></div>
  <div class="lt">Đang tải bài học...</div>
  <div class="ln" id="ldN"></div>
</div>

<div id="dlg">
  <div class="db">
    <div class="de">⚠️</div>
    <div class="dh">Thoát bài thi?</div>
    <div class="dp">Bài làm <b>chưa hoàn thành</b>.<br>Kết quả sẽ không được lưu nếu thoát lúc này.</div>
    <div class="dbs">
      <button class="dbt ds" onclick="closeDlg()"><i class="fas fa-arrow-left"></i> Tiếp tục làm bài</button>
      <button class="dbt dl" onclick="forceExit()"><i class="fas fa-door-open"></i> Thoát không lưu</button>
    </div>
  </div>
</div>

<div id="res">
  <div class="ri"><div class="rc">
    <div class="rt" id="rTr">🏆</div>
    <div class="rh" id="rTi">HOÀN THÀNH!</div>
    <div class="rs">KẾT QUẢ BÀI THI iSPRING</div>
    <div class="rg">
      <svg viewBox="0 0 128 128" width="128" height="128">
        <circle class="rb" cx="64" cy="64" r="55"/>
        <circle class="rf" id="rfg" cx="64" cy="64" r="55"
                stroke-dasharray="345.4" stroke-dashoffset="345.4"/>
      </svg>
      <div class="rin"><div class="rsc" id="rSc">0</div><div class="rl">/ 100</div></div>
    </div>
    <div class="ib">
      <div class="ir"><span class="il"><i class="fas fa-user"></i> Thí sinh</span><span class="iv" id="rNm">—</span></div>
      <div class="ir"><span class="il"><i class="fas fa-school"></i> Trường/Lớp</span><span class="iv" id="rSch">—</span></div>
      <div class="ir"><span class="il"><i class="fas fa-file-alt"></i> Bài thi</span><span class="iv" id="rTs">—</span></div>
      <div class="ir"><span class="il"><i class="fas fa-star-half-alt"></i> Trạng thái</span><span class="iv" id="rSt">—</span></div>
    </div>
    <div id="sy" class="sav"><i class="fas fa-circle-notch fa-spin"></i> Đang lưu kết quả...</div>
    <div class="rbs">
      <button class="rb2 rry" onclick="retry()"><i class="fas fa-redo"></i> Làm lại bài này</button>
      <button class="rb2 rmn" onclick="goSel()"><i class="fas fa-list"></i> Về danh sách bài thi</button>
      <button class="rb2 rhs" onclick="goHist()"><i class="fas fa-history"></i> Xem lịch sử làm bài</button>
    </div>
  </div></div>
</div>

<div id="er">
  <div class="eic"><i class="fas fa-exclamation-circle"></i></div>
  <div class="eh" id="erH">Lỗi tải bài</div>
  <div class="ep" id="erP">Không tìm thấy đường dẫn.</div>
  <button class="eb" onclick="goSel()"><i class="fas fa-arrow-left"></i> Quay lại</button>
</div>

<script>
var API  = "https://script.google.com/macros/s/AKfycbxR9imqpVxYMB4M7CmV_C-ZiVO9nhRJTGwz44O0dlz0_Ru1dbBuToiOj8ciUE0TgSWT/exec";
var p    = new URLSearchParams(location.search);
var path = (p.get("path")||"").trim();
var sn   = localStorage.getItem("studentName")  || "Ẩn danh";
var sc   = localStorage.getItem("schoolName")   || "";
var cl   = localStorage.getItem("className")    || "";
var isn  = localStorage.getItem("currentIspringName") || "";

var state = "idle"; /* idle | doing | done */
var done_f= false;
var ss    = 0;  /* scorm score */
var sst   = ""; /* scorm status */

(function boot(){
  document.getElementById("hdS").textContent = sn;
  document.getElementById("ldN").textContent = isn;
  if (!path){ showErr("Không có đường dẫn","Quay lại chọn bài iSpring."); return; }
  var nm = isn || path.split("/").slice(-2,-1)[0] || "iSpring";
  document.getElementById("hdT").textContent = nm;
  document.title = "Nebula | " + nm;
  var fr = document.getElementById("frame");
  fr.src = path;
  fr.onload = function(){ hide("ld"); state="doing"; setX("wn"); pg(30); };
  fr.onerror= function(){ showErr("Không tải được bài","Đường dẫn không tồn tại."); };
})();

/* SCORM 1.2 */
window.API={
  LMSInitialize:function(){return"true"},LMSFinish:function(){return"true"},
  LMSGetValue:function(){return""},LMSGetLastError:function(){return"0"},
  LMSGetErrorString:function(){return"No error"},LMSGetDiagnostic:function(){return""},
  LMSSetValue:function(k,v){
    if(k==="cmi.core.score.raw")ss=parseFloat(v)||0;
    if(k==="cmi.core.lesson_status")sst=String(v).toLowerCase();
    return"true";
  },
  LMSCommit:function(){
    if(sst==="passed"||sst==="completed"||sst==="failed")onDone();
    return"true";
  }
};

/* SCORM 2004 */
window.API_1484_11={
  Initialize:function(){return"true"},Terminate:function(){onDone();return"true"},
  GetValue:function(){return""},GetLastError:function(){return"0"},
  GetErrorString:function(){return"No error"},GetDiagnostic:function(){return""},
  SetValue:function(k,v){
    if(k==="cmi.score.raw")ss=parseFloat(v)||0;
    if(k==="cmi.success_status"||k==="cmi.completion_status")sst=String(v).toLowerCase();
    return"true";
  },
  Commit:function(){onDone();return"true"}
};

function onDone(){
  if(state==="done")return;
  state="done"; setX("fr"); pg(100);
  showRes(ss, sst||"completed");
  saveRes(ss, sst||"completed");
}

function showRes(score,status){
  var el=document.getElementById("res"); el.classList.add("on"); el.scrollTop=0;
  var tr=document.getElementById("rTr"),ti=document.getElementById("rTi");
  if(score>=80){tr.textContent="👑";ti.textContent="XUẤT SẮC!";}
  else if(score>=50){tr.textContent="🚀";ti.textContent="TỐT LẮM!";}
  else{tr.textContent="🎯";ti.textContent="CỐ GẮNG LÊN!";}
  var cx=cl?" · "+cl:"";
  document.getElementById("rNm").textContent  = sn;
  document.getElementById("rSch").textContent = sc.replace(/^'+/,"")+cx;
  document.getElementById("rTs").textContent  = isn||"Bài thi iSpring";
  var se=document.getElementById("rSt");
  var sm={passed:"Đạt ✓",completed:"Hoàn thành ✓",failed:"Chưa đạt ✗",incomplete:"Chưa xong"};
  se.textContent=sm[status]||"Hoàn thành";
  se.className="iv "+(status==="passed"||status==="completed"?"g":status==="failed"?"b":"w");
  animN("rSc",0,score,1100);
  setTimeout(function(){
    var c=345.4;
    document.getElementById("rfg").style.strokeDashoffset=c-(score/100)*c;
  },80);
}

async function saveRes(score,status){
  if(done_f)return; done_f=true;
  var sy=document.getElementById("sy");
  var tn="[iSpring] "+(isn||path.split("/").slice(-2,-1)[0]||"Bài tập");
  sy.className="sav";
  sy.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Đang lưu kết quả...';
  try{
    var r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"submitResult",student:sn,
        school:sc.replace(/^'+/,""),testName:tn,score:score,total:score+"/100",
        answers:JSON.stringify({status:status,source:"iSpring SCORM"})})});
    var j=await r.json();
    if(j.status==="ok"){
      sy.className="ok";
      sy.innerHTML='<i class="fas fa-check-circle"></i> Đã lưu kết quả!';
    }else throw new Error(j.message||"err");
  }catch(e){
    done_f=false;
    sy.className="er";
    sy.innerHTML='<i class="fas fa-exclamation-triangle"></i> Lưu thất bại. '
      +'<u style="cursor:pointer" onclick="saveRes('+score+',\''+status+'\')">Thử lại</u>';
  }
}

function setX(c){
  var b=document.getElementById("btnX"); b.className=c;
  b.innerHTML=c==="lk"?'<i class="fas fa-lock"></i> Thoát'
    :c==="wn"?'<i class="fas fa-sign-out-alt"></i> Thoát'
    :'<i class="fas fa-times"></i> Đóng';
}

function onExit(){
  if(state==="done"){goSel();return;}
  if(state==="doing")document.getElementById("dlg").classList.add("on");
}
function closeDlg(){document.getElementById("dlg").classList.remove("on");}
function forceExit(){goSel();}

function retry(){
  state="idle";done_f=false;ss=0;sst="";
  document.getElementById("res").classList.remove("on");
  document.getElementById("ld").style.display="flex";
  setX("lk");pg(0);
  var fr=document.getElementById("frame");fr.src="";
  setTimeout(function(){
    fr.src=path;
    fr.onload=function(){hide("ld");state="doing";setX("wn");pg(30);};
  },150);
}

history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){
  history.pushState(null,"",location.href);
  if(state==="doing")document.getElementById("dlg").classList.add("on");
  else if(state==="done")goSel();
});

function goSel(){location.href="select.html";}
function goHist(){location.href="history.html";}
function hide(id){document.getElementById(id).style.display="none";}
function pg(v){document.getElementById("pgf").style.width=v+"%";}
function showErr(h,p2){
  hide("ld");
  document.getElementById("erH").textContent=h;
  document.getElementById("erP").textContent=p2;
  document.getElementById("er").classList.add("on");
}
function animN(id,from,to,ms){
  var el=document.getElementById(id);if(!el)return;
  var s=null;
  function step(ts){
    if(!s)s=ts;var p2=Math.min((ts-s)/ms,1);
    var v=(p2*(to-from)+from).toFixed(1);
    el.textContent=v.endsWith(".0")?v.slice(0,-2):v;
    if(p2<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
</script>
</body>
</html>

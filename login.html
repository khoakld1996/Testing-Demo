<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập Giáo viên</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <div class="container">
    <div class="box">

      <h2>Đăng nhập GV</h2>

      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">

      <button class="btn primary" onclick="login()">Đăng nhập</button>
      <button class="btn back-btn" onclick="goHome()">← Trang chủ</button>

      <div id="notify" class="notify"></div>

    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>

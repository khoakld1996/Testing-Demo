<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Nebula | Đăng nhập</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <script src="script.js" defer></script>
</head>
<body class="lgn-body">
  <div class="lgn-dots" aria-hidden="true">
    <span style="left:10%;--dd:10s;--dds:0s"></span>
    <span style="left:35%;--dd:18s;--dds:2s"></span>
    <span style="left:75%;--dd:14s;--dds:5s"></span>
    <span style="left:55%;--dd:12s;--dds:1s"></span>
  </div>
  <div class="lgn-container">
    <div class="lgn-box" id="mainBox">
      <h2 class="lgn-header" id="formHeader">
        <svg viewBox="0 0 24 24" id="headerIcon">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
        <span id="headerText">ĐĂNG NHẬP</span>
      </h2>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="lgn-input-group">
          <label class="lgn-label">Tài khoản</label>
          <div class="lgn-input-wrap">
            <svg class="lgn-input-icon" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            <input id="user" type="text" placeholder="Nhập username..." autocomplete="username">
          </div>
        </div>
        <div class="lgn-input-group">
          <label class="lgn-label">Mật khẩu</label>
          <div class="lgn-input-wrap">
            <svg class="lgn-input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="lgn-pw-toggle" onclick="nbLgnTogglePw('pass',this)" tabindex="-1">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
        </div>
        <button id="btnLogin" class="lgn-btn lgn-btn-primary" onclick="nbLgnHandle('login')">
          Đăng nhập
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor"><path d="M10 17v-3H3v-4h7V7l5 5-5 5zm4-15c1.1 0 2 .9 2 2v3h-2V4H5v16h9v-3h2v3c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h9z"/></svg>
        </button>
        <button id="regToggleBtn" class="lgn-btn lgn-btn-ghost hidden" onclick="nbLgnToggleForm(true)">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Tạo tài khoản học sinh
        </button>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="hidden">
        <div class="lgn-input-group">
          <label class="lgn-label">Họ và Tên</label>
          <div class="lgn-input-wrap">
            <svg class="lgn-input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 2.75c1.24 0 2.25 1.01 2.25 2.25s-1.01 2.25-2.25 2.25S9.75 10.24 9.75 9 10.76 6.75 12 6.75zM17 17H7v-.75c0-1.67 3.33-2.5 5-2.5s5 .83 5 2.5V17z"/></svg>
            <input id="regFullName" type="text" placeholder="Nguyễn Văn A" lang="vi">
          </div>
        </div>
        <div class="lgn-row-2">
          <div class="lgn-input-group">
            <label class="lgn-label">Lớp</label>
            <input class="lgn-input-plain" id="regClass" type="text" placeholder="10A1">
          </div>
          <div class="lgn-input-group lgn-flex2">
            <label class="lgn-label">Trường</label>
            <input class="lgn-input-plain" id="regSchool" type="text" placeholder="Tên trường..." lang="vi">
          </div>
        </div>
        <div class="lgn-input-group">
          <label class="lgn-label">Tên đăng nhập</label>
          <div class="lgn-input-wrap">
            <svg class="lgn-input-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            <input id="regUser" type="text" placeholder="vana123" autocomplete="username">
          </div>
        </div>
        <div class="lgn-input-group">
          <label class="lgn-label">Mật khẩu</label>
          <div class="lgn-input-wrap">
            <svg class="lgn-input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <input id="regPass" type="password" placeholder="••••••••" autocomplete="new-password">
            <button type="button" class="lgn-pw-toggle" onclick="nbLgnTogglePw('regPass',this)" tabindex="-1">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
          <div class="pw-bar" id="regPwBar"></div>
          <span class="pw-hint" id="regPwHint"></span>
        </div>
        <button id="btnReg" class="lgn-btn lgn-btn-register" onclick="nbLgnHandle('register')">
          Gửi yêu cầu
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
        <button class="lgn-btn lgn-btn-ghost" onclick="nbLgnToggleForm(false)">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          Quay lại
        </button>
      </div>

      <a href="index.html" class="lgn-back-link">
        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
        Quay về trang chủ
      </a>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded',function(){
      if(typeof nbLgnInit==='function') nbLgnInit();
    });
  </script>
</body>
</html>

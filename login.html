<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Giáo viên | Quiz System</title>
  
  <style>
    :root {
      --primary: #4facfe;
      --accent: #00ffcc;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --error: #ff4757;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    .container { width: 100%; max-width: 400px; padding: 20px; }

    .box {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px); /* Hỗ trợ Safari trên iPhone */
      border-radius: 25px;
      padding: 40px 30px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 30px;
      letter-spacing: 2px;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-group { margin-bottom: 20px; text-align: left; }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--primary);
      margin-left: 5px;
    }

    input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
      font-size: 1.1rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #00f2fe);
      color: white;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-primary:active { transform: scale(0.98); }

    .back-link {
      margin-top: 25px;
      display: block;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .notify {
      margin-top: 15px;
      font-size: 0.9rem;
      min-height: 20px;
      color: var(--error);
      opacity: 0;
      transition: 0.3s;
    }

    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="box" id="loginBox">
    <h2>🔐 ĐĂNG NHẬP GV</h2>

    <div class="input-group">
      <label>Tài khoản</label>
      <input id="user" type="text" placeholder="Nhập username..." autocomplete="username">
    </div>

    <div class="input-group">
      <label>Mật khẩu</label>
      <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Đăng nhập ngay</button>
    
    <div id="notify" class="notify">Sai tài khoản hoặc mật khẩu!</div>

    <a href="role.html" class="back-link">← Quay lại</a>
  </div>
</div>

<script>
  function handleLogin() {
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const notify = document.getElementById('notify');
    const box = document.getElementById('loginBox');

    // Kiểm tra thông tin
    if (user === "admin" && pass === "123456") {
        notify.style.color = "#00ffcc";
        notify.innerText = "Đang đăng nhập...";
        notify.style.opacity = "1";
        
        // LƯU TRẠNG THÁI CỨNG (Để điện thoại không bị out)
        localStorage.setItem("isTeacherAuthenticated", "true");
        localStorage.setItem("authTimestamp", Date.now());

        setTimeout(() => {
            // Dùng replace để tránh lỗi lưu history trên mobile
            window.location.replace("dashboard.html"); 
        }, 800);
    } else {
        // Hiệu ứng lỗi
        notify.innerText = "Sai tài khoản hoặc mật khẩu!";
        notify.style.opacity = "1";
        box.classList.add('shake');
        setTimeout(() => box.classList.remove('shake'), 400);
    }
  }

  // LỆNH NHẬN PHÍM ENTER ĐỂ ĐĂNG NHẬP
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      handleLogin();
    }
  });

  // Xóa thông báo lỗi khi người dùng bắt đầu gõ lại
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', () => {
      document.getElementById('notify').style.opacity = "0";
    });
  });
</script>

</body>
</html>

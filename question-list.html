<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nebula - Quản Lý Câu Hỏi</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* Chỉ giữ lại CSS đặc thù không có trong style.css */
    .q-thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 1px solid var(--glass-border); cursor: pointer; }
    .no-thumb { width: 70px; height: 70px; border-radius: 12px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.1); border: 1px dashed var(--glass-border); }
    .badge-mcq { background: rgba(68, 138, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
    .badge-tf { background: rgba(0, 229, 255, 0.1); color: var(--secondary); border: 1px solid var(--secondary); }
    .badge-other { background: rgba(124, 77, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); }
    .btn-edit { background: rgba(255, 177, 66, 0.15); color: var(--warning); }
    .btn-edit:hover { background: var(--warning); color: #000; }
    .btn-delete { background: rgba(255, 82, 82, 0.15); color: var(--danger); }
    .btn-delete:hover { background: var(--danger); color: #fff; }
  </style>
</head>
<body style="background: var(--bg); padding: 16px; display: flex; justify-content: center;">

<div class="container animate__animated animate__fadeIn" style="width:100%; max-width:1000px;">
  <div class="glass-panel">
    
    <div class="header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h2 id="testNameDisplay"><i class="fas fa-database"></i> TỔNG KHO CÂU HỎI</h2>
      <div class="search-box" style="position:relative; max-width:300px;">
        <i class="fas fa-search" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--muted);"></i>
        <input type="text" id="searchInput" placeholder="Tìm kiếm câu hỏi..." oninput="filterQuestions()" style="width:100%; padding:12px 20px 12px 45px; border-radius:30px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:#fff;">
      </div>
    </div>

    <div id="questionList" style="max-height:60vh; overflow-y:auto; padding-right:5px;">
      <div style="text-align:center; padding:50px; opacity:0.5;">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
        <p style="margin-top:15px;">Đang quét dữ liệu...</p>
      </div>
    </div>

    <div class="footer" style="display:flex; justify-content:space-between; margin-top:20px;">
      <button class="btn btn-outline" onclick="location.href='dashboard.html'">
        <i class="fas fa-chevron-left"></i> Trang quản trị
      </button>
      <button class="btn btn-glow" onclick="goToAdd()">
        <i class="fas fa-plus-circle"></i> Thêm câu hỏi mới
      </button>
    </div>

  </div>
</div>

<script src="script.js"></script>
<script>
  const API = window.API;
  const currentTest = JSON.parse(localStorage.getItem("currentTest") || "{}");
  let allQuestions = [];

  window.onload = () => {
    if (!currentTest.id) return location.href = 'dashboard.html';
    document.getElementById("testNameDisplay").innerHTML = `<i class="fas fa-microchip"></i> ${currentTest.name.toUpperCase()}`;
    loadQuestions();
  };

  async function loadQuestions() {
    const listEl = document.getElementById("questionList");
    try {
      const resp = await fetch(`${API}?action=getQuestions&testId=${currentTest.id}`);
      allQuestions = await resp.json();
      renderList(allQuestions);
    } catch (err) {
      listEl.innerHTML = `<div style="text-align:center; color:var(--danger); padding:40px;">⚠️ Không thể kết nối Cloud.</div>`;
    }
  }

  function renderList(data) {
    const listEl = document.getElementById("questionList");
    if (!data || data.length === 0) {
      listEl.innerHTML = `<div style="text-align:center; padding:60px; opacity:0.5;"><i class="fas fa-folder-open fa-3x"></i><p>Chưa có câu hỏi nào.</p></div>`;
      return;
    }

    listEl.innerHTML = data.map((q, i) => {
      const type = getBadge(q.type);
      return `
        <div class="q-card animate__animated animate__fadeInUp" style="animation-delay:${i * 0.03}s; display:flex; gap:15px; padding:15px; background:rgba(255,255,255,0.03); border-radius:16px; margin-bottom:12px; border:1px solid var(--glass-border);">
          ${q.image && q.image.length > 20 ? 
            `<img src="${q.image}" class="q-thumb" onclick="previewImg('${q.image}')">` : 
            `<div class="no-thumb"><i class="fas fa-image"></i></div>`}
          
          <div style="flex:1;">
            <span style="display:block; font-weight:600; margin-bottom:8px;">${i+1}. ${q.question}</span>
            <span class="badge ${type.class}"><i class="fas ${type.icon}"></i> ${type.label}</span>
          </div>

          <div style="display:flex; gap:8px;">
            <button class="btn-action btn-edit" onclick="editQuestion(${i})"><i class="fas fa-pen"></i></button>
            <button class="btn-action btn-delete" onclick="deleteQuestion('${q.question}', this)"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `;
    }).join('');
  }

  function getBadge(type) {
    switch(type) {
      case 'tf': return { label: "Đúng/Sai", class: "badge-tf", icon: "fa-check-circle" };
      case 'matching': return { label: "Ghép cặp", class: "badge-other", icon: "fa-clone" };
      case 'ordering': return { label: "Sắp xếp", class: "badge-other", icon: "fa-sort-numeric-down" };
      case 'fill': return { label: "Điền khuyết", class: "badge-other", icon: "fa-keyboard" };
      default: return { label: "Trắc nghiệm", class: "badge-mcq", icon: "fa-list-ul" };
    }
  }

  function filterQuestions() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allQuestions.filter(q => q.question.toLowerCase().includes(term));
    renderList(filtered);
  }

  async function deleteQuestion(qText, btn) {
    const confirm = await Swal.fire({
      title: 'Xác nhận xóa?',
      text: "Dữ liệu sẽ bị xóa vĩnh viễn!",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#ff5252',
      background: '#0a0f1c', color: '#fff',
      confirmButtonText: 'Xóa', cancelButtonText: 'Hủy'
    });

    if (!confirm.isConfirmed) return;

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    btn.disabled = true;

    try {
      const fd = new URLSearchParams();
      fd.append("action", "deleteQuestion");
      fd.append("testId", currentTest.id);
      fd.append("question", qText);

      await fetch(API, { method: "POST", mode: "no-cors", body: fd });
      
      Swal.fire({ icon: 'success', title: 'Đã xóa', timer: 1500, showConfirmButton: false, background: '#0a0f1c', color: '#fff' });
      setTimeout(loadQuestions, 2000);
    } catch (e) {
      Swal.fire("Lỗi", "Không thể xóa!", "error");
      btn.innerHTML = '<i class="fas fa-trash-alt"></i>';
      btn.disabled = false;
    }
  }

  function editQuestion(index) {
    localStorage.setItem("editQuestionData", JSON.stringify(allQuestions[index]));
    location.href = "add-question.html";
  }

  function goToAdd() {
    localStorage.removeItem("editQuestionData");
    location.href = "add-question.html";
  }

  function previewImg(src) {
    Swal.fire({ imageUrl: src, background: '#000', showConfirmButton: false, showCloseButton: true });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula - Quản Lý Câu Hỏi</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

    :root {
      --primary: #448aff;
      --secondary: #00e5ff;
      --danger: #ff5252;
      --warning: #ffb142;
      --bg-dark: #0a0f1c;
      --glass: rgba(15, 23, 42, 0.85);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #7c4dff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                  url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    .container { width: 100%; max-width: 1000px; }

    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 45px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
    }

    .glass-panel::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, #90caf9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    #questionList {
      max-height: 58vh;
      overflow-y: auto;
      padding-right: 15px;
    }

    .q-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .q-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-5px) scale(1.01);
      border-color: rgba(68, 138, 255, 0.5);
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    }

    .q-thumb-container {
      width: 90px; height: 90px;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .q-thumb { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: 0.3s; }
    
    .no-thumb {
      width: 90px; height: 90px;
      background: rgba(255,255,255,0.02);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.1);
      border: 1px dashed rgba(255,255,255,0.1);
    }

    .q-main { flex-grow: 1; overflow: hidden; }
    .q-text {
      display: block;
      font-size: 1.1rem;
      font-weight: 500;
      color: #e2e8f0;
      margin-bottom: 12px;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .tag {
      font-size: 0.7rem;
      padding: 6px 14px;
      border-radius: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
    }
    .tag-mcq { background: rgba(68, 138, 255, 0.15); color: #90caf9; border-color: rgba(68, 138, 255, 0.3); }
    .tag-tf { background: rgba(0, 229, 255, 0.1); color: #00e5ff; border-color: rgba(0, 229, 255, 0.3); }
    .tag-other { background: rgba(124, 77, 255, 0.1); color: #b388ff; border-color: rgba(124, 77, 255, 0.3); }

    .action-controls { display: flex; gap: 12px; }
    .btn-icon {
      width: 44px; height: 44px;
      border-radius: 14px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.3s;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .btn-edit { background: rgba(255, 177, 66, 0.1); color: var(--warning); border-color: rgba(255, 177, 66, 0.3); }
    .btn-edit:hover { background: var(--warning); color: #000; transform: translateY(-3px); }
    
    .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--danger); border-color: rgba(255, 82, 82, 0.3); }
    .btn-del:hover { background: var(--danger); color: #fff; transform: translateY(-3px); }

    .footer-actions {
      margin-top: 45px;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 25px;
    }

    .btn {
      padding: 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: 0.4s;
      color: white;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
    }

    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); }
    .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); }

    .loading-state { text-align: center; padding: 70px; }
    .loading-state i { font-size: 3.5rem; margin-bottom: 25px; color: var(--secondary); text-shadow: 0 0 25px var(--primary); }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
  </style>
</head>

<body>
<div class="container animate__animated animate__fadeIn">
  <div class="glass-panel">
    
    <div class="header">
      <h2 id="testTitle"><i class="fas fa-satellite-dish fa-spin"></i> KẾT NỐI NEBULA...</h2>
      <button class="btn-icon" style="background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.1);" onclick="location.href='dashboard.html'"><i class="fas fa-th-large"></i></button>
    </div>

    <div id="questionList">
      <div class="loading-state">
        <i class="fas fa-atom fa-spin"></i>
        <p>Đang truy xuất luồng dữ liệu câu hỏi...</p>
      </div>
    </div>

    <div class="footer-actions">
      <a href="dashboard.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Quay lại</a>
      <button onclick="goToAdd()" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Thêm câu hỏi mới</button>
    </div>
    
    <div style="text-align: center; margin-top: 40px; opacity: 0.15; font-size: 0.75rem; letter-spacing: 6px;">
      NEBULA QUANTUM INTERFACE • VERSION 2.8
    </div>
  </div>
</div>

<script>
  // Chú ý: Đảm bảo URL API này khớp với bản Deploy mới nhất
  const API = "https://script.google.com/macros/s/AKfycbxd1hGjg_tvNQfA7H1V49ofcIM-dWctzgmeW79KgC1J12WLwbr4QDgicaxe9x2Lq0Et/exec";
  const currentTest = JSON.parse(localStorage.getItem("currentTest") || "{}");
  let listQuestions = [];

  window.onload = function() {
    if (!currentTest.id) { location.href = 'dashboard.html'; return; }
    document.getElementById("testTitle").innerHTML = `<i class="fas fa-microchip"></i> ${currentTest.name.toUpperCase()}`;
    loadQuestions();
  };

  async function loadQuestions() {
    const listEl = document.getElementById("questionList");
    try {
      const response = await fetch(`${API}?action=getQuestions&testId=${currentTest.id}`);
      listQuestions = await response.json();

      if (listQuestions.length === 0) {
        listEl.innerHTML = `
          <div style="text-align:center; padding:70px; opacity:0.3; border: 2px dashed rgba(255,255,255,0.05); border-radius: 30px; margin: 20px 0;">
            <i class="fas fa-ghost fa-4x" style="margin-bottom:25px;"></i>
            <p>Không gian dữ liệu trống.</p>
          </div>`;
        return;
      }

      listEl.innerHTML = listQuestions.map((q, i) => {
        const hasImg = q.image && q.image.length > 20;
        let typeInfo = getTypeInfo(q.type);

        return `
          <div class="q-card animate__animated animate__fadeInUp" style="animation-delay: ${i * 0.05}s">
            ${hasImg ? 
              `<div class="q-thumb-container"><img src="${q.image}" class="q-thumb" onclick="zoomImg('${q.image}')"></div>` : 
              `<div class="no-thumb"><i class="fas fa-atom fa-2x"></i></div>`}
            
            <div class="q-main">
              <span class="q-text" title="${q.question}">${i + 1}. ${q.question}</span>
              <div class="badge-group">
                <span class="tag ${typeInfo.class}"><i class="fas ${typeInfo.icon}"></i> ${typeInfo.name}</span>
              </div>
            </div>

            <div class="action-controls">
              <button class="btn-icon btn-edit" onclick="editQuestion(${i})"><i class="fas fa-edit"></i></button>
              <button class="btn-icon btn-del" onclick="deleteQuestion('${q.question}', this)"><i class="fas fa-trash"></i></button>
            </div>
          </div>`;
      }).join('');
    } catch (err) {
      listEl.innerHTML = `<div style="color:var(--danger); text-align:center; padding:50px;"><p>⚠️ Lỗi kết nối Nebula!</p></div>`;
    }
  }

  function getTypeInfo(type) {
    switch(type) {
      case 'tf': return { name: "Đúng/Sai", class: "tag-tf", icon: "fa-check-double" };
      case 'matching': return { name: "Ghép nối", class: "tag-other", icon: "fa-project-diagram" };
      case 'ordering': return { name: "Sắp xếp", class: "tag-other", icon: "fa-sort-amount-down" };
      case 'fill': return { name: "Điền khuyết", class: "tag-other", icon: "fa-pen-nib" };
      default: return { name: "Trắc nghiệm", class: "tag-mcq", icon: "fa-list-ul" };
    }
  }

  async function deleteQuestion(questionText, btn) {
    const result = await Swal.fire({
      title: 'XÁC NHẬN XÓA?',
      text: "Thao tác này sẽ xóa vĩnh viễn thực thể dữ liệu!",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#ff5252',
      cancelButtonColor: 'rgba(255,255,255,0.1)',
      confirmButtonText: 'XÓA NGAY',
      cancelButtonText: 'HỦY',
      background: '#0a0f1c', 
      color: '#fff'
    });

    if (!result.isConfirmed) return;

    const originalContent = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    btn.disabled = true;

    try {
      // Cách gửi tối ưu cho Apps Script để tránh lỗi CORS/CORB
      const formData = new URLSearchParams();
      formData.append("action", "deleteQuestion");
      formData.append("testId", currentTest.id);
      formData.append("question", questionText);

      await fetch(API, {
        method: "POST",
        mode: "no-cors", // Vẫn dùng no-cors nhưng dữ liệu gửi đi dạng Form sẽ được Script nhận tốt hơn
        body: formData
      });
      
      Swal.fire({ 
        icon: 'success', 
        title: 'ĐANG ĐỒNG BỘ', 
        text: 'Lệnh xóa đã được gửi. Danh sách sẽ cập nhật sau giây lát.',
        timer: 2000, 
        showConfirmButton: false, 
        background: '#0a0f1c', 
        color: '#fff' 
      });

      // Đợi server xử lý xong rồi load lại
      setTimeout(loadQuestions, 2500);

    } catch (err) {
      Swal.fire({ icon: 'error', title: 'LỖI', text: 'Kết nối bị ngắt quãng.', background: '#0a0f1c', color: '#fff' });
      btn.innerHTML = originalContent;
      btn.disabled = false;
    }
  }

  function editQuestion(index) {
    localStorage.setItem("editQuestionData", JSON.stringify(listQuestions[index]));
    location.href = "add-question.html";
  }

  function goToAdd() {
    localStorage.removeItem("editQuestionData");
    location.href = "add-question.html";
  }

  function zoomImg(src) {
    Swal.fire({
      imageUrl: src,
      background: 'rgba(10, 15, 28, 0.96)',
      backdrop: 'rgba(0,0,0,0.85)',
      showConfirmButton: false,
      showCloseButton: true
    });
  }
</script>
</body>
</html>

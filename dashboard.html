<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Dashboard Quản lý</title>
  
  <style>
    /* ===== NỀN TẢNG GLASSMORPHISM ===== */
    :root {
      --primary: #4facfe;
      --secondary: #00c6ff;
      --accent: #00ffcc;
      --danger: #ff4757;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      background-attachment: fixed;
      color: white;
      padding: 20px;
    }

    .container { width: 100%; max-width: 1100px; margin: 0 auto; }

    .glass-box {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .dashboard-header { display: flex; justify-content: space-between; align-items: center; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
    }

    /* ITEM BÀI TEST */
    .test-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }
    .test-item:hover { background: rgba(255, 255, 255, 0.12); transform: translateX(5px); }
    .test-item b { font-size: 1.1em; color: var(--accent); }

    /* INPUT & BUTTON */
    .input-control {
      width: 100%; padding: 12px; margin-bottom: 10px;
      border-radius: 10px; border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.2); color: white; outline: none;
    }
    .btn {
      padding: 10px 16px; border-radius: 10px; border: none;
      cursor: pointer; font-weight: 600; transition: 0.3s; color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }
    .btn.logout { background: var(--danger); }
    .btn.delete { background: rgba(255, 71, 87, 0.2); color: var(--danger); border: 1px solid var(--danger); }

    /* KẾT QUẢ */
    .result-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .score-badge {
      background: var(--accent); color: #000;
      padding: 4px 10px; border-radius: 8px; font-weight: bold;
    }

    @media (max-width: 850px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  
  <div class="glass-box dashboard-header">
    <h2>📊 Dashboard Giáo Viên</h2>
    <button class="btn logout" onclick="logout()">Đăng xuất</button>
  </div>

  <div class="glass-box" style="padding: 15px;">
    <input id="search" class="input-control" style="margin-bottom:0;" placeholder="🔍 Tìm tên bài test hoặc học sinh..." oninput="filterData()">
  </div>

  <div class="dashboard-grid">
    <!-- DANH SÁCH BÀI TEST -->
    <div class="glass-box">
      <h3 style="margin-bottom:15px;">📚 Danh sách bài test</h3>
      <div id="testList"><p style="opacity:0.6; text-align:center;">⏳ Đang tải bài test...</p></div>
    </div>

    <!-- TẠO MỚI & BIỂU ĐỒ -->
    <div>
      <div class="glass-box">
        <h3 style="margin-bottom:15px;">➕ Tạo bài test mới</h3>
        <input id="testName" class="input-control" placeholder="Tên bài test">
        <input id="testDesc" class="input-control" placeholder="Mô tả">
        <button id="btnAddTest" class="btn" style="width:100%;" onclick="addTest()">Tiếp tục ➡️</button>
      </div>

      <div class="glass-box">
        <h3 style="margin-bottom:15px;">📈 Phân phối điểm số</h3>
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <!-- KẾT QUẢ HỌC SINH -->
  <div class="glass-box">
    <h3 style="margin-bottom:15px;">🏆 Kết quả học sinh (Từ Sheets)</h3>
    <div id="resultList"><p style="opacity:0.6; text-align:center;">⏳ Đang tải kết quả bài làm...</p></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Đảm bảo file script.js chứa biến API -->
<script src="script.js"></script> 

<script>
  // Kiểm tra quyền
  if(localStorage.getItem("role") !== "teacher") window.location.href = "index.html";

  function logout() {
    localStorage.removeItem("role");
    window.location.href = "index.html";
  }

  let tests = [];
  let allResults = [];
  let myChart = null;
  
  //.0 ADD BÀI TEST
  // ===== HÀM TẠO BÀI TEST MỚI =====
  async function addTest() {
    const name = document.getElementById("testName").value.trim();
    const desc = document.getElementById("testDesc").value.trim();
    const btn = document.getElementById("btnAddTest");

    if (!name) {
      alert("Vui lòng nhập tên bài test!");
      return;
    }

    // Vô hiệu hóa nút để tránh bấm liên tục
    btn.disabled = true;
    btn.innerText = "⏳ Đang tạo...";

    try {
      const response = await fetch(API, {
        method: "POST",
        body: JSON.stringify({
          action: "addTest",
          name: name,
          desc: desc
        })
      });

      const result = await response.json();

      if (result.status === "ok") {
        // Lưu thông tin bài test vừa tạo vào localStorage để dùng cho trang tiếp theo
        const newTest = { id: result.id, name: name, desc: desc };
        localStorage.setItem("currentTest", JSON.stringify(newTest));
        
        // Chuyển hướng sang trang thêm câu hỏi ngay lập tức
        window.location.href = "add-question.html";
      } else {
        alert("Lỗi từ máy chủ: " + result.message);
        btn.disabled = false;
        btn.innerText = "Tiếp tục ➡️";
      }
    } catch (err) {
      console.error("Lỗi addTest:", err);
      alert("Không thể kết nối với Script. Hãy kiểm tra lại URL API hoặc quyền truy cập.");
      btn.disabled = false;
      btn.innerText = "Tiếp tục ➡️";
    }
  }
  // 1. TẢI DANH SÁCH BÀI TEST
  async function loadTests() {
    try {
      const res = await fetch(`${API}?action=getTests`);
      const data = await res.json();
      if(Array.isArray(data)) {
        tests = data;
        renderTests();
      }
    } catch(err) {
      document.getElementById("testList").innerHTML = "<p>❌ Lỗi tải bài test.</p>";
    }
  }

  function renderTests(filterData = tests) {
    const container = document.getElementById("testList");
    if(filterData.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Trống.</p>";
      return;
    }
    container.innerHTML = filterData.map((t, i) => `
      <div class="test-item">
        <b>${t.name}</b>
        <p style="margin-bottom:10px;">${t.desc || "Không có mô tả"}</p>
        <div style="display: flex; gap: 8px;">
          <button class="btn" onclick="goTo('add-question.html', ${i})">➕ Thêm câu</button>
          <button class="btn" style="background:rgba(255,255,255,0.1)" onclick="goTo('question-list.html', ${i})">📋 Xem</button>
          <button class="btn delete" onclick="deleteTest(${i})">🗑 Xoá</button>
        </div>
      </div>
    `).join('');
  }

  function goTo(page, index) {
    localStorage.setItem("currentTest", JSON.stringify(tests[index]));
    window.location.href = page;
  }

  // 2. TẢI KẾT QUẢ TỪ GOOGLE SHEETS
  async function loadResults() {
    try {
      const res = await fetch(`${API}?action=getResults`);
      const data = await res.json();
      if(Array.isArray(data)) {
        allResults = data;
        renderResults();
        initChart();
      }
    } catch(err) {
      document.getElementById("resultList").innerHTML = "<p>❌ Không thể load kết quả.</p>";
    }
  }

  function renderResults(filterData = allResults) {
    const container = document.getElementById("resultList");
    if(filterData.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Chưa có học sinh làm bài.</p>";
      return;
    }
    container.innerHTML = filterData.map(r => {
      let p = Math.round((r.score / r.total) * 100);
      return `
        <div class="result-item">
          <div>
            <strong style="color:var(--accent)">${r.name}</strong><br>
            <small style="opacity:0.7">Bài: ${r.testName} | ${r.timestamp || ''}</small>
          </div>
          <div style="text-align:right">
            <span class="score-badge">${r.score}/${r.total}</span>
            <div style="font-size:0.8em; margin-top:4px;">${p}%</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // 3. TÌM KIẾM TỔNG HỢP
  function filterData() {
    const key = document.getElementById("search").value.toLowerCase();
    renderTests(tests.filter(t => t.name.toLowerCase().includes(key)));
    renderResults(allResults.filter(r => r.name.toLowerCase().includes(key) || r.testName.toLowerCase().includes(key)));
  }

  // 4. BIỂU ĐỒ
  function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if(myChart) myChart.destroy();

    const counts = [0, 0, 0, 0];
    allResults.forEach(r => {
      let p = (r.score / r.total) * 100;
      if(p < 50) counts[0]++;
      else if(p < 70) counts[1]++;
      else if(p < 90) counts[2]++;
      else counts[3]++;
    });

    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Yếu', 'TB', 'Khá', 'Giỏi'],
        datasets: [{
          data: counts,
          backgroundColor: ['#ff4757', '#ffa502', '#1e90ff', '#2ed573'],
          borderWidth: 0
        }]
      },
      options: { 
        plugins: { legend: { position: 'bottom', labels: { color: 'white' } } }
      }
    });
  }

  // KHỞI CHẠY
  window.onload = () => {
    loadTests();
    loadResults();
  };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Dashboard Quản lý</title>
  
  <style>
    /* ===== CẤU HÌNH MÀU SẮC GỐC ===== */
    :root {
      --primary: #4facfe;
      --secondary: #00c6ff;
      --accent: #00ffcc;
      --danger: #ff4757;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      /* Nền Gradient rực rỡ như ảnh của bạn */
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      background-attachment: fixed;
      color: white;
      padding: 15px;
      overflow-x: hidden;
    }

    .container { width: 100%; max-width: 1100px; margin: 0 auto; }

    /* THẺ GLASSMORPHISM */
    .glass-box {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* ===== QUAN TRỌNG: CẤU HÌNH THANH CUỘN (SCROLL) ===== */
    .scroll-container {
      max-height: 480px; /* Giới hạn chiều cao để không bị tràn màn hình */
      overflow-y: auto;
      padding-right: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) rgba(255,255,255,0.1);
    }

    /* Custom Scrollbar cho Chrome/Safari */
    .scroll-container::-webkit-scrollbar { width: 6px; }
    .scroll-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
    .scroll-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    .dashboard-header { display: flex; justify-content: space-between; align-items: center; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
    }

    /* ITEM BÀI TEST */
    .test-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 18px;
      margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }
    .test-item:hover { background: rgba(255, 255, 255, 0.12); transform: translateX(5px); }
    .test-item b { font-size: 1.1em; color: var(--accent); display: block; margin-bottom: 5px; }

    /* INPUT & BUTTON */
    .input-control {
      width: 100%; padding: 14px; margin-bottom: 12px;
      border-radius: 12px; border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.2); color: white; outline: none; font-size: 16px;
    }
    .btn {
      padding: 10px 18px; border-radius: 12px; border: none;
      cursor: pointer; font-weight: 600; transition: 0.3s; color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn:active { transform: scale(0.95); }
    .btn.logout { background: var(--danger); padding: 8px 20px; border-radius: 10px; }
    .btn.delete { background: rgba(255, 71, 87, 0.2); color: #ff7675; border: 1px solid rgba(255, 71, 87, 0.3); }

    /* KẾT QUẢ HỌC SINH */
    .result-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .score-badge {
      background: var(--accent); color: #000;
      padding: 4px 12px; border-radius: 10px; font-weight: bold;
    }

    @media (max-width: 850px) { 
      .dashboard-grid { grid-template-columns: 1fr; }
      .scroll-container { max-height: 380px; }
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Header -->
  <div class="glass-box dashboard-header">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 24px;">📊</span>
        <h2 style="font-weight: 600; letter-spacing: 0.5px;">Quản Lý Giáo Viên</h2>
    </div>
    <button class="btn logout" onclick="logout()">Thoát</button>
  </div>

  <!-- Search Bar -->
  <div class="glass-box" style="padding: 15px;">
    <input id="search" class="input-control" style="margin-bottom:0;" placeholder="🔍 Tìm tên bài test hoặc học sinh..." oninput="filterData()">
  </div>

  <div class="dashboard-grid">
    <!-- CỘT TRÁI: DANH SÁCH BÀI TEST -->
    <div class="glass-box" style="display: flex; flex-direction: column;">
      <h3 style="margin-bottom:15px; display: flex; align-items: center; gap: 8px;">
        <span>📚</span> Bài đã tạo
      </h3>
      <!-- Thêm class scroll-container ở đây -->
      <div id="testList" class="scroll-container">
        <p style="opacity:0.6; text-align:center; padding: 20px;">⏳ Đang tải dữ liệu...</p>
      </div>
    </div>

    <!-- CỘT PHẢI: TẠO MỚI & BIỂU ĐỒ -->
    <div>
      <div class="glass-box">
        <h3 style="margin-bottom:15px; color: var(--primary);">➕ Tạo bài mới</h3>
        <input id="testName" class="input-control" placeholder="Tên bài test (VD: Toán 10)">
        <input id="testDesc" class="input-control" placeholder="Mô tả ngắn">
        <button id="btnAddTest" class="btn" style="width:100%;" onclick="addTest()">Tiếp tục tạo câu hỏi ➡️</button>
      </div>

      <div class="glass-box">
        <h3 style="margin-bottom:15px; display: flex; align-items: center; gap: 8px;">
            <span>📈</span> Phân phối điểm
        </h3>
        <div style="height: 200px;">
            <canvas id="chart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- KẾT QUẢ HỌC SINH -->
  <div class="glass-box">
    <h3 style="margin-bottom:15px;">🏆 Kết quả học sinh</h3>
    <!-- Giới hạn chiều cao cho bảng điểm nếu quá dài -->
    <div id="resultList" class="scroll-container" style="max-height: 350px;">
      <p style="opacity:0.6; text-align:center; padding: 20px;">⏳ Đang cập nhật từ Sheets...</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script> 

<script>
  // Kiểm tra đăng nhập
  if(localStorage.getItem("isTeacherAuthenticated") !== "true") {
    window.location.replace("login.html");
  }

  function logout() {
    localStorage.removeItem("isTeacherAuthenticated");
    window.location.replace("role.html");
  }

  let tests = [];
  let allResults = [];
  let myChart = null;

  // Tải danh sách bài Test
  async function loadTests() {
    try {
      const res = await fetch(`${API}?action=getTests&_t=${Date.now()}`);
      const data = await res.json();
      if(Array.isArray(data)) {
        tests = data;
        renderTests();
      }
    } catch(err) {
      document.getElementById("testList").innerHTML = "<p>❌ Lỗi kết nối máy chủ.</p>";
    }
  }

  function renderTests(filterData = tests) {
    const container = document.getElementById("testList");
    if(filterData.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.5; padding: 20px;'>Chưa có bài nào.</p>";
      return;
    }
    container.innerHTML = filterData.map((t, i) => `
      <div class="test-item">
        <b style="font-size: 1.2rem; color: #fff;">${t.name}</b>
        <p style="margin-bottom:12px; font-size:0.85rem; opacity:0.7;">${t.desc || "Không có mô tả"}</p>
        <div style="display: flex; gap: 10px;">
          <button class="btn" onclick="goTo('add-question.html', ${i})">➕ Thêm</button>
          <button class="btn" style="background:rgba(255,255,255,0.15)" onclick="goTo('question-list.html', ${i})">📋 Xem</button>
          <button class="btn delete" onclick="deleteTest(${i})">🗑</button>
        </div>
      </div>
    `).join('');
  }

  // Tải kết quả học sinh
  async function loadResults() {
    try {
      const res = await fetch(`${API}?action=getResults&_t=${Date.now()}`);
      const data = await res.json();
      if(Array.isArray(data)) {
        allResults = data;
        renderResults();
        initChart();
      }
    } catch(err) {
      document.getElementById("resultList").innerHTML = "<p>❌ Không thể tải bảng điểm.</p>";
    }
  }

  function renderResults(filterData = allResults) {
    const container = document.getElementById("resultList");
    if(filterData.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Chưa có học sinh làm bài.</p>";
      return;
    }
    container.innerHTML = filterData.reverse().map(r => {
      let p = r.total > 0 ? Math.round((r.score / r.total) * 100) : 0;
      return `
        <div class="result-item">
          <div>
            <strong style="color:var(--accent); font-size: 1rem;">${r.name}</strong><br>
            <small style="opacity:0.6">${r.testName || 'Kiểm tra'}</small>
          </div>
          <div style="text-align:right">
            <span class="score-badge">${r.score}/${r.total}</span>
            <div style="font-size:0.75rem; margin-top:4px; opacity:0.8; color: var(--accent);">${p}%</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Chuyển trang
  function goTo(page, index) {
    localStorage.setItem("currentTest", JSON.stringify(tests[index]));
    window.location.href = page;
  }

  // Tìm kiếm
  function filterData() {
    const key = document.getElementById("search").value.toLowerCase();
    renderTests(tests.filter(t => t.name.toLowerCase().includes(key)));
    renderResults(allResults.filter(r => 
      (r.name && r.name.toLowerCase().includes(key)) || 
      (r.testName && r.testName.toLowerCase().includes(key))
    ));
  }

  // Khởi tạo biểu đồ
  function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if(myChart) myChart.destroy();

    const counts = [0, 0, 0, 0];
    allResults.forEach(r => {
      if(r.total > 0) {
        let p = (r.score / r.total) * 100;
        if(p < 50) counts[0]++;
        else if(p < 70) counts[1]++;
        else if(p < 90) counts[2]++;
        else counts[3]++;
      }
    });

    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Yếu', 'TB', 'Khá', 'Giỏi'],
        datasets: [{
          data: counts,
          backgroundColor: ['#ff4757', '#ffa502', '#1e90ff', '#2ed573'],
          borderWidth: 0
        }]
      },
      options: { 
        maintainAspectRatio: false,
        plugins: { 
            legend: { 
                position: 'right', 
                labels: { color: 'white', font: { size: 12 } } 
            } 
        }
      }
    });
  }

  // Chức năng tạo bài mới
  async function addTest() {
    const name = document.getElementById("testName").value.trim();
    const desc = document.getElementById("testDesc").value.trim();
    const btn = document.getElementById("btnAddTest");

    if (!name) return alert("Vui lòng nhập tên bài!");

    btn.disabled = true;
    btn.innerText = "⏳ Đang tạo...";

    try {
      const response = await fetch(API, {
        method: "POST",
        body: JSON.stringify({ action: "addTest", name, desc })
      });
      const result = await response.json();
      if (result.status === "ok") {
        localStorage.setItem("currentTest", JSON.stringify({ id: result.id, name, desc }));
        window.location.href = "add-question.html";
      } else {
        alert("Lỗi: " + result.message);
        btn.disabled = false;
        btn.innerText = "Tiếp tục ➡️";
      }
    } catch (err) {
      alert("Lỗi kết nối Server!");
      btn.disabled = false;
    }
  }

  window.onload = () => {
    loadTests();
    loadResults();
  };
</script>

</body>
</html>

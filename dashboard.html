<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống Quản trị - Nebula Premium</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --bg-dark: #0a0f18;
      --card-bg: rgba(15, 23, 42, 0.75);
      --primary: #3b82f6;
      --secondary: #10b981;
      --accent: #8b5cf6;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #f8fafc;
      --border: rgba(255, 255, 255, 0.08);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0, transparent 50%), 
        radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0, transparent 50%),
        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
      background-size: cover;
      background-attachment: fixed;
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .logo-area h1 {
      font-size: 1.5rem; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-box { display: flex; align-items: center; gap: 20px; transition: 0.3s; border: 1px solid var(--border); }
    .stat-box:hover { transform: translateY(-5px); border-color: var(--primary); }
    .stat-icon { width: 55px; height: 55px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }

    .main-grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 25px; }

    .item-list { max-height: 480px; overflow-y: auto; padding-right: 10px; }
    .test-card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      padding: 18px; border-radius: 18px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.3s;
    }
    .test-card:hover { background: rgba(255,255,255,0.07); transform: translateX(5px); border-color: var(--primary); }

    .user-card {
      background: rgba(255,255,255,0.02); border-left: 4px solid var(--warning);
      padding: 15px; border-radius: 14px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }

    .btn { padding: 10px 18px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-glow { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
    .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: white; }

    .input-dark { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 12px 15px; border-radius: 12px; outline: none; width: 100%; }
    .input-dark:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

    .result-row { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 14px; border-bottom: 1px solid var(--border); }

    @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
  
  <header class="nav-header">
    <div class="logo-area">
      <h1><i class="fas fa-rocket"></i> ADMIN DASHBOARD </h1>
      <p style="font-size: 0.75rem; opacity: 0.5;">PREMIUM MANAGEMENT SYSTEM</p>
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="btn btn-outline" onclick="loadData()"><i class="fas fa-sync-alt"></i> Làm mới</button>
      <button class="btn btn-outline" style="color: var(--danger);" onclick="logout()"><i class="fas fa-power-off"></i> Thoát</button>
    </div>
  </header>

  <div class="stats-grid">
    <div class="glass-card stat-box">
      <div class="stat-icon" style="background: rgba(59, 130, 246, 0.1); color: var(--primary);"><i class="fas fa-book"></i></div>
      <div><p style="opacity: 0.5; font-size: 0.8rem;">Tổng đề thi</p><h2 id="countTests">0</h2></div>
    </div>
    <div class="glass-card stat-box">
      <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: var(--warning);"><i class="fas fa-user-clock"></i></div>
      <div><p style="opacity: 0.5; font-size: 0.8rem;">Chờ duyệt</p><h2 id="countPending">0</h2></div>
    </div>
    <div class="glass-card stat-box">
      <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--secondary);"><i class="fas fa-check-double"></i></div>
      <div><p style="opacity: 0.5; font-size: 0.8rem;">Lượt thi</p><h2 id="countResults">0</h2></div>
    </div>
    <div class="glass-card stat-box">
      <div class="stat-icon" style="background: rgba(139, 92, 246, 0.1); color: var(--accent);"><i class="fas fa-chart-line"></i></div>
      <div><p style="opacity: 0.5; font-size: 0.8rem;">Tỷ lệ đạt</p><h2 id="avgScore">0%</h2></div>
    </div>
  </div>

  <div class="main-grid">
    <section>
      <div class="glass-card" style="margin-bottom: 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3><i class="fas fa-database"></i> Kho đề thi hiện có</h3>
          <input type="text" id="search" class="input-dark" style="width: 250px;" placeholder="Tìm nhanh..." oninput="filterData()">
        </div>
        <div id="testList" class="item-list">
           <p style="text-align: center; opacity: 0.4; padding: 40px;">Đang tải dữ liệu...</p>
        </div>
      </div>

      <div class="glass-card">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-history"></i> Bảng điểm học sinh</h3>
        <div class="result-row" style="opacity: 0.5; font-weight: bold; border-bottom: 2px solid var(--border);">
          <span>Thí sinh</span><span>Tên đề</span><span>Điểm số</span>
        </div>
        <div id="resultList" class="item-list" style="max-height: 350px;"></div>
      </div>
    </section>

    <aside>
      <div class="glass-card" style="margin-bottom: 25px; border-top: 4px solid var(--primary);">
        <h3 style="margin-bottom: 15px;"><i class="fas fa-plus-circle"></i> Khởi tạo bài mới</h3>
        <input id="testName" class="input-dark" style="margin-bottom: 10px;" placeholder="Tên bài thi (Ví dụ: Toán cuối kỳ I)">
        <input id="testDesc" class="input-dark" style="margin-bottom: 15px;" placeholder="Mô tả ngắn gọn">
        <button class="btn btn-glow" style="width: 100%; justify-content: center;" onclick="addTest()">
          XÁC NHẬN TẠO ĐỀ
        </button>
      </div>

      <div class="glass-card" style="margin-bottom: 25px;">
        <h3 style="margin-bottom: 15px;"><i class="fas fa-chart-pie"></i> Phân tích chất lượng</h3>
        <div style="height: 200px;"><canvas id="chart"></canvas></div>
      </div>

      <div class="glass-card" style="border-top: 4px solid var(--warning);">
        <h3 style="margin-bottom: 15px; color: var(--warning);"><i class="fas fa-user-shield"></i> Duyệt tài khoản</h3>
        <div id="pendingUserList" class="item-list" style="max-height: 300px;"></div>
      </div>
    </aside>
  </div>

  <footer style="text-align: center; margin-top: 50px; opacity: 0.2; font-size: 0.7rem; letter-spacing: 2px;">
    NEBULA SYSTEM • STABLE VERSION 2026 • KIEU LE DANG KHOA
  </footer>

</div>

<script>
  // URL APP SCRIPT CỦA BẠN
  const API = "https://script.google.com/macros/s/AKfycbyMNDhpE9eNmQfEJizQtjfvAoTfmc7C0WgOWNb9g82txlzLxC_EwKE8IIWvGxEYH5pk/exec";

  // Bảo mật cơ bản
  if(localStorage.getItem("userRole") !== "admin") {
    // Nếu bạn muốn test trực tiếp không cần đăng nhập, hãy tạm comment dòng dưới
    // window.location.replace("index.html");
  }

  function logout() {
    localStorage.clear();
    window.location.replace("index.html");
  }

  let tests = [];
  let allResults = [];
  let pendingUsers = [];

  async function loadData() {
    try {
      const [testRes, resultRes, userRes] = await Promise.all([
        fetch(`${API}?action=getTests`).then(r => r.json()),
        fetch(`${API}?action=getResults`).then(r => r.json()),
        fetch(`${API}?action=getPendingUsers`).then(r => r.json())
      ]);
      tests = testRes; allResults = resultRes; pendingUsers = userRes;
      renderTests(); renderResults(); renderPendingUsers(); updateStats(); initChart();
    } catch (e) { 
      console.error("Lỗi tải dữ liệu:", e); 
    }
  }

  function renderTests(data = tests) {
    const container = document.getElementById("testList");
    container.innerHTML = data.map((t) => `
      <div class="test-card animate__animated animate__fadeInLeft">
        <div>
          <h4 style="color: #60a5fa; margin-bottom: 4px;">${t.name}</h4>
          <p style="font-size: 0.75rem; opacity: 0.5;">ID: ${t.id} | ${t.desc || 'Chưa có mô tả'}</p>
        </div>
        <div style="display: flex; gap: 8px;">
          <button title="Thêm câu hỏi" class="btn btn-outline" style="padding: 8px;" onclick="goTo('add-question.html', '${t.id}', '${t.name}')"><i class="fas fa-plus"></i></button>
          <button title="Danh sách câu hỏi" class="btn btn-outline" style="padding: 8px;" onclick="goTo('question-list.html', '${t.id}', '${t.name}')"><i class="fas fa-list-ol"></i></button>
          <button title="Xóa đề" class="btn btn-outline" style="padding: 8px; color: var(--danger);" onclick="deleteTest('${t.id}')"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    `).join('') || "<p style='text-align:center; opacity:0.3; padding:40px;'>Không tìm thấy đề thi.</p>";
  }

  function renderResults() {
    const container = document.getElementById("resultList");
    container.innerHTML = [...allResults].reverse().map(r => {
      let p = Math.round((r.score/r.total)*100);
      return `
        <div class="result-row animate__animated animate__fadeIn">
          <span style="font-weight:600;">${r.name}</span>
          <span style="opacity:0.6; font-size:0.9rem;">${r.testName}</span>
          <span style="color: ${p >= 50 ? 'var(--secondary)' : 'var(--danger)'}; font-weight:bold;">${r.score}/${r.total}</span>
        </div>
      `;
    }).join('') || "<p style='text-align:center; opacity:0.3; padding:20px;'>Chưa có kết quả thi.</p>";
  }

  function renderPendingUsers() {
    const container = document.getElementById("pendingUserList");
    document.getElementById('countPending').innerText = pendingUsers.length;
    if(pendingUsers.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.3; padding:20px;'>Hệ thống sạch!</p>";
      return;
    }
    container.innerHTML = pendingUsers.map(user => `
      <div class="user-card animate__animated animate__fadeInRight">
        <div>
          <div style="font-weight:bold; font-size:0.85rem;">${user.name}</div>
          <div style="font-size:0.7rem; opacity:0.5;">${user.email} - ${user.class}</div>
        </div>
        <div style="display:flex; gap:5px;">
          <button class="btn btn-glow" style="background:var(--secondary); padding: 6px 10px; font-size:0.65rem;" onclick="approveUser('${user.email}', 'approve')">DUYỆT</button>
          <button class="btn btn-outline" style="padding: 6px 10px; font-size:0.65rem; color:var(--danger);" onclick="approveUser('${user.email}', 'reject')">HỦY</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    document.getElementById('countTests').innerText = tests.length;
    document.getElementById('countResults').innerText = allResults.length;
    if(allResults.length > 0) {
      let totalP = allResults.reduce((acc, curr) => acc + (curr.score/curr.total), 0);
      document.getElementById('avgScore').innerText = Math.round((totalP/allResults.length)*100) + "%";
    }
  }

  function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    const stats = [0, 0, 0];
    allResults.forEach(r => {
      let p = (r.score/r.total)*100;
      if(p >= 80) stats[0]++; else if(p >= 50) stats[1]++; else stats[2]++;
    });
    if(window.myChart) window.myChart.destroy();
    window.myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Giỏi', 'Khá', 'Yếu'],
        datasets: [{ data: stats, backgroundColor: ['#10b981', '#3b82f6', '#ef4444'], borderWidth: 0 }]
      },
      options: { maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { size: 10 } } } } }
    });
  }

  async function addTest() {
    const name = document.getElementById("testName").value;
    const desc = document.getElementById("testDesc").value;
    if(!name) return Swal.fire("Lỗi", "Vui lòng nhập tên đề!", "error");
    
    Swal.fire({ title: 'Đang khởi tạo...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    
    try {
      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify({ action: "createTest", name, desc })
      });
      const result = await res.json();
      if(result.status === "success") {
        Swal.fire({ icon: 'success', title: 'Hoàn tất!', text: 'Đề thi đã được thêm vào kho.', timer: 1500 });
        document.getElementById("testName").value = "";
        document.getElementById("testDesc").value = "";
        loadData();
      }
    } catch(e) { Swal.fire("Lỗi", "Không thể kết nối API", "error"); }
  }

  async function approveUser(email, action) {
    try {
      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify({ action: "handleUserRequest", email, status: action === 'approve' ? 'approved' : 'rejected' })
      });
      if((await res.json()).status === "ok") { 
        loadData(); 
      }
    } catch (e) { console.error(e); }
  }

  function goTo(page, id, name) {
    // Lưu thông tin đề đang chọn vào bộ nhớ trình duyệt
    localStorage.setItem("currentTest", JSON.stringify({ id, name }));
    window.location.href = page;
  }

  function filterData() {
    const key = document.getElementById("search").value.toLowerCase();
    renderTests(tests.filter(t => t.name.toLowerCase().includes(key)));
  }

  window.onload = loadData;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Giáo viên</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <div class="container">

    <!-- HEADER -->
    <div class="box dashboard-header">
      <h2>📊 Dashboard Giáo viên</h2>
      <button class="btn logout" onclick="logout()">Đăng xuất</button>
    </div>

    <!-- SEARCH -->
    <div class="box card search-box">
      <input id="search" placeholder="🔍 Tìm học sinh..." oninput="filterResult()">
    </div>

    <!-- GRID BÀI TEST -->
    <div class="dashboard-grid">

      <!-- THÊM BÀI TEST -->
      <div class="box card">
        <h3>➕ Thêm bài test</h3>
        <input id="testName" placeholder="Tên bài">
        <input id="testDesc" placeholder="Mô tả">
        <button class="btn" onclick="addTest()">Tiếp tục ➡️ Thêm câu hỏi</button>
      </div>

      <!-- DANH SÁCH BÀI TEST -->
      <div class="box card">
        <h3>📚 Danh sách bài</h3>
        <div id="testList"></div>
      </div>

    </div>

    <!-- GRID KẾT QUẢ + CHART -->
    <div class="dashboard-grid" style="margin-top:20px;">

      <!-- KẾT QUẢ -->
      <div class="box card">
        <h3>📊 Kết quả học sinh</h3>
        <div id="resultList"></div>
      </div>

      <!-- CHART -->
      <div class="box card">
        <h3>📈 Biểu đồ</h3>
        <canvas id="chart"></canvas>
      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ===== CHECK ROLE =====
let role = localStorage.getItem("role");
if(role !== "teacher"){
  window.location.href = "index.html";
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("role");
  window.location.href = "index.html";
}

// ===== API =====
const API = "PASTE_WEB_APP_URL_CỦA_BẠN_VÀO_ĐÂY";

// ===== LOAD TESTS =====
let tests = JSON.parse(localStorage.getItem("tests")) || [];

// ===== RENDER TESTS =====
function renderTests(){
  let html = "";
  if(tests.length === 0) html = "<p>Chưa có bài test</p>";

  tests.forEach((t,i)=>{
    html += `
      <div class="test-item">
        <b>${t.name}</b>
        <p>${t.desc}</p>
        <div style="margin-top:10px;">
          <button class="btn" onclick="openTest(${i})">➕ Thêm câu hỏi</button>
          <button class="btn" onclick="viewQuestions(${i})">📋 DS câu hỏi</button>
          <button class="btn delete" onclick="deleteTest(${i})">🗑 Xoá</button>
        </div>
      </div>
    `;
  });
  document.getElementById("testList").innerHTML = html;
}

// ===== ADD TEST =====
function addTest() {
  const name = document.getElementById("testName").value.trim();
  const desc = document.getElementById("testDesc").value.trim();
  if(!name){ alert("❌ Vui lòng nhập tên bài!"); return; }

  const formData = new FormData();
  formData.append("data", JSON.stringify({ action:"createTest", name, desc }));

  fetch(API, { method:"POST", body: formData })
    .then(res => res.json())
    .then(res => {
      if(res.status==="ok"){
        const testData = { id: res.id, name, desc };
        localStorage.setItem("currentTestId", res.id);
        localStorage.setItem("currentTest", JSON.stringify(testData));
        tests.push(testData);
        localStorage.setItem("tests", JSON.stringify(tests));
        renderTests();
        setTimeout(()=>{ window.location.href="add-question.html"; }, 200);
      } else { alert("❌ Lỗi tạo test"); }
    })
    .catch(err=>{ console.log(err); alert("❌ Lỗi kết nối API"); });
}

// ===== OPEN / VIEW TEST =====
function openTest(i){
  const test = tests[i];
  localStorage.setItem("currentTestId", test.id);
  localStorage.setItem("currentTest", JSON.stringify(test));
  window.location.href = "add-question.html";
}

function viewQuestions(i){
  const test = tests[i];
  localStorage.setItem("currentTestId", test.id);
  localStorage.setItem("currentTest", JSON.stringify(test));
  window.location.href = "question-list.html";
}

// ===== DELETE TEST =====
function deleteTest(i){
  if(!confirm("Xóa bài test này?")) return;
  tests.splice(i,1);
  localStorage.setItem("tests", JSON.stringify(tests));
  renderTests();
}

// ===== RESULT =====
let allResults = JSON.parse(localStorage.getItem("results")) || [];

function renderResults(data = allResults){
  let html = "";
  if(data.length === 0){ html="<p>Chưa có dữ liệu</p>"; }
  data.forEach(r=>{
    let percent = Math.round((r.score/r.total)*100);
    html += `<div class="result-item"><b>${r.name}</b><p>${r.score}/${r.total} (${percent}%)</p></div>`;
  });
  document.getElementById("resultList").innerHTML = html;
}

// ===== FILTER =====
function filterResult(){
  let key = document.getElementById("search").value.toLowerCase();
  let filtered = allResults.filter(r=> r.name.toLowerCase().includes(key));
  renderResults(filtered);
}

// ===== INIT =====
renderTests();
renderResults();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Dashboard Hệ Thống</title>
  
  <!-- Thư viện hỗ trợ -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --accent: #00ffcc;
      --danger: #ff4757;
      --warning: #ffa502;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      background-attachment: fixed;
      color: var(--text-main);
      padding: 20px;
      line-height: 1.6;
    }

    /* Background Animation */
    body::before {
      content: ""; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
      background: radial-gradient(circle, rgba(79, 172, 254, 0.15), transparent 70%);
      z-index: -1; filter: blur(50px);
    }

    .container { width: 100%; max-width: 1200px; margin: 0 auto; }

    /* Glass Box */
    .glass-box {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    /* Header & Stats */
    .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    
    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      padding: 15px; border-radius: 18px; border: 1px solid var(--glass-border);
      display: flex; align-items: center; gap: 15px;
    }
    .stat-card i { font-size: 1.5rem; color: var(--accent); }

    /* Custom Scrollbar */
    .scroll-container {
      max-height: 500px; overflow-y: auto; padding-right: 10px;
    }
    .scroll-container::-webkit-scrollbar { width: 5px; }
    .scroll-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    /* Dashboard Layout */
    .dashboard-grid { display: grid; grid-template-columns: 1.4fr 0.6fr; gap: 25px; }

    /* Test Cards */
    .test-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px; padding: 20px; margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.3s; position: relative; overflow: hidden;
    }
    .test-item:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-5px);
      border-color: var(--primary);
    }
    .test-item::after {
      content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
      background: var(--primary); opacity: 0.5;
    }

    /* Buttons */
    .btn {
      padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer;
      font-weight: 700; display: inline-flex; align-items: center; gap: 8px;
      transition: 0.3s; font-size: 0.9rem; color: white;
    }
    .btn-main { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
    .btn-main:hover { box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
    .btn-danger { background: rgba(255, 71, 87, 0.2); color: var(--danger); border: 1px solid rgba(255, 71, 87, 0.3); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-outline { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }

    /* Inputs */
    .input-control {
      width: 100%; padding: 14px 18px; margin-bottom: 15px; border-radius: 14px;
      border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3);
      color: white; outline: none; transition: 0.3s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(79, 172, 254, 0.2); }

    /* Result Table */
    .result-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .score-badge {
      background: linear-gradient(135deg, var(--accent), #00d2ff);
      color: #000; padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 0.85rem;
    }

    @media (max-width: 992px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  
  <!-- HEADER -->
  <div class="glass-box header-flex">
    <div>
      <h1 style="font-size: 1.5rem; letter-spacing: 1px;"><i class="fas fa-chart-pie" style="color:var(--primary)"></i> QUẢN TRỊ VIÊN</h1>
      <p style="font-size: 0.8rem; opacity: 0.6;">Chào mừng trở lại, Hệ thống đã sẵn sàng.</p>
    </div>
    <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
  </div>

  <!-- THỐNG KÊ NHANH -->
  <div class="stats-container">
    <div class="stat-card">
      <i class="fas fa-file-alt"></i>
      <div><small style="opacity:0.6">Bài trắc nghiệm</small><h2 id="countTests">0</h2></div>
    </div>
    <div class="stat-card">
      <i class="fas fa-users"></i>
      <div><small style="opacity:0.6">Lượt làm bài</small><h2 id="countResults">0</h2></div>
    </div>
    <div class="stat-card">
      <i class="fas fa-star"></i>
      <div><small style="opacity:0.6">Điểm trung bình</small><h2 id="avgScore">0</h2></div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="glass-box" style="padding: 10px 20px;">
    <input id="search" class="input-control" style="margin-bottom:0; border:none; background:transparent;" 
           placeholder="🔍 Tìm kiếm bài thi, tên học sinh..." oninput="filterData()">
  </div>

  <div class="dashboard-grid">
    <!-- CỘT TRÁI: DANH SÁCH BÀI TEST -->
    <div class="glass-box">
      <div class="header-flex">
        <h3 style="margin-bottom:20px;"><i class="fas fa-layer-group"></i> Kho Bài Thi</h3>
        <span id="testCountLabel" class="score-badge" style="background: var(--glass-bg); color: white;">0 Bài</span>
      </div>
      <div id="testList" class="scroll-container">
        <!-- Skeleton loading -->
        <div class="test-item" style="opacity:0.3">Đang kết nối dữ liệu...</div>
      </div>
    </div>

    <!-- CỘT PHẢI: CÔNG CỤ -->
    <div>
      <div class="glass-box" style="border: 1px solid var(--primary);">
        <h3 style="margin-bottom:20px; color: var(--primary);"><i class="fas fa-plus-circle"></i> Tạo Bài Thi Mới</h3>
        <input id="testName" class="input-control" placeholder="Tên bài (VD: Kiểm tra 15p)">
        <input id="testDesc" class="input-control" placeholder="Mô tả mục tiêu bài thi">
        <button id="btnAddTest" class="btn btn-main" style="width:100%;" onclick="addTest()">
          Bắt đầu soạn câu hỏi <i class="fas fa-chevron-right"></i>
        </button>
      </div>

      <div class="glass-box">
        <h3 style="margin-bottom:20px;"><i class="fas fa-chart-line"></i> Phân tích điểm</h3>
        <div style="height: 250px; position: relative;">
          <canvas id="chart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- BẢNG ĐIỂM -->
  <div class="glass-box">
    <h3 style="margin-bottom:20px;"><i class="fas fa-trophy"></i> Bảng Vàng Học Sinh</h3>
    <div id="resultList" class="scroll-container" style="max-height: 400px;">
      <p style="text-align:center; padding: 20px; opacity:0.5;">Đang tải danh sách kết quả...</p>
    </div>
  </div>

</div>

<script>
  // Link API Apps Script của bạn
  const API = "https://script.google.com/macros/s/AKfycbwcXT1JxjKgD-5ob8ZCw0LYmUQpPNorj4slERM1fCrJhHL1UNx-TWnQmCYn1-0Xitdb/exec";

  // Bảo mật trang
  if(localStorage.getItem("userRole") !== "admin") {
    window.location.replace("login.html");
  }

  function logout() {
    localStorage.clear();
    window.location.replace("role.html");
  }

  let tests = [];
  let allResults = [];
  let myChart = null;

  // 1. Tải danh sách bài Test
  async function loadTests() {
    try {
      const res = await fetch(`${API}?action=getTests&t=${Date.now()}`);
      const data = await res.json();
      tests = Array.isArray(data) ? data : [];
      renderTests();
      document.getElementById('countTests').innerText = tests.length;
      document.getElementById('testCountLabel').innerText = tests.length + " Bài";
    } catch(err) {
      console.error(err);
      document.getElementById("testList").innerHTML = "<p>❌ Lỗi tải dữ liệu.</p>";
    }
  }

  function renderTests(data = tests) {
    const container = document.getElementById("testList");
    if(data.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Chưa có bài thi nào được tạo.</p>";
      return;
    }
    container.innerHTML = data.map((t, i) => `
      <div class="test-item">
        <div style="display:flex; justify-content:space-between; align-items:start;">
            <div>
                <b style="font-size: 1.1rem;">${t.name}</b>
                <p style="font-size:0.8rem; opacity:0.6; margin: 5px 0 15px 0;">${t.desc || 'Không có mô tả'}</p>
            </div>
            <span style="font-size: 0.7rem; opacity: 0.4;">ID: ${i+1}</span>
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-main" onclick="goTo('add-question.html', ${i})"><i class="fas fa-plus"></i> Soạn</button>
          <button class="btn btn-outline" onclick="goTo('question-list.html', ${i})"><i class="fas fa-list-ul"></i> Quản lý</button>
          <button class="btn btn-danger" onclick="deleteTest(${i})"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    `).join('');
  }

  // 2. Tải kết quả học sinh
  async function loadResults() {
    try {
      const res = await fetch(`${API}?action=getResults&t=${Date.now()}`);
      const data = await res.json();
      allResults = Array.isArray(data) ? data : [];
      renderResults();
      updateStats();
      initChart();
    } catch(err) {
      document.getElementById("resultList").innerHTML = "<p>❌ Không thể cập nhật bảng điểm.</p>";
    }
  }

  function renderResults(data = allResults) {
    const container = document.getElementById("resultList");
    if(data.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Chưa có dữ liệu học sinh.</p>";
      return;
    }
    container.innerHTML = [...data].reverse().map(r => {
      let percent = r.total > 0 ? Math.round((r.score / r.total) * 100) : 0;
      let color = percent >= 80 ? '#00ffcc' : (percent >= 50 ? '#ffa502' : '#ff4757');
      return `
        <div class="result-item">
          <div>
            <strong style="color:white">${r.name}</strong>
            <div style="font-size:0.75rem; opacity:0.5"><i class="fas fa-clock"></i> ${r.testName || 'Bài thi'}</div>
          </div>
          <div style="text-align:right">
            <span class="score-badge" style="background: ${color}; color: #000;">${r.score}/${r.total}</span>
            <div style="font-size:0.75rem; font-weight:bold; color:${color}; margin-top:3px;">${percent}%</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function updateStats() {
    document.getElementById('countResults').innerText = allResults.length;
    if(allResults.length > 0) {
        let totalP = allResults.reduce((acc, curr) => acc + (curr.total > 0 ? (curr.score/curr.total)*100 : 0), 0);
        document.getElementById('avgScore').innerText = Math.round(totalP / allResults.length) + "%";
    }
  }

  // 3. Tạo bài mới
  async function addTest() {
    const name = document.getElementById("testName").value.trim();
    const desc = document.getElementById("testDesc").value.trim();
    if (!name) return Swal.fire('Lỗi', 'Vui lòng đặt tên bài thi!', 'error');

    Swal.fire({ title: 'Đang khởi tạo...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

    try {
      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify({ action: "addTest", name, desc })
      });
      const result = await res.json();
      if (result.status === "ok") {
        localStorage.setItem("currentTest", JSON.stringify({ id: result.id, name, desc }));
        Swal.fire('Thành công', 'Bài thi đã được tạo!', 'success').then(() => {
          window.location.href = "add-question.html";
        });
      }
    } catch (err) {
      Swal.fire('Lỗi', 'Không thể kết nối Server', 'error');
    }
  }

  // 4. Các tiện ích
  function filterData() {
    const key = document.getElementById("search").value.toLowerCase();
    renderTests(tests.filter(t => t.name.toLowerCase().includes(key)));
    renderResults(allResults.filter(r => 
      (r.name && r.name.toLowerCase().includes(key)) || 
      (r.testName && r.testName.toLowerCase().includes(key))
    ));
  }

  function goTo(page, index) {
    localStorage.setItem("currentTest", JSON.stringify(tests[index]));
    window.location.href = page;
  }

  function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if(myChart) myChart.destroy();

    const stats = [0, 0, 0, 0]; // Yếu, TB, Khá, Giỏi
    allResults.forEach(r => {
      let p = (r.score / r.total) * 100;
      if(p < 50) stats[0]++; else if(p < 70) stats[1]++; else if(p < 90) stats[2]++; else stats[3]++;
    });

    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Dưới 5đ', 'Trung bình', 'Khá', 'Xuất sắc'],
        datasets: [{
          data: stats,
          backgroundColor: ['#ff4757', '#ffa502', '#4facfe', '#00ffcc'],
          hoverOffset: 10, borderWidth: 0
        }]
      },
      options: {
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: '#fff', padding: 20, font: { size: 11 } } }
        }
      }
    });
  }

  window.onload = () => {
    loadTests();
    loadResults();
  };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Dashboard Quản lý</title>
  
  <style>
    /* ===== NỀN TẢNG GLASSMORPHISM ===== */
    :root {
      --primary: #4facfe;
      --secondary: #00c6ff;
      --accent: #00ffcc;
      --danger: #ff4757;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      background-attachment: fixed;
      color: white;
      padding: 15px; /* Giảm padding cho mobile */
    }

    .container { width: 100%; max-width: 1100px; margin: 0 auto; }

    .glass-box {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .dashboard-header { display: flex; justify-content: space-between; align-items: center; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
    }

    /* ITEM BÀI TEST */
    .test-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }
    .test-item:hover { background: rgba(255, 255, 255, 0.12); transform: translateX(5px); }
    .test-item b { font-size: 1.1em; color: var(--accent); display: block; margin-bottom: 5px; }

    /* INPUT & BUTTON */
    .input-control {
      width: 100%; padding: 14px; margin-bottom: 12px;
      border-radius: 12px; border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.2); color: white; outline: none; font-size: 16px; /* 16px để mobile không tự zoom */
    }
    .btn {
      padding: 12px 18px; border-radius: 12px; border: none;
      cursor: pointer; font-weight: 600; transition: 0.3s; color: white;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      font-size: 0.95rem;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn:active { transform: scale(0.95); }
    .btn.logout { background: var(--danger); }
    .btn.delete { background: rgba(255, 71, 87, 0.15); color: var(--danger); border: 1px solid var(--danger); }

    /* KẾT QUẢ */
    .result-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .score-badge {
      background: var(--accent); color: #000;
      padding: 5px 12px; border-radius: 10px; font-weight: bold;
    }

    /* Responsive cho điện thoại */
    @media (max-width: 850px) { 
      .dashboard-grid { grid-template-columns: 1fr; }
      .dashboard-header h2 { font-size: 1.2rem; }
      .test-item div { flex-wrap: wrap; }
      .test-item .btn { flex: 1; min-width: 100px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="glass-box dashboard-header">
    <h2>📊 Quản Lý Giáo Viên</h2>
    <button class="btn logout" onclick="logout()">Thoát</button>
  </div>

  <div class="glass-box" style="padding: 15px;">
    <input id="search" class="input-control" style="margin-bottom:0;" placeholder="🔍 Tìm tên bài test hoặc học sinh..." oninput="filterData()">
  </div>

  <div class="dashboard-grid">
    <!-- DANH SÁCH BÀI TEST -->
    <div class="glass-box">
      <h3 style="margin-bottom:15px;">📚 Bài đã tạo</h3>
      <div id="testList"><p style="opacity:0.6; text-align:center;">⏳ Đang tải dữ liệu...</p></div>
    </div>

    <!-- TẠO MỚI & BIỂU ĐỒ -->
    <div>
      <div class="glass-box">
        <h3 style="margin-bottom:15px;">➕ Tạo bài mới</h3>
        <input id="testName" class="input-control" placeholder="Tên bài test (VD: Toán 10)">
        <input id="testDesc" class="input-control" placeholder="Mô tả ngắn">
        <button id="btnAddTest" class="btn" style="width:100%;" onclick="addTest()">Tiếp tục tạo câu hỏi ➡️</button>
      </div>

      <div class="glass-box">
        <h3 style="margin-bottom:15px;">📈 Phân phối điểm</h3>
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <!-- KẾT QUẢ HỌC SINH -->
  <div class="glass-box">
    <h3 style="margin-bottom:15px;">🏆 Kết quả học sinh</h3>
    <div id="resultList"><p style="opacity:0.6; text-align:center;">⏳ Đang cập nhật từ Sheets...</p></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script> 

<script>
  // 1. KIỂM TRA QUYỀN (Khớp với trang Login mới)
  if(localStorage.getItem("isTeacherAuthenticated") !== "true") {
    window.location.replace("login.html");
  }

  function logout() {
    localStorage.removeItem("isTeacherAuthenticated");
    window.location.replace("role.html");
  }

  let tests = [];
  let allResults = [];
  let myChart = null;
  
  // 2. TẠO BÀI TEST MỚI
  async function addTest() {
    const name = document.getElementById("testName").value.trim();
    const desc = document.getElementById("testDesc").value.trim();
    const btn = document.getElementById("btnAddTest");

    if (!name) {
      alert("Bạn chưa nhập tên bài test!");
      return;
    }

    btn.disabled = true;
    btn.innerText = "⏳ Đang kết nối...";

    try {
      const response = await fetch(API, {
        method: "POST",
        body: JSON.stringify({
          action: "addTest",
          name: name,
          desc: desc
        })
      });

      const result = await response.json();

      if (result.status === "ok") {
        const newTest = { id: result.id, name: name, desc: desc };
        localStorage.setItem("currentTest", JSON.stringify(newTest));
        window.location.href = "add-question.html";
      } else {
        alert("Lỗi: " + result.message);
        btn.disabled = false;
        btn.innerText = "Tiếp tục ➡️";
      }
    } catch (err) {
      alert("Lỗi kết nối Server. Vui lòng thử lại!");
      btn.disabled = false;
      btn.innerText = "Tiếp tục ➡️";
    }
  }

  // 3. TẢI DANH SÁCH BÀI TEST
  async function loadTests() {
    try {
      const res = await fetch(`${API}?action=getTests&_t=${Date.now()}`); // _t để tránh cache mobile
      const data = await res.json();
      if(Array.isArray(data)) {
        tests = data;
        renderTests();
      }
    } catch(err) {
      document.getElementById("testList").innerHTML = "<p>❌ Lỗi kết nối dữ liệu.</p>";
    }
  }

  function renderTests(filterData = tests) {
    const container = document.getElementById("testList");
    if(filterData.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Chưa có bài nào.</p>";
      return;
    }
    container.innerHTML = filterData.map((t, i) => `
      <div class="test-item">
        <b>${t.name}</b>
        <p style="margin-bottom:10px; font-size:0.9rem; opacity:0.8;">${t.desc || "Không có mô tả"}</p>
        <div style="display: flex; gap: 8px;">
          <button class="btn" onclick="goTo('add-question.html', ${i})">➕ Thêm câu</button>
          <button class="btn" style="background:rgba(255,255,255,0.1)" onclick="goTo('question-list.html', ${i})">📋 Xem</button>
          <button class="btn delete" onclick="deleteTest(${i})">🗑</button>
        </div>
      </div>
    `).join('');
  }

  function goTo(page, index) {
    localStorage.setItem("currentTest", JSON.stringify(tests[index]));
    window.location.href = page;
  }

  // 4. TẢI KẾT QUẢ TỪ GOOGLE SHEETS
  async function loadResults() {
    try {
      const res = await fetch(`${API}?action=getResults&_t=${Date.now()}`);
      const data = await res.json();
      if(Array.isArray(data)) {
        allResults = data;
        renderResults();
        initChart();
      }
    } catch(err) {
      document.getElementById("resultList").innerHTML = "<p>❌ Không thể load kết quả học sinh.</p>";
    }
  }

  function renderResults(filterData = allResults) {
    const container = document.getElementById("resultList");
    if(filterData.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Chưa có học sinh làm bài.</p>";
      return;
    }
    container.innerHTML = filterData.map(r => {
      let p = r.total > 0 ? Math.round((r.score / r.total) * 100) : 0;
      return `
        <div class="result-item">
          <div>
            <strong style="color:var(--accent)">${r.name}</strong><br>
            <small style="opacity:0.7">${r.testName || 'Bài thi'}</small>
          </div>
          <div style="text-align:right">
            <span class="score-badge">${r.score}/${r.total}</span>
            <div style="font-size:0.8em; margin-top:4px; opacity:0.8;">${p}%</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // 5. TÌM KIẾM TỔNG HỢP
  function filterData() {
    const key = document.getElementById("search").value.toLowerCase();
    renderTests(tests.filter(t => t.name.toLowerCase().includes(key)));
    renderResults(allResults.filter(r => 
      (r.name && r.name.toLowerCase().includes(key)) || 
      (r.testName && r.testName.toLowerCase().includes(key))
    ));
  }

  // 6. BIỂU ĐỒ TRÒN
  function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if(myChart) myChart.destroy();

    const counts = [0, 0, 0, 0];
    allResults.forEach(r => {
      if(r.total > 0) {
        let p = (r.score / r.total) * 100;
        if(p < 50) counts[0]++;
        else if(p < 70) counts[1]++;
        else if(p < 90) counts[2]++;
        else counts[3]++;
      }
    });

    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Yếu', 'TB', 'Khá', 'Giỏi'],
        datasets: [{
          data: counts,
          backgroundColor: ['#ff4757', '#ffa502', '#1e90ff', '#2ed573'],
          borderWidth: 0
        }]
      },
      options: { 
        cutout: '70%',
        plugins: { legend: { position: 'bottom', labels: { color: 'white', padding: 20 } } }
      }
    });
  }

  // KHỞI CHẠY
  window.onload = () => {
    loadTests();
    loadResults();
  };
</script>

</body>
</html>

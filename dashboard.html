<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống Quản trị - Nebula Premium</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

    :root {
      --bg-dark: #070b14;
      --card-bg: rgba(15, 23, 42, 0.7);
      --primary: #3b82f6;
      --secondary: #10b981;
      --accent: #8b5cf6;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #f8fafc;
      --border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    body {
      background: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
      background-size: cover;
      background-attachment: fixed;
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
      line-height: 1.5;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    /* Glassmorphism Card */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--glass-shadow);
      transition: border-color 0.3s;
    }

    /* Layout Components */
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .logo-area h1 {
      font-size: 1.6rem; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-area p { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 20px; margin-bottom: 25px; }
    .stat-box { display: flex; align-items: center; gap: 18px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .stat-box:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.2); }
    .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .stat-box h2 { font-size: 1.8rem; font-weight: 800; }
    .stat-box p { opacity: 0.5; font-size: 0.75rem; margin-bottom: 2px; }

    .main-grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 25px; }
    @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

    /* Lists Management */
    .item-list { max-height: 480px; overflow-y: auto; padding-right: 8px; }
    
    .test-card {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      padding: 18px; border-radius: 16px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
      transition: 0.3s;
    }
    .test-card:hover { background: rgba(255,255,255,0.06); border-color: var(--primary); }
    .test-card h4 { color: #60a5fa; margin-bottom: 4px; font-size: 1rem; }
    .test-card p { font-size: 0.75rem; opacity: 0.5; }

    .result-row { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr; padding: 14px 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; align-items: center; transition: 0.2s; }
    .result-row:hover { background: rgba(255,255,255,0.02); }

    .user-card {
      background: rgba(245,158,11,0.05); border-left: 4px solid var(--warning);
      padding: 16px; border-radius: 12px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* Form & Buttons */
    .btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.8rem; }
    .btn-glow { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
    .btn-glow:hover { transform: scale(1.02); filter: brightness(1.1); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
    .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
    
    .input-dark { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 12px 16px; border-radius: 10px; outline: none; width: 100%; font-size: 0.85rem; transition: 0.2s; }
    .input-dark:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

    /* API Status Pill */
    .api-status { display: inline-flex; align-items: center; gap: 8px; font-size: 0.7rem; padding: 6px 14px; border-radius: 30px; border: 1px solid var(--border); font-weight: 700; text-transform: uppercase; }
    .api-status .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .api-status.ok { color: var(--secondary); background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }
    .api-status.loading { color: var(--warning); background: rgba(245,158,11,0.1); animation: pulse 1.5s infinite; }
    .api-status.err { color: var(--danger); background: rgba(239,68,68,0.1); }
    @keyframes pulse { 0%,100% {opacity: 1;} 50% {opacity: 0.5;} }

    /* Skeleton Loading */
    .skeleton { height: 60px; border-radius: 12px; margin-bottom: 12px; background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
    @keyframes shimmer { to { background-position: 200% 0; } }

    #debugPanel { background: #000; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 20px; font-family: 'Courier New', monospace; font-size: 0.75rem; display: none; max-height: 200px; overflow-y: auto; color: #aaa; }
    .dl-err { color: var(--danger); } .dl-warn { color: var(--warning); } .dl-ok { color: var(--secondary); }
  </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">

  <header class="nav-header">
    <div class="logo-area">
      <h1><i class="fas fa-shield-halved"></i> NEBULA ADMIN</h1>
      <p>Hệ thống quản trị tối cao</p>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <span id="apiStatus" class="api-status loading"><span class="dot"></span> Kết nối...</span>
      <button class="btn btn-outline" onclick="toggleDebug()"><i class="fas fa-code"></i></button>
      <button class="btn btn-outline" onclick="loadData()"><i class="fas fa-sync"></i></button>
      <button class="btn btn-outline" style="color:var(--danger)" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </header>

  <div id="debugPanel"></div>

  <div class="stats-grid">
    <div class="glass-card stat-box">
      <div class="stat-icon" style="background:rgba(59,130,246,0.1); color:var(--primary)"><i class="fas fa-file-invoice"></i></div>
      <div><p>Đề thi</p><h2 id="cTests">—</h2></div>
    </div>
    <div class="glass-card stat-box">
      <div class="stat-icon" style="background:rgba(245,158,11,0.1); color:var(--warning)"><i class="fas fa-user-clock"></i></div>
      <div><p>Chờ duyệt</p><h2 id="cPending">—</h2></div>
    </div>
    <div class="glass-card stat-box">
      <div class="stat-icon" style="background:rgba(16,185,129,0.1); color:var(--secondary)"><i class="fas fa-graduation-cap"></i></div>
      <div><p>Lượt làm bài</p><h2 id="cResults">—</h2></div>
    </div>
    <div class="glass-card stat-box">
      <div class="stat-icon" style="background:rgba(139,92,246,0.1); color:var(--accent)"><i class="fas fa-award"></i></div>
      <div><p>Tỉ lệ đạt (≥5đ)</p><h2 id="cAvg">—</h2></div>
    </div>
  </div>

  <div class="main-grid">
    <main>
      <div class="glass-card" style="margin-bottom:25px">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h3 style="font-size:1rem; display:flex; align-items:center; gap:10px">
            <i class="fas fa-folder-open" style="color:var(--primary)"></i> Danh sách đề thi
          </h3>
          <input type="text" id="searchInput" class="input-dark" style="width:250px" placeholder="Tìm tên đề thi..." oninput="filterTests()">
        </div>
        <div id="testList" class="item-list"></div>
      </div>

      <div class="glass-card">
        <h3 style="font-size:1rem; margin-bottom:20px; display:flex; align-items:center; gap:10px">
          <i class="fas fa-list-check" style="color:var(--secondary)"></i> Kết quả gần đây
        </h3>
        <div class="result-row" style="opacity:0.5; font-weight:800; font-size:0.7rem; letter-spacing:1px; border-bottom: 2px solid var(--border)">
          <span>THÍ SINH</span><span>ĐỀ THI</span><span>KẾT QUẢ</span>
        </div>
        <div id="resultList" class="item-list" style="max-height:350px"></div>
      </div>
    </main>

    <aside>
      <div class="glass-card" style="margin-bottom:25px; border-top: 4px solid var(--primary)">
        <h3 style="font-size:1rem; margin-bottom:18px">Khởi tạo đề mới</h3>
        <div style="display:flex; flex-direction:column; gap:12px">
          <input id="newName" class="input-dark" placeholder="Tên bài thi (Ví dụ: Kiểm tra 15')">
          <input id="newDesc" class="input-dark" placeholder="Mô tả bài thi">
          <div style="display:flex; align-items:center; gap:10px">
             <i class="fas fa-clock" style="opacity:0.5"></i>
             <input id="newDur" class="input-dark" type="number" placeholder="Phút" value="45">
          </div>
          <button class="btn btn-glow" style="width:100%; justify-content:center; padding:14px" onclick="addTest()">
            <i class="fas fa-plus"></i> TẠO BÀI THI NGAY
          </button>
        </div>
      </div>

      <div class="glass-card" style="margin-bottom:25px">
        <h3 style="font-size:1rem; margin-bottom:15px">Phân tích chất lượng</h3>
        <div style="height:220px"><canvas id="chartEl"></canvas></div>
      </div>

      <div class="glass-card" style="border-top: 4px solid var(--warning)">
        <h3 style="font-size:1rem; margin-bottom:18px; color:var(--warning)">Yêu cầu đăng ký</h3>
        <div id="pendingList" class="item-list" style="max-height:280px"></div>
      </div>
    </aside>
  </div>

  <footer style="text-align:center; margin-top:50px; opacity:0.2; font-size:0.7rem; letter-spacing:4px">
    NEBULA ECOSYSTEM &copy; 2026 • DESIGNED FOR PERFORMANCE
  </footer>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyWQYM84IUA98xAJdUjEFTjnyGdDvQyI2GcIyI0BTZC8kcG5YGr1C1FjphqAttK0qjU/exec";

let tests = [], results = [], pending = [], chartInst = null;

// Kiểm tra quyền Admin
if (localStorage.getItem("userRole") !== "admin") { 
    location.replace("index.html"); 
}

function logout() { 
    localStorage.clear(); 
    location.replace("index.html"); 
}

// Utils
function log(msg, type='ok') {
    const p = document.getElementById("debugPanel");
    const t = new Date().toLocaleTimeString();
    p.innerHTML += `<div class="dl-${type}">[${t}] ${msg}</div>`;
    p.scrollTop = p.scrollHeight;
}

function toggleDebug() {
    const p = document.getElementById("debugPanel");
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function setStatus(type, text) {
    const el = document.getElementById("apiStatus");
    el.className = `api-status ${type}`;
    el.innerHTML = `<span class="dot"></span> ${text}`;
}

// API Handlers
async function callAPI(action) {
    try {
        const resp = await fetch(`${API}?action=${action}`);
        const json = await resp.json();
        return json;
    } catch (e) {
        log(`Lỗi API ${action}: ` + e.message, 'err');
        return null;
    }
}

async function postAPI(params) {
    try {
        const query = new URLSearchParams(params).toString();
        const resp = await fetch(`${API}?${query}`);
        return await resp.json();
    } catch (e) {
        log("Lỗi gửi dữ liệu: " + e.message, 'err');
        return {status: "error"};
    }
}

// Data Loaders
async function loadData() {
    setStatus("loading", "Đang tải...");
    log("Bắt đầu đồng bộ dữ liệu...", "warn");

    document.getElementById("testList").innerHTML = Array(3).fill('<div class="skeleton"></div>').join('');
    document.getElementById("resultList").innerHTML = Array(3).fill('<div class="skeleton"></div>').join('');
    document.getElementById("pendingList").innerHTML = '<div class="skeleton"></div>';

    const [tData, rData, pData] = await Promise.all([
        callAPI("getTests"),
        callAPI("getResults"),
        callAPI("getPendingUsers")
    ]);

    if (tData) { tests = tData; renderTests(); }
    if (rData) { results = rData; renderResults(); }
    if (pData) { pending = pData; renderPending(); }

    document.getElementById("cTests").innerText = tests.length;
    document.getElementById("cResults").innerText = results.length;
    document.getElementById("cPending").innerText = pending.length;

    updateStats();
    setStatus("ok", "Trực tuyến");
}

function renderTests(data = tests) {
    const el = document.getElementById("testList");
    if(!data.length) { el.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.3">Trống</div>'; return; }
    
    el.innerHTML = data.map(t => `
        <div class="test-card animate__animated animate__fadeInUp">
            <div>
                <h4>${t.name}</h4>
                <p>Mã: ${t.id} • ${t.desc || 'Không có mô tả'}</p>
            </div>
            <div style="display:flex; gap:8px">
                <button class="btn btn-outline" onclick="goTo('add-question.html','${t.id}','${t.name}')" title="Thêm câu hỏi"><i class="fas fa-plus-circle"></i></button>
                <button class="btn btn-outline" onclick="goTo('question-list.html','${t.id}','${t.name}')" title="Quản lý"><i class="fas fa-tasks"></i></button>
                <button class="btn btn-outline" style="color:var(--danger)" onclick="deleteTest('${t.id}','${t.name}')"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    `).join('');
}

function renderResults() {
    const el = document.getElementById("resultList");
    if(!results.length) { el.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.3">Chưa có dữ liệu</div>'; return; }

    el.innerHTML = [...results].reverse().slice(0, 50).map(r => {
        const score = parseFloat(r.score || 0);
        const color = score >= 8 ? 'var(--secondary)' : (score >= 5 ? '#3b82f6' : 'var(--danger)');
        return `
            <div class="result-row">
                <div>
                    <div style="font-weight:600">${r.student || 'Ẩn danh'}</div>
                    <div style="font-size:0.65rem; opacity:0.4">${r.time || ''}</div>
                </div>
                <div style="opacity:0.7">${r.testName || 'Đề thi'}</div>
                <div style="font-weight:800; color:${color}">${score}đ <small style="font-weight:400; opacity:0.5; color:white">(${r.total || ''})</small></div>
            </div>
        `;
    }).join('');
}

function renderPending() {
    const el = document.getElementById("pendingList");
    if(!pending.length) { el.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.4; font-size:0.8rem">Không có yêu cầu mới</div>'; return; }

    el.innerHTML = pending.map(u => `
        <div class="user-card animate__animated animate__fadeInRight">
            <div style="min-width:0">
                <div style="font-weight:800; font-size:0.85rem">${u.name}</div>
                <div style="font-size:0.7rem; opacity:0.7">${u.username} | ${u.class || 'N/A'}</div>
            </div>
            <div style="display:flex; gap:5px">
                <button class="btn btn-glow" style="padding:6px 10px; background:var(--secondary)" onclick="handleUser('${u.username}','approve')"><i class="fas fa-check"></i></button>
                <button class="btn btn-outline" style="padding:6px 10px; color:var(--danger)" onclick="handleUser('${u.username}','reject')"><i class="fas fa-times"></i></button>
            </div>
        </div>
    `).join('');
}

function updateStats() {
    if(!results.length) return;
    const pass = results.filter(r => parseFloat(r.score) >= 5).length;
    document.getElementById("cAvg").innerText = Math.round((pass / results.length) * 100) + "%";
    
    // Chart
    const s = [0, 0, 0]; // Giỏi, Khá, Yếu
    results.forEach(r => {
        const val = parseFloat(r.score);
        if(val >= 8) s[0]++; else if(val >= 5) s[1]++; else s[2]++;
    });

    if(chartInst) chartInst.destroy();
    chartInst = new Chart(document.getElementById("chartEl"), {
        type: 'doughnut',
        data: {
            labels: ['Giỏi', 'Trung bình', 'Yếu'],
            datasets: [{
                data: s,
                backgroundColor: ['#10b981', '#3b82f6', '#ef4444'],
                borderWidth: 0
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 10 }, usePointStyle: true } } }
        }
    });
}

// Actions
async function addTest() {
    const name = document.getElementById("newName").value.trim();
    const desc = document.getElementById("newDesc").value.trim();
    const dur = document.getElementById("newDur").value;
    if(!name) return Swal.fire("Lỗi", "Vui lòng nhập tên đề", "error");

    Swal.fire({ title: 'Đang khởi tạo...', didOpen: () => Swal.showLoading() });
    const res = await postAPI({ action: "createTest", name, desc, duration: dur });
    if(res.status === "success") {
        Swal.fire({ icon: 'success', title: 'Thành công', timer: 1000 });
        loadData();
        document.getElementById("newName").value = "";
    }
}

async function deleteTest(id, name) {
    const r = await Swal.fire({
        title: 'Xóa đề thi?',
        text: `Bạn có chắc muốn xóa vĩnh viễn đề "${name}"?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444'
    });
    if(!r.isConfirmed) return;
    
    Swal.fire({ title: 'Đang xóa...', didOpen: () => Swal.showLoading() });
    await postAPI({ action: "deleteTest", testId: id });
    loadData();
}

async function handleUser(username, action) {
    const isApp = action === 'approve';
    Swal.fire({ title: 'Đang xử lý...', didOpen: () => Swal.showLoading() });
    await postAPI({ action: "handleUserRequest", username, status: isApp ? "approved" : "rejected" });
    Swal.fire({ icon: 'success', title: 'Xong!', timer: 800, showConfirmButton: false });
    loadData();
}

function filterTests() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    renderTests(tests.filter(t => t.name.toLowerCase().includes(q)));
}

function goTo(page, id, name) {
    localStorage.setItem("currentTest", JSON.stringify({ id, name }));
    location.href = page;
}

window.onload = loadData;
</script>
</body>
</html>

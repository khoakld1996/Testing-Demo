<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Quiz | Hệ Thống Chọn Bài Thi</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { 
      --primary: #4facfe; --secondary: #00f2fe; --accent: #00ffcc; 
      --glass: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.1); 
      --bg-dark: #0f172a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body { 
      min-height: 100vh; 
      background: #0f172a url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
      background-attachment: fixed;
      display: flex; justify-content: center; align-items: center; 
      color: white; padding: 20px; position: relative; overflow-x: hidden;
    }

    body::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.15), rgba(15, 23, 42, 0.95)); z-index: 0;
    }

    /* --- NAVIGATION --- */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; padding: 20px 40px;
      display: flex; justify-content: space-between; align-items: center; z-index: 100;
      backdrop-filter: blur(10px); background: rgba(15, 23, 42, 0.5);
      border-bottom: 1px solid var(--glass-border);
    }

    .brand { font-weight: 800; font-size: 1.4rem; letter-spacing: 1px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
    .brand span { color: #fff; font-weight: 300; }

    .user-profile { display: flex; align-items: center; gap: 15px; }
    .user-info-top { text-align: right; line-height: 1.2; }
    .user-name-top { display: block; font-weight: 700; color: var(--accent); font-size: 0.9rem; }
    .user-class-top { font-size: 0.75rem; opacity: 0.6; }

    .btn-logout {
      background: rgba(255, 71, 87, 0.15); border: 1px solid rgba(255, 71, 87, 0.3);
      color: #ff4757; width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: 0.3s;
    }
    .btn-logout:hover { background: #ff4757; color: white; transform: rotate(90deg); }

    /* --- MAIN CONTAINER --- */
    .container { position: relative; z-index: 10; width: 100%; max-width: 600px; margin-top: 80px; }

    .box { 
      background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border-radius: 35px; padding: 40px; border: 1px solid var(--glass-border); 
      box-shadow: 0 50px 100px rgba(0,0,0,0.5);
    }

    h2 { 
      font-size: 1.8rem; margin-bottom: 5px; font-weight: 800; text-align: center;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .welcome-text { text-align: center; color: rgba(255, 255, 255, 0.5); margin-bottom: 30px; font-size: 0.95rem; }

    /* --- SEARCH & FILTER --- */
    .filter-section { margin-bottom: 25px; }
    
    .search-bar { position: relative; margin-bottom: 15px; }
    .search-bar input {
      width: 100%; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border);
      padding: 14px 20px 14px 45px; border-radius: 18px; color: white; font-size: 0.95rem;
      outline: none; transition: 0.3s;
    }
    .search-bar input:focus { border-color: var(--primary); background: rgba(255,255,255,0.12); box-shadow: 0 0 20px rgba(79, 172, 254, 0.2); }
    .search-bar i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }

    /* --- TEST LIST --- */
    #testList { 
      display: flex; flex-direction: column; gap: 15px; 
      max-height: 400px; overflow-y: auto; padding-right: 5px;
    }
    #testList::-webkit-scrollbar { width: 5px; }
    #testList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .test-card { 
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
      padding: 20px; border-radius: 22px; cursor: pointer; 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      display: flex; justify-content: space-between; align-items: center;
      position: relative; overflow: hidden;
    }

    .test-card:hover { 
      background: rgba(255, 255, 255, 0.08); border-color: var(--primary);
      transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
    }

    .test-info { flex: 1; }
    .test-name { font-weight: 700; color: #fff; font-size: 1.1rem; display: block; margin-bottom: 6px; }
    .test-meta { display: flex; flex-wrap: wrap; gap: 15px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.5); }
    .test-meta span i { color: var(--primary); margin-right: 5px; }

    .play-btn {
      width: 45px; height: 45px; border-radius: 15px;
      background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
      transition: 0.3s; box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
    }

    .footer-actions { margin-top: 30px; text-align: center; }
    .btn-back { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.85rem; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-back:hover { color: var(--primary); }

    /* Skeleton Loading */
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 15px; height: 80px; margin-bottom: 15px; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

  <nav class="top-nav animate__animated animate__fadeInDown">
    <div class="brand"><i class="fas fa-meteor"></i> NEBULA <span>QUIZ</span></div>
    <div class="user-profile">
      <div class="user-info-top">
        <span class="user-name-top" id="topNavName">Đang tải...</span>
        <span class="user-class-top" id="topNavClass">Lớp: ...</span>
      </div>
      <button class="btn-logout" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </nav>

  <div class="container">
    <div class="box">
      <h2 class="animate__animated animate__fadeIn"><i class="fas fa-rocket"></i> HỆ THỐNG THI</h2>
      <p class="welcome-text" id="welcomeMsg">Đang kết nối Nebula Server...</p>

      <div class="filter-section">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Tìm tên đề thi..." oninput="renderTests()">
        </div>
      </div>

      <div id="testList">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>

      <div class="footer-actions">
        <a href="profile.html" class="btn-back"><i class="fas fa-arrow-left"></i> Hồ sơ cá nhân</a>
      </div>
    </div>
  </div>

  <script>
    // URL script của bạn
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWmPOYaxnzgxJG8sCuUvVvxRiWApSdArOq3bSBdI0BsRKOEAsUSCLP_VV6fCnQpE5r/exec";
    
    let allTests = [];

    // Khởi tạo thông tin người dùng từ localStorage
    function initUser() {
      const name = localStorage.getItem("studentName") || "Học sinh";
      const userClass = localStorage.getItem("studentClass") || "Tự do";
      document.getElementById("topNavName").innerText = name;
      document.getElementById("topNavClass").innerText = `Lớp: ${userClass}`;
      document.getElementById("welcomeMsg").innerHTML = `Sẵn sàng chưa <b>${name}</b>?`;
    }

    // Lấy danh sách bài thi từ AppScript (Hành động: getTests)
    async function fetchTests() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getTests`);
        allTests = await response.json();
        renderTests();
      } catch (err) {
        document.getElementById("testList").innerHTML = `<p style="text-align:center;color:#ff4757">Lỗi tải dữ liệu!</p>`;
      }
    }

    // Hiển thị danh sách (có lọc tìm kiếm)
    function renderTests() {
      const list = document.getElementById("testList");
      const search = document.getElementById("searchInput").value.toLowerCase();
      list.innerHTML = "";

      const filtered = allTests.filter(t => t.name.toLowerCase().includes(search));

      if (filtered.length === 0) {
        list.innerHTML = `<p style="text-align:center; opacity:0.5; padding:20px;">Không tìm thấy đề thi nào</p>`;
        return;
      }

      filtered.forEach((test, i) => {
        const card = document.createElement("div");
        card.className = "test-card animate__animated animate__fadeInUp";
        card.style.animationDelay = `${i * 0.1}s`;
        card.innerHTML = `
          <div class="test-info">
            <span class="test-name">${test.name}</span>
            <div class="test-meta">
              <span><i class="far fa-clock"></i> ${test.duration}p</span>
              <span><i class="fas fa-list-ol"></i> ${test.qCount} câu</span>
              <span><i class="fas fa-star"></i> Max: ${test.maxScore}đ</span>
            </div>
          </div>
          <div class="play-btn"><i class="fas fa-chevron-right"></i></div>
        `;
        card.onclick = () => confirmLaunch(test);
        list.appendChild(card);
      });
    }

    // Xác nhận vào thi
    function confirmLaunch(test) {
      if (test.qCount === 0) {
        Swal.fire({ icon: 'error', title: 'Lỗi', text: 'Đề thi này chưa có câu hỏi!', background: '#131c2f', color: '#fff' });
        return;
      }

      Swal.fire({
        title: 'BẮT ĐẦU THI?',
        html: `<div style="text-align:left; font-size:0.9rem; opacity:0.8">
                <p>Bài thi: <b>${test.name}</b></p>
                <p>Thời gian: <b>${test.duration} phút</b></p>
                <p>Số câu hỏi: <b>${test.qCount} câu</b></p>
               </div>`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'VÀO THI',
        cancelButtonText: 'HỦY',
        confirmButtonColor: '#4facfe',
        background: '#131c2f',
        color: '#fff'
      }).then((res) => {
        if (res.isConfirmed) {
          // Lưu thông tin bài thi hiện tại để trang Quiz sử dụng
          localStorage.setItem("currentTestId", test.id);
          localStorage.setItem("currentTestName", test.name);
          localStorage.setItem("currentTestDuration", test.duration);
          window.location.href = "quiz.html";
        }
      });
    }

    function handleLogout() {
      Swal.fire({
        title: 'Bạn muốn đăng xuất?',
        text: "Tất cả phiên làm việc sẽ bị kết thúc.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4757',
        confirmButtonText: 'ĐĂNG XUẤT',
        background: '#131c2f', color: '#fff'
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.clear();
          window.location.href = "login.html";
        }
      });
    }

    // Khởi chạy khi tải trang
   window.onload = () => {
      initUser();
      fetchTests();
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Chọn Bài Thi | Nebula Quiz</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <script src="script.js" defer></script>
</head>
<body class="sel-body">

<!-- ── Nav bar ── -->
<nav class="sel-nav">
  <a class="sel-brand" href="select.html">
    <svg viewBox="0 0 24 24"><path d="M19.07 4.93a1 1 0 0 0-1.41 0L4.93 17.66a1 1 0 1 0 1.41 1.41L19.07 6.34a1 1 0 0 0 0-1.41zM6.5 8C5.12 8 4 9.12 4 10.5S5.12 13 6.5 13 9 11.88 9 10.5 7.88 8 6.5 8zm11 5c-1.38 0-2.5 1.12-2.5 2.5S16.12 18 17.5 18 20 16.88 20 15.5 18.88 13 17.5 13z"/></svg>
    NEBULA <span>QUIZ</span>
  </a>
  <div class="sel-nav-links">
    <a class="sel-nav-link" href="history.html">
      <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      Lịch sử
    </a>
    <a class="sel-nav-link" href="battle.html">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      Thi đấu
    </a>
  </div>
  <div class="sel-user">
    <div class="sel-user-info">
      <span class="sel-user-name" id="selNavName">Học sinh</span>
      <span class="sel-user-class" id="selNavClass"></span>
    </div>
    <button class="sel-logout" title="Đăng xuất" onclick="_nbSelectLogout()">
      <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
    </button>
  </div>
</nav>

<!-- ── Welcome ── -->
<div class="sel-welcome" id="selWelcome">Đang tải...</div>

<!-- ── Search ── -->
<div class="sel-search-wrap">
  <div class="sel-search-box">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" id="selSearch" placeholder="Tìm bài thi..." oninput="window._nbRenderAll&&_nbRenderAll()">
  </div>
</div>

<!-- ── System tests ── -->
<section class="sel-section">
  <div class="sel-section-head">
    <div class="sel-section-title">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
      Bài Thi Hệ Thống
    </div>
    <span class="sel-count" id="selSysCount">0 đề</span>
  </div>
  <div id="selTestList">
    <div class="sel-skeleton"></div>
    <div class="sel-skeleton"></div>
    <div class="sel-skeleton"></div>
  </div>
</section>

<!-- ── iSpring ── -->
<section class="sel-section">
  <div class="sel-section-head">
    <div class="sel-section-title sel-isp-title">
      <svg viewBox="0 0 24 24"><path d="M12 2.5s4.5 2.04 4.5 10.5c0 2.49-1.04 5.57-1.6 7H9.1c-.56-1.43-1.6-4.51-1.6-7C7.5 4.54 12 2.5 12 2.5z"/></svg>
      Bài Thi iSpring
    </div>
    <span class="sel-count" id="selIspCount">0 bài</span>
  </div>
  <div id="selIspringList">
    <div class="sel-skeleton"></div>
    <div class="sel-skeleton"></div>
  </div>
</section>

<script>
  document.addEventListener('DOMContentLoaded', function(){
    if(typeof nbSelectInit === 'function') nbSelectInit();
  });
</script>
</body>
</html>

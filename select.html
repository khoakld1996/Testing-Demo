<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chọn bài thi | Quiz Online</title>
  <style>
    :root { --primary: #4facfe; --accent: #00ffcc; --glass: rgba(255, 255, 255, 0.1); --glass-border: rgba(255, 255, 255, 0.2); }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { min-height: 100vh; background: linear-gradient(135deg, #0f2027, #2c5364); display: flex; justify-content: center; align-items: center; color: white; padding: 20px; }
    .box { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; padding: 40px; border: 1px solid var(--glass-border); width: 100%; max-width: 500px; text-align: center; }
    .welcome-text { color: var(--accent); margin-bottom: 30px; font-weight: 500; }
    #testList { display: flex; flex-direction: column; gap: 15px; max-height: 350px; overflow-y: auto; padding: 5px; }
    .test-card { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; text-align: left; cursor: pointer; transition: 0.3s; }
    .test-card:hover { background: rgba(255, 255, 255, 0.15); border-color: var(--primary); transform: translateY(-2px); }
    .test-name { font-weight: bold; color: #fff; display: block; font-size: 1.1rem; }
    .q-count { font-size: 0.8rem; color: #4facfe; }
    .btn-back { margin-top: 25px; background: none; border: none; color: #aaa; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🎯 Chọn bài thi</h2>
    <p class="welcome-text" id="welcomeMsg">Chào mừng học sinh!</p>

    <div id="testList">
      <p>⏳ Đang tải danh sách bài thi...</p>
    </div>

    <button class="btn-back" onclick="window.location.href='name.html'">← Quay lại đổi thông tin</button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzFQUVCvqoyPZI2mv2Fmg5XoSCVLHL1yBejwwNKVb57AAI3yLFeTV8nD1DFi24rTtsb/exec"; 

    // Lấy thông tin đã lưu ở trang name.html
    const name = localStorage.getItem("studentName") || "Học sinh";
    const school = localStorage.getItem("schoolName") || "";
    document.getElementById("welcomeMsg").innerText = `Chào ${name} (${school}), chọn bài để bắt đầu!`;

    async function loadTests() {
      const listContainer = document.getElementById("testList");
      try {
        const response = await fetch(`${API_URL}?action=getTests`);
        const tests = await response.json();
        listContainer.innerHTML = "";
        
        if (tests.length === 0) {
          listContainer.innerHTML = "<p>Chưa có bài thi nào khả dụng.</p>";
          return;
        }

        tests.forEach(test => {
          const div = document.createElement("div");
          div.className = "test-card";
          div.innerHTML = `<span class="test-name">📘 ${test.name}</span><span class="q-count">${test.totalQuestions} câu hỏi</span>`;
          div.onclick = () => {
            localStorage.setItem("currentTestId", test.id);
            localStorage.setItem("currentTestName", test.name);
            window.location.href = "quiz.html";
          };
          listContainer.appendChild(div);
        });
      } catch (error) {
        listContainer.innerHTML = "❌ Lỗi kết nối API!";
      }
    }
    loadTests();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula | Chọn bài thi</title>
  
  <!-- Thư viện hỗ trợ -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { 
      --primary: #4facfe; 
      --secondary: #00f2fe;
      --accent: #00ffcc; 
      --glass: rgba(255, 255, 255, 0.08); 
      --glass-border: rgba(255, 255, 255, 0.12); 
      --bg-dark: #0f172a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

    body { 
      min-height: 100vh; 
      background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
      display: flex; justify-content: center; align-items: center; 
      color: white; padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.8));
      z-index: 0;
    }

    /* Top Navigation */
    .top-nav {
      position: absolute; top: 30px; left: 0; right: 0; padding: 0 40px;
      display: flex; justify-content: space-between; align-items: center; z-index: 100;
    }

    .brand { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

    .btn-logout {
      background: rgba(255, 71, 87, 0.1); border: 1px solid rgba(255, 71, 87, 0.2);
      color: #ff4757; padding: 10px 20px; border-radius: 14px; cursor: pointer;
      font-weight: 700; display: flex; align-items: center; gap: 10px; transition: 0.3s;
      backdrop-filter: blur(10px);
    }

    .btn-logout:hover {
      background: #ff4757; color: white; transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
    }

    /* Main Container */
    .container { position: relative; z-index: 10; width: 100%; max-width: 550px; }

    .box { 
      background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border-radius: 40px; padding: 50px 40px; border: 1px solid var(--glass-border); 
      text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h2 { 
      font-size: 2rem; margin-bottom: 8px; font-weight: 900;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; justify-content: center; gap: 15px;
    }

    .welcome-text { 
      color: rgba(255, 255, 255, 0.5); margin-bottom: 35px; font-size: 1rem;
    }

    .welcome-text b { color: var(--accent); }

    /* Test List Styling */
    #testList { 
      display: flex; flex-direction: column; gap: 15px; 
      max-height: 380px; overflow-y: auto; padding-right: 8px;
    }

    #testList::-webkit-scrollbar { width: 4px; }
    #testList::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    .test-card { 
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
      padding: 18px 22px; border-radius: 20px; text-align: left; cursor: pointer; 
      transition: all 0.3s ease;
      display: flex; justify-content: space-between; align-items: center;
      position: relative;
    }

    .test-card:hover { 
      background: rgba(255, 255, 255, 0.08); 
      border-color: var(--primary);
      transform: scale(1.02);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .test-info { display: flex; flex-direction: column; gap: 4px; }

    .test-name { 
      font-weight: 700; color: #fff; font-size: 1.15rem; 
    }

    .test-meta { display: flex; gap: 12px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); }
    .test-meta span { display: flex; align-items: center; gap: 5px; }

    .play-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(79, 172, 254, 0.1); color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      transition: 0.3s; font-size: 0.9rem;
    }

    .test-card:hover .play-icon { 
      background: var(--primary); color: white; 
      box-shadow: 0 0 15px var(--primary);
    }

    /* Footer buttons */
    .footer-actions { margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px; }

    .btn-back { 
      background: none; border: none; color: rgba(255,255,255,0.4); 
      cursor: pointer; font-size: 0.85rem; transition: 0.3s;
      display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
    }
    
    .btn-back:hover { color: var(--primary); }

    .loading-status { padding: 30px 0; color: var(--primary); }
  </style>
</head>
<body>

  <div class="top-nav animate__animated animate__fadeIn">
    <div class="brand">Nebula <span style="color:#fff"> Quiz</span></div>
    <button class="btn-logout" onclick="handleLogout()">
      <i class="fas fa-power-off"></i> Thoát
    </button>
  </div>

  <div class="container">
    <div class="box">
      <h2 class="animate__animated animate__fadeInDown">
        <i class="fas fa-rocket"></i> CHỌN BÀI THI
      </h2>
      <p class="welcome-text" id="welcomeMsg">Đang chuẩn bị hệ thống...</p>

      <div id="testList">
        <div class="loading-status">
          <i class="fas fa-spinner fa-spin fa-2x"></i>
          <p style="margin-top:10px; font-size: 0.9rem;">Đang tải danh sách bài thi...</p>
        </div>
      </div>

      <div class="footer-actions">
        <a href="name.html" class="btn-back">
          <i class="fas fa-chevron-left"></i> Quay lại thông tin cá nhân
        </a>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyf4LJfPW0pXSpegPOg03WxmtaebP6WnTwo3If2tLPr8NltxPyqd5LgtCtHgnq8Pxi4/exec"; 

    // Hiển thị lời chào từ localStorage
    const studentName = localStorage.getItem("studentName") || "Học sinh";
    document.getElementById("welcomeMsg").innerHTML = `Chào <b>${studentName}</b>, hãy chọn thử thách!`;

    async function fetchTests() {
      const listContainer = document.getElementById("testList");
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getTests`);
        const tests = await response.json();
        
        listContainer.innerHTML = "";
        
        if (!tests || tests.length === 0) {
          listContainer.innerHTML = `
            <div style="padding: 30px 0; opacity: 0.5;">
              <i class="fas fa-inbox fa-3x"></i>
              <p style="margin-top:10px">Hiện chưa có bài thi nào được mở.</p>
            </div>`;
          return;
        }

        tests.forEach((test, index) => {
          const card = document.createElement("div");
          card.className = `test-card animate__animated animate__fadeInUp`;
          card.style.animationDelay = `${index * 0.1}s`;
          
          card.innerHTML = `
            <div class="test-info">
              <span class="test-name">${test.name}</span>
              <div class="test-meta">
                <span><i class="far fa-clock"></i> ${test.duration || 45} phút</span>
                <span><i class="fas fa-star" style="color:#ffcc00"></i> Sẵn Sàng</span>
              </div>
            </div>
            <div class="play-icon">
              <i class="fas fa-play"></i>
            </div>
          `;

          card.onclick = () => confirmLaunch(test);
          listContainer.appendChild(card);
        });

      } catch (error) {
        listContainer.innerHTML = `<div style="color: #ff4757; padding: 30px 0;"><p>Lỗi kết nối máy chủ!</p></div>`;
      }
    }

    function confirmLaunch(test) {
      Swal.fire({
        title: 'Bắt đầu bài thi?',
        html: `
          <div style="text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; font-size: 0.95rem;">
            <p style="margin-bottom: 8px;"><i class="fas fa-file-signature" style="color:var(--primary)"></i> <b>Đề bài:</b> ${test.name}</p>
            <p style="margin-bottom: 8px;"><i class="fas fa-stopwatch" style="color:var(--primary)"></i> <b>Thời gian:</b> ${test.duration || 45} phút</p>
            <p style="color: #ff9f43; font-size: 0.85rem;"><i class="fas fa-exclamation-triangle"></i> <i>Lưu ý: Không tải lại trang sau khi bắt đầu.</i></p>
          </div>
        `,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#4facfe',
        cancelButtonColor: '#334155',
        confirmButtonText: 'BẮT ĐẦU NGAY',
        cancelButtonText: 'ĐỂ SAU',
        background: '#1e293b',
        color: '#fff',
        customClass: {
          popup: 'animate__animated animate__zoomIn'
        }
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.setItem("currentTestId", test.id);
          localStorage.setItem("currentTestName", test.name);
          localStorage.setItem("currentTestDuration", test.duration || 45);
          
          Swal.fire({
            title: 'ĐANG TẢI ĐỀ...',
            timer: 1000,
            showConfirmButton: false,
            background: '#1e293b',
            color: '#fff',
            didOpen: () => { Swal.showLoading(); }
          }).then(() => {
            window.location.href = "quiz.html";
          });
        }
      });
    }

    function handleLogout() {
      Swal.fire({
        title: 'Đăng xuất?',
        text: "Bạn sẽ thoát khỏi hệ thống Nebula.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4757',
        confirmButtonText: 'ĐĂNG XUẤT',
        background: '#1e293b',
        color: '#fff',
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.clear();
          window.location.href = "login.html";
        }
      });
    }

    // Khởi chạy khi trang load
    fetchTests();
  </script>
</body>
</html>

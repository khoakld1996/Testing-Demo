<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula | Chọn bài thi</title>
  
  <!-- Thư viện hỗ trợ -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { 
      --primary: #4facfe; 
      --secondary: #00f2fe;
      --accent: #00ffcc; 
      --glass: rgba(255, 255, 255, 0.08); 
      --glass-border: rgba(255, 255, 255, 0.12); 
      --bg-dark: #0f172a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

    body { 
      min-height: 100vh; 
      background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
      display: flex; justify-content: center; align-items: center; 
      color: white; padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.8));
      z-index: 0;
    }

    /* Header & Logout */
    .top-nav {
      position: absolute; top: 30px; left: 0; right: 0; padding: 0 40px;
      display: flex; justify-content: space-between; align-items: center; z-index: 100;
    }

    .brand { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

    .btn-logout {
      background: rgba(255, 71, 87, 0.15); border: 1px solid rgba(255, 71, 87, 0.3);
      color: #ff4757; padding: 10px 20px; border-radius: 14px; cursor: pointer;
      font-weight: 700; display: flex; align-items: center; gap: 10px; transition: 0.3s;
      backdrop-filter: blur(10px);
    }

    .btn-logout:hover {
      background: #ff4757; color: white; transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
    }

    /* Main Container */
    .container { position: relative; z-index: 10; width: 100%; max-width: 600px; }

    .box { 
      background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border-radius: 40px; padding: 50px 40px; border: 1px solid var(--glass-border); 
      text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h2 { 
      font-size: 2.2rem; margin-bottom: 10px; font-weight: 900;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; justify-content: center; gap: 15px;
    }

    .welcome-text { 
      color: rgba(255, 255, 255, 0.6); margin-bottom: 40px; font-size: 1rem;
      letter-spacing: 0.5px;
    }

    .welcome-text b { color: var(--accent); text-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }

    /* Test List Styling */
    #testList { 
      display: flex; flex-direction: column; gap: 20px; 
      max-height: 450px; overflow-y: auto; padding-right: 12px;
    }

    #testList::-webkit-scrollbar { width: 5px; }
    #testList::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    .test-card { 
      background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border); 
      padding: 25px; border-radius: 24px; text-align: left; cursor: pointer; 
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      display: flex; justify-content: space-between; align-items: center;
    }

    .test-card:hover { 
      background: rgba(255, 255, 255, 0.08); border-color: var(--accent); 
      transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0, 255, 204, 0.15);
    }

    .test-info { display: flex; flex-direction: column; gap: 8px; }

    .test-name { 
      font-weight: 700; color: #fff; font-size: 1.25rem; 
      display: flex; align-items: center; gap: 12px;
    }

    .test-meta { display: flex; gap: 15px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); }
    .test-meta span { display: flex; align-items: center; gap: 5px; }

    .start-btn {
      width: 50px; height: 50px; border-radius: 18px;
      background: rgba(0, 255, 204, 0.1); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; border: 1px solid rgba(0, 255, 204, 0.2);
      transition: 0.3s;
    }

    .test-card:hover .start-btn { background: var(--accent); color: #000; transform: rotate(15deg); }

    /* Footer buttons */
    .footer-actions { margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 25px; }

    .btn-back { 
      background: none; border: none; color: rgba(255,255,255,0.4); 
      cursor: pointer; font-size: 0.9rem; transition: 0.3s;
      display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
    }
    
    .btn-back:hover { color: var(--primary); }

    .loading-status { padding: 40px 0; color: var(--primary); }
  </style>
</head>
<body>

  <div class="top-nav animate__animated animate__fadeIn">
    <div class="brand">Nebula <span style="color:#fff"> Quiz</span></div>
    <button class="btn-logout" onclick="handleLogout()">
      <i class="fas fa-power-off"></i> Đăng xuất
    </button>
  </div>

  <div class="container">
    <div class="box">
      <h2><i class="fas fa-layer-group"></i> KHO BÀI THI</h2>
      <p class="welcome-text" id="welcomeMsg">Đang xác minh danh tính...</p>

      <div id="testList">
        <div class="loading-status">
          <i class="fas fa-spinner fa-spin fa-2x"></i>
          <p style="margin-top:15px; font-weight: 500;">Đang tải danh sách bài thi...</p>
        </div>
      </div>

      <div class="footer-actions">
        <a href="name.html" class="btn-back">
          <i class="fas fa-arrow-left"></i> Quay lại trang thông tin
        </a>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTvaNTz9Iz-2QXZ_R-Js36Bqf50J0vZUhVcdlSVvPtesmdODd0i4aF89SUnCtKkYqb/exec"; 

    // Kiểm tra đăng nhập
    const studentName = localStorage.getItem("studentName") || "Bạn học";
    document.getElementById("welcomeMsg").innerHTML = `Chào <b>${studentName}</b>, hãy chọn thử thách của bạn!`;

    async function fetchTests() {
      const listContainer = document.getElementById("testList");
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getTests`);
        const tests = await response.json();
        
        listContainer.innerHTML = "";
        
        if (!tests || tests.length === 0) {
          listContainer.innerHTML = `
            <div style="padding: 40px 0; opacity: 0.4;">
              <i class="fas fa-ghost fa-3x"></i>
              <p style="margin-top:15px">Hiện chưa có bài thi nào được mở.</p>
            </div>`;
          return;
        }

        tests.forEach((test, index) => {
          const card = document.createElement("div");
          card.className = `test-card animate__animated animate__fadeInUp`;
          card.style.animationDelay = `${index * 0.1}s`;
          
          card.innerHTML = `
            <div class="test-info">
              <span class="test-name"><i class="fas fa-file-alt" style="color:var(--primary)"></i> ${test.name}</span>
              <div class="test-meta">
                <span><i class="far fa-clock"></i> ${test.duration || 45} Phút</span>
                <span><i class="far fa-question-circle"></i> Sẵn sàng</span>
              </div>
            </div>
            <div class="start-btn">
              <i class="fas fa-chevron-right"></i>
            </div>
          `;

          card.onclick = () => launchQuiz(test);
          listContainer.appendChild(card);
        });

      } catch (error) {
        listContainer.innerHTML = `<div style="color: #ff4757; padding: 40px 0;"><p>Lỗi kết nối máy chủ Nebula!</p></div>`;
      }
    }

    function launchQuiz(test) {
      Swal.fire({
        title: 'Bắt đầu bài thi?',
        html: `<div style="text-align:left; font-size: 0.9rem; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px;">
                <p><b>Bài thi:</b> ${test.name}</p>
                <p><b>Thời gian:</b> ${test.duration || 45} phút</p>
                <p style="color:#ffcc00; margin-top:5px"><i>* Lưu ý: Không F5 khi đang làm bài.</i></p>
               </div>`,
        icon: 'info',
        showCancelButton: true,
        confirmButtonColor: '#4facfe',
        cancelButtonColor: '#334155',
        confirmButtonText: 'VÀO THI NGAY',
        cancelButtonText: 'ĐỂ SAU',
        background: '#1e293b',
        color: '#fff',
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.setItem("currentTestId", test.id);
          localStorage.setItem("currentTestName", test.name);
          localStorage.setItem("currentTestDuration", test.duration || 45);
          window.location.href = "quiz.html";
        }
      });
    }

    function handleLogout() {
      Swal.fire({
        title: 'Đăng xuất?',
        text: "Hệ thống sẽ xóa phiên làm việc hiện tại.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4757',
        confirmButtonText: 'ĐĂNG XUẤT',
        background: '#1e293b',
        color: '#fff',
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.clear();
          window.location.href = "login.html?role=student";
        }
      });
    }

    fetchTests();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác nhận thông tin | Nebula Quiz</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { 
      --primary: #4facfe; --secondary: #00f2fe; --accent: #00ffcc; 
      --glass: rgba(15, 23, 42, 0.7); --glass-border: rgba(255, 255, 255, 0.1); 
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    
    body { 
      min-height: 100vh; 
      background: #0f172a url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
      background-attachment: fixed;
      display: flex; justify-content: center; align-items: center; 
      color: white; padding: 20px; position: relative; overflow: hidden;
    }

    body::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.15), rgba(15, 23, 42, 0.95)); z-index: 0;
    }

    .container { position: relative; z-index: 10; width: 100%; max-width: 450px; }

    .box { 
      background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border-radius: 35px; padding: 45px 35px; border: 1px solid var(--glass-border); 
      box-shadow: 0 40px 100px rgba(0,0,0,0.5); text-align: center;
    }

    .icon-header {
      width: 70px; height: 70px; background: rgba(79, 172, 254, 0.15);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; border: 1px solid rgba(79, 172, 254, 0.3);
    }
    .icon-header i { font-size: 1.8rem; color: var(--accent); filter: drop-shadow(0 0 10px var(--primary)); }

    h2 { 
      font-size: 1.6rem; margin-bottom: 10px; font-weight: 800;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .sub-title { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 30px; }

    .input-group { text-align: left; margin-bottom: 20px; }
    
    label { 
      display: block; margin-bottom: 8px; font-size: 0.7rem; color: var(--primary); 
      font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-left: 10px;
    }
    
    .input-wrapper { position: relative; }
    
    .input-wrapper i {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: var(--primary); opacity: 0.7; font-size: 1rem;
    }

    input { 
      width: 100%; padding: 15px 20px 15px 50px; border-radius: 18px; 
      border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.05); 
      color: white; outline: none; font-size: 1rem; transition: 0.3s; 
    }
    
    input:focus { 
      border-color: var(--primary); background: rgba(255, 255, 255, 0.1); 
      box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
    }

    input[readonly] {
      background: rgba(0, 0, 0, 0.2); color: rgba(255,255,255,0.6);
      cursor: not-allowed; border-style: dashed;
    }

    .btn-next { 
      width: 100%; padding: 18px; border-radius: 18px; border: none; 
      background: linear-gradient(135deg, var(--primary), var(--secondary)); 
      color: #0f172a; font-weight: 800; font-size: 1.05rem; cursor: pointer; 
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    
    .btn-next:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 15px 30px rgba(79, 172, 254, 0.4); filter: brightness(1.1);
    }

    .btn-home {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 30px;
      background: none; border: none; color: rgba(255,255,255,0.4);
      cursor: pointer; text-decoration: none; font-size: 0.85rem; transition: 0.3s;
    }
    .btn-home:hover { color: #fff; }

    /* Skeleton Loading Effect */
    .loading-input {
      position: relative; overflow: hidden; background: rgba(255,255,255,0.08) !important;
    }
    .loading-input::after {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      animation: loading 1.5s infinite;
    }
    @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* SweetAlert Custom */
    .swal2-popup { background: #131c2f !important; color: #fff !important; border-radius: 25px !important; }
  </style>
</head>
<body>

  <div class="container">
    <div class="box animate__animated animate__zoomIn">
      <div class="icon-header">
        <i class="fas fa-id-card-alt"></i>
      </div>
      <h2>XÁC NHẬN HỒ SƠ</h2>
      <p class="sub-title">Kiểm tra thông tin trước khi bắt đầu bài thi</p>
      
      <div class="input-group">
        <label>Họ và tên thí sinh</label>
        <div class="input-wrapper">
          <i class="fas fa-user-circle"></i>
          <input type="text" id="username_display" placeholder="Đang truy xuất..." autocomplete="off">
        </div>
      </div>

      <div class="input-group">
        <label>Tên trường / Đơn vị</label>
        <div class="input-wrapper">
          <i class="fas fa-university"></i>
          <input type="text" id="school" placeholder="Đang tải..." autocomplete="off">
        </div>
      </div>

      <div class="input-group">
        <label>Lớp học</label>
        <div class="input-wrapper">
          <i class="fas fa-atom"></i>
          <input type="text" id="class_name" placeholder="Đang tải..." autocomplete="off">
        </div>
      </div>

      <button class="btn-next" id="btnContinue" onclick="startSelection()">
        VÀO HỆ THỐNG THI <i class="fas fa-rocket"></i>
      </button>

      <button class="btn-home" onclick="window.location.href='index.html'">
        <i class="fas fa-long-arrow-alt-left"></i> Quay lại trang chủ
      </button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAnLalxZL4W3fcKLrScY-xI4gv1Pez9oYRC5z7kueRQVXDGvuigJ-NbN45dJoBLQBg/exec"; 

    window.onload = async () => {
      // Ưu tiên lấy username từ localStorage (đã lưu ở login.html)
      const loggedInUser = localStorage.getItem("username") || localStorage.getItem("user"); 

      if (!loggedInUser) {
        Swal.fire({
            icon: 'error',
            title: 'Hết phiên làm việc',
            text: 'Vui lòng đăng nhập để tiếp tục.',
            background: '#131c2f', color: '#fff', confirmButtonColor: '#4facfe'
        }).then(() => { window.location.href = 'login.html'; });
        return;
      }

      const nameInput = document.getElementById("username_display");
      const schoolInput = document.getElementById("school");
      const classInput = document.getElementById("class_name");

      // Bật hiệu ứng loading
      [nameInput, schoolInput, classInput].forEach(el => el.classList.add("loading-input"));

      try {
        const response = await fetch(`${SCRIPT_URL}?action=getUserInfo&username=${encodeURIComponent(loggedInUser)}`);
        const data = await response.json();

        // Tắt hiệu ứng loading
        [nameInput, schoolInput, classInput].forEach(el => el.classList.remove("loading-input"));

        if (data.status === "success") {
          nameInput.value = data.name || "";
          schoolInput.value = data.school || "";
          classInput.value = data.class || ""; 
          
          // Cập nhật Cache
          localStorage.setItem("studentName", data.name);
          localStorage.setItem("schoolName", data.school);
          localStorage.setItem("className", data.class);

          // Nếu đã có dữ liệu từ hệ thống, khóa lại để tránh học sinh sửa nhầm
          if(data.name) nameInput.readOnly = true;
          if(data.school) schoolInput.readOnly = true;
          if(data.class) classInput.readOnly = true;

        } else {
          nameInput.placeholder = "Nhập họ tên...";
          schoolInput.placeholder = "Nhập tên trường...";
          classInput.placeholder = "Nhập lớp...";
          
          Swal.fire({
            title: 'Chào bạn mới!',
            text: 'Dữ liệu chưa có sẵn, vui lòng bổ sung thông tin cá nhân nhé.',
            icon: 'info', background: '#131c2f', color: '#fff'
          });
        }
      } catch (err) {
        [nameInput, schoolInput, classInput].forEach(el => el.classList.remove("loading-input"));
        nameInput.placeholder = "Lỗi kết nối máy chủ";
      }
    };

    function startSelection() {
      const name = document.getElementById("username_display").value.trim();
      const school = document.getElementById("school").value.trim();
      const className = document.getElementById("class_name").value.trim();

      if (!name || !school || !className) {
        Swal.fire({
          icon: 'warning',
          title: 'Thông tin chưa đủ',
          text: 'Vui lòng hoàn tất các trường thông tin còn trống.',
          background: '#131c2f', color: '#fff'
        });
        return;
      }

      // Lưu trữ dữ liệu cuối cùng
      localStorage.setItem("studentName", name);
      localStorage.setItem("schoolName", school);
      localStorage.setItem("className", className);
      
      // Hiệu ứng chuyển trang
      document.querySelector('.box').classList.add('animate__animated', 'animate__fadeOutUp');
      setTimeout(() => {
        window.location.href = "select.html";
      }, 500);
    }

    // Lắng nghe phím Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startSelection();
    });
  </script>
</body>
</html>

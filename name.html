<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác nhận thông tin | Quiz Online</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { 
      --primary: #4facfe; 
      --accent: #00ffcc; 
      --glass: rgba(255, 255, 255, 0.1); 
      --glass-border: rgba(255, 255, 255, 0.15); 
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    body { 
      min-height: 100vh; 
      background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
      display: flex; justify-content: center; align-items: center; 
      color: white; padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(15, 32, 39, 0.9), rgba(44, 83, 100, 0.8));
      z-index: 0;
    }

    .container { position: relative; z-index: 10; width: 100%; max-width: 420px; }

    .box { 
      background: var(--glass); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px; 
      padding: 35px; 
      border: 1px solid var(--glass-border); 
      text-align: center; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h2 { 
      margin-bottom: 25px; 
      background: linear-gradient(to right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.6rem;
      font-weight: 800;
    }

    .input-group { text-align: left; margin-bottom: 18px; }
    
    label { 
      display: block; 
      margin-bottom: 8px; 
      font-size: 0.75rem; 
      color: var(--primary); 
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .input-wrapper { position: relative; }
    
    .input-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
    }

    input { 
      width: 100%; 
      padding: 12px 15px 12px 45px; 
      border-radius: 12px; 
      border: 1px solid var(--glass-border); 
      background: rgba(0,0,0,0.3); 
      color: white; 
      outline: none; 
      font-size: 0.95rem;
      transition: all 0.3s; 
    }
    
    input:focus { 
      border-color: var(--primary); 
      background: rgba(0,0,0,0.5); 
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
    }

    input[readonly] {
      background: rgba(255, 255, 255, 0.05);
      color: #a0aec0;
      cursor: not-allowed;
      border-style: dashed;
    }

    .btn-next { 
      width: 100%; 
      padding: 16px; 
      border-radius: 12px; 
      border: none; 
      background: linear-gradient(135deg, #4facfe, #00f2fe); 
      color: #002f4b; 
      font-weight: 800; 
      font-size: 1rem; 
      cursor: pointer; 
      transition: 0.3s; 
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .btn-next:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4); 
    }

    .btn-home {
      display: inline-block;
      margin-top: 25px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      text-decoration: none;
      font-size: 0.8rem;
    }

    .loading-input {
      animation: pulse 1.5s infinite;
      border-color: var(--accent) !important;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box animate__animated animate__fadeIn">
      <h2><i class="fas fa-user-check"></i> XÁC NHẬN THÔNG TIN</h2>
      
      <div class="input-group">
        <label>Họ và tên thí sinh</label>
        <div class="input-wrapper">
          <i class="fas fa-user-edit"></i>
          <input type="text" id="username_display" placeholder="Đang truy xuất dữ liệu..." autocomplete="off">
        </div>
      </div>

      <div class="input-group">
        <label>Tên trường / Đơn vị</label>
        <div class="input-wrapper">
          <i class="fas fa-school"></i>
          <input type="text" id="school" placeholder="Đang tải trường..." autocomplete="off">
        </div>
      </div>

      <div class="input-group">
        <label>Lớp học</label>
        <div class="input-wrapper">
          <i class="fas fa-graduation-cap"></i>
          <input type="text" id="class_name" placeholder="Đang tải lớp..." autocomplete="off">
        </div>
      </div>

      <button class="btn-next" id="btnContinue" onclick="startSelection()">
        TIẾP TỤC CHỌN BÀI <i class="fas fa-chevron-right"></i>
      </button>

      <button class="btn-home" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Quay lại trang chủ
      </button>
    </div>
  </div>

  <script>
    // URL Web App của bạn
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWmPOYaxnzgxJG8sCuUvVvxRiWApSdArOq3bSBdI0BsRKOEAsUSCLP_VV6fCnQpE5r/exec"; 

    window.onload = async () => {
      // KIỂM TRA ĐỒNG BỘ: Hãy đảm bảo ở trang login.html bạn lưu bằng tên "username" hoặc "user"
      // Ở đây tôi kiểm tra cả 2 trường hợp cho chắc chắn
      const loggedInUser = localStorage.getItem("username") || localStorage.getItem("user"); 

      if (!loggedInUser) {
        Swal.fire({
            icon: 'error',
            title: 'Hết phiên làm việc',
            text: 'Vui lòng đăng nhập lại để hệ thống nhận diện.',
            confirmButtonColor: '#4facfe'
        }).then(() => { window.location.href = 'login.html'; });
        return;
      }

      const nameInput = document.getElementById("username_display");
      const schoolInput = document.getElementById("school");
      const classInput = document.getElementById("class_name");

      // Hiệu ứng chờ tải
      [nameInput, schoolInput, classInput].forEach(el => el.classList.add("loading-input"));

      try {
        // Gửi yêu cầu lấy dữ liệu từ Google Sheets dựa trên username
        const response = await fetch(`${SCRIPT_URL}?action=getUserInfo&username=${encodeURIComponent(loggedInUser)}`);
        const data = await response.json();

        [nameInput, schoolInput, classInput].forEach(el => el.classList.remove("loading-input"));

        if (data.status === "success") {
          // Điền dữ liệu lấy từ Google Sheets
          nameInput.value = data.name || "";
          schoolInput.value = data.school || "";
          classInput.value = data.class || ""; 
          
          // Lưu cache (Để các trang quiz sau lấy dùng nhanh, không cần gọi Sheets nữa)
          localStorage.setItem("studentName", data.name);
          localStorage.setItem("schoolName", data.school);
          localStorage.setItem("className", data.class);

          // Nếu đã có dữ liệu thì khóa lại không cho sửa (Tùy chọn)
          if(data.school) schoolInput.readOnly = true;
          if(data.class) classInput.readOnly = true;

          console.log("Kết nối Sheets thành công!");
        } else {
          // Nếu không thấy dữ liệu trong Sheets
          nameInput.placeholder = "Nhập họ tên của bạn";
          Swal.fire({
            title: 'Lưu ý',
            text: 'Không tìm thấy dữ liệu tự động trên Sheets. Vui lòng tự điền thông tin bên dưới.',
            icon: 'info'
          });
        }
      } catch (err) {
        console.error("Lỗi:", err);
        [nameInput, schoolInput, classInput].forEach(el => el.classList.remove("loading-input"));
        nameInput.placeholder = "Không thể kết nối máy chủ";
      }
    };

    function startSelection() {
      const name = document.getElementById("username_display").value.trim();
      const school = document.getElementById("school").value.trim();
      const className = document.getElementById("class_name").value.trim();

      if (!name || !school || !className) {
        Swal.fire('Thiếu thông tin', 'Vui lòng điền đầy đủ Họ tên, Trường và Lớp!', 'warning');
        return;
      }

      // Lưu lần cuối trước khi sang trang chọn bài
      localStorage.setItem("studentName", name);
      localStorage.setItem("schoolName", school);
      localStorage.setItem("className", className);
      
      window.location.href = "select.html";
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startSelection();
    });
  </script>
</body>
</html>

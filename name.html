<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác nhận thông tin | Quiz Online</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { 
      --primary: #4facfe; 
      --accent: #00ffcc; 
      --glass: rgba(255, 255, 255, 0.1); 
      --glass-border: rgba(255, 255, 255, 0.15); 
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    body { 
      min-height: 100vh; 
      background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
      display: flex; justify-content: center; align-items: center; 
      color: white; padding: 20px;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(15, 32, 39, 0.9), rgba(44, 83, 100, 0.8));
      z-index: 0;
    }

    .container { position: relative; z-index: 10; width: 100%; max-width: 420px; }

    .box { 
      background: var(--glass); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px; 
      padding: 35px; 
      border: 1px solid var(--glass-border); 
      text-align: center; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp { 
      from { opacity: 0; transform: translateY(30px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    h2 { 
      margin-bottom: 25px; 
      background: linear-gradient(to right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.6rem;
      font-weight: 800;
    }

    .input-group { text-align: left; margin-bottom: 18px; }
    
    label { 
      display: block; 
      margin-bottom: 8px; 
      font-size: 0.75rem; 
      color: var(--primary); 
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .input-wrapper { position: relative; }
    
    .input-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
    }

    input { 
      width: 100%; 
      padding: 12px 15px 12px 45px; 
      border-radius: 12px; 
      border: 1px solid var(--glass-border); 
      background: rgba(0,0,0,0.3); 
      color: white; 
      outline: none; 
      font-size: 0.95rem;
      transition: all 0.3s; 
    }
    
    input:focus { 
      border-color: var(--primary); 
      background: rgba(0,0,0,0.5); 
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
    }

    /* Style cho các ô chỉ đọc (Trường và Lớp) */
    input[readonly] {
      background: rgba(255, 255, 255, 0.05);
      color: #a0aec0;
      cursor: not-allowed;
      border-style: dashed;
      opacity: 0.8;
    }

    .btn-next { 
      width: 100%; 
      padding: 16px; 
      border-radius: 12px; 
      border: none; 
      background: linear-gradient(135deg, #4facfe, #00f2fe); 
      color: #002f4b; 
      font-weight: 800; 
      font-size: 1rem; 
      cursor: pointer; 
      transition: 0.3s; 
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .btn-next:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4); 
      filter: brightness(1.1);
    }

    .btn-home {
      display: inline-block;
      margin-top: 25px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      text-decoration: none;
      font-size: 0.8rem;
      transition: 0.3s;
    }
    .btn-home:hover { color: white; }
    
    .loading-input {
      opacity: 0.6;
      cursor: wait;
      border-color: var(--accent) !important;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box">
      <h2 class="animate__animated animate__lightSpeedInLeft">
        <i class="fas fa-user-check"></i> XÁC NHẬN THÔNG TIN
      </h2>
      
      <div class="input-group">
        <label>Họ và tên thí sinh</label>
        <div class="input-wrapper">
          <i class="fas fa-user-edit"></i>
          <input type="text" id="username_display" placeholder="Đang tải tên..." autocomplete="off">
        </div>
      </div>

      <div class="input-group">
        <label>Tên trường / Đơn vị</label>
        <div class="input-wrapper">
          <i class="fas fa-school"></i>
          <input type="text" id="school" placeholder="Đang tải trường..." autocomplete="off" readonly>
        </div>
      </div>

      <div class="input-group">
        <label>Lớp học</label>
        <div class="input-wrapper">
          <i class="fas fa-graduation-cap"></i>
          <input type="text" id="class_name" placeholder="Đang tải lớp..." autocomplete="off" readonly>
        </div>
      </div>

      <button class="btn-next" id="btnContinue" onclick="startSelection()">
        TIẾP TỤC CHỌN BÀI <i class="fas fa-chevron-right"></i>
      </button>

      <button class="btn-home" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Quay lại trang chủ
      </button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymrHeUnc8umtlHD_jxQbIi5st9Reua96bimU5rGr_xZDk6_3fTPSZ2XGQsH6Y6sumn/exec"; 

    window.onload = async () => {
      const loggedInUser = localStorage.getItem("username"); 

      if (!loggedInUser) {
        Swal.fire({
            icon: 'error',
            title: 'Chưa đăng nhập!',
            text: 'Vui lòng đăng nhập để tiếp tục.',
            confirmButtonColor: '#4facfe'
        }).then(() => { window.location.href = 'login.html'; });
        return;
      }

      const nameInput = document.getElementById("username_display");
      const schoolInput = document.getElementById("school");
      const classInput = document.getElementById("class_name");

      // Trạng thái chờ tải
      [nameInput, schoolInput, classInput].forEach(el => {
        el.value = "";
        el.classList.add("loading-input");
      });

      try {
        const response = await fetch(`${SCRIPT_URL}?action=getUserInfo&username=${encodeURIComponent(loggedInUser)}`);
        const data = await response.json();

        [nameInput, schoolInput, classInput].forEach(el => el.classList.remove("loading-input"));

        if (data.status === "success") {
          // Điền dữ liệu từ Sheet
          nameInput.value = data.name || "";
          schoolInput.value = data.school || "";
          classInput.value = data.class || ""; // Giả định Apps Script trả về trường 'class'
          
          // Lưu cache cho các trang sau
          localStorage.setItem("studentName", data.name);
          localStorage.setItem("schoolName", data.school);
          localStorage.setItem("className", data.class);

          // Khóa các trường thông tin cố định
          schoolInput.readOnly = !!data.school;
          classInput.readOnly = !!data.class;

        } else {
          nameInput.placeholder = "Không tìm thấy thông tin";
          schoolInput.readOnly = false;
          classInput.readOnly = false;
          Swal.fire("Lưu ý", "Không tìm thấy dữ liệu tự động, vui lòng tự điền thông tin.", "info");
        }
      } catch (err) {
        console.error("Lỗi kết nối:", err);
        nameInput.placeholder = "Lỗi máy chủ...";
      }
    };

    function startSelection() {
      const name = document.getElementById("username_display").value.trim();
      const school = document.getElementById("school").value.trim();
      const className = document.getElementById("class_name").value.trim();

      if (!name || !school || !className) {
        Swal.fire({
          icon: 'warning',
          title: 'Thiếu thông tin!',
          text: 'Vui lòng kiểm tra lại Họ tên, Trường và Lớp học.',
          confirmButtonColor: '#4facfe'
        });
        return;
      }

      // Lưu lại thông tin cuối cùng
      localStorage.setItem("studentName", name);
      localStorage.setItem("schoolName", school);
      localStorage.setItem("className", className);
      
      Swal.fire({
        title: 'Đang xử lý...',
        timer: 600,
        showConfirmButton: false,
        didOpen: () => { Swal.showLoading(); }
      }).then(() => {
        window.location.href = "select.html";
      });
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startSelection();
    });
  </script>
</body>
</html>

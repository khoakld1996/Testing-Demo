<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Làm Bài Thi | Nebula Quiz 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  
  <style>
    :root {
      --primary: #4facfe; --accent: #00ffcc; --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.95); --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                  url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
      background-size: cover; color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center;
    }

    .quiz-header {
      width: 100%; max-width: 1100px; background: var(--card); backdrop-filter: blur(20px);
      padding: 20px 30px; border-radius: 20px; display: flex; justify-content: space-between;
      align-items: center; border: 1px solid var(--glass-border); position: sticky; top: 10px; z-index: 100; margin-bottom: 25px;
    }
    #timer { font-size: 1.5rem; font-weight: 800; color: #ff4757; font-family: monospace; }

    .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 25px; width: 100%; max-width: 1100px; }
    @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

    .question-card {
      background: var(--card); border-radius: 25px; padding: 35px; border: 1px solid var(--glass-border);
      display: none; animation: fadeIn 0.4s ease; min-height: 550px; backdrop-filter: blur(15px);
    }
    .question-card.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .q-text { font-size: 1.3rem; margin-bottom: 25px; font-weight: 600; line-height: 1.6; color: #fff; }
    .q-image { 
      max-width: 100%; max-height: 280px; border-radius: 15px; 
      margin: 0 auto 25px auto; display: block; object-fit: contain;
      border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .drag-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .drag-item { 
      background: rgba(255, 255, 255, 0.05); 
      border: 1px solid var(--primary); 
      padding: 15px 20px; 
      border-radius: 12px; 
      cursor: grab; 
      color: #fff; 
      font-size: 1rem; 
      display: flex; 
      align-items: center; 
      gap: 15px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .drag-item:hover { background: rgba(79, 172, 254, 0.15); transform: translateX(5px); }
    .drag-item i { color: var(--primary); font-size: 1.1rem; opacity: 0.7; }
    .sortable-ghost { opacity: 0.3; background: var(--primary) !important; border-style: dashed; }
    .sortable-chosen { box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: var(--accent); }

    .matching-container { display: flex; flex-direction: column; gap: 15px; }
    .matching-row { display: grid; grid-template-columns: 0.8fr 1.2fr; gap: 20px; align-items: stretch; }
    .match-left { 
      background: linear-gradient(135deg, rgba(79, 172, 254, 0.15), rgba(0, 255, 204, 0.05)); 
      padding: 15px; border-radius: 12px; border: 1px solid rgba(79, 172, 254, 0.3);
      display: flex; align-items: center; justify-content: center;
      text-align: center; color: var(--accent); font-weight: 700;
    }
    .match-right-zone { 
      min-height: 65px; background: rgba(0,0,0,0.25); border: 2px dashed rgba(255,255,255,0.15); 
      border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 8px;
    }
    .match-pool { 
      display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; padding: 20px; 
      background: rgba(15, 23, 42, 0.5); border-radius: 20px; min-height: 100px; 
      border: 1px solid var(--glass-border); justify-content: center;
    }

    .options-grid { display: flex; flex-direction: column; gap: 12px; }
    .option-label {
      background: rgba(255,255,255,0.05); padding: 18px; border-radius: 15px; border: 2px solid transparent;
      cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; color: #cbd5e1;
    }
    .option-label:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }
    .selected-card { border-color: var(--accent) !important; background: rgba(0, 255, 204, 0.1) !important; color: #fff; }
    .option-label input { display: none; }

    .nav-panel { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--glass-border); position: sticky; top: 120px; }
    .q-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
    .q-num {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.08); border-radius: 10px; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
    }
    .q-num.done { background: var(--accent); color: #000; font-weight: bold; }
    .q-num.current { border: 2px solid #fff; }

    .ctrl-btns { display: flex; gap: 12px; width: 100%; max-width: 1100px; margin-top: 20px; }
    .btn { padding: 16px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; flex: 1; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
    .submit-btn { width: 100%; background: #ef4444; color: white; padding: 18px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; margin-top: 15px; }

    .input-fill {
      width: 100%; padding: 18px; border-radius: 12px; background: rgba(255,255,255,0.05);
      border: 2px solid var(--glass-border); color: #fff; font-size: 1.1rem; outline: none;
    }
    .input-fill:focus { border-color: var(--primary); }
  </style>
</head>
<body>

  <div class="quiz-header">
    <div>
      <h3 id="quizTitle" style="color:var(--accent);">Đang tải...</h3>
      <small id="studentInfo"></small>
    </div>
    <div id="timer">⏱️ 00:00</div>
  </div>

  <div class="main-layout">
    <div class="question-container">
      <div id="quizContent"></div>
      <div class="ctrl-btns">
        <button class="btn" id="prevBtn" style="background:rgba(255,255,255,0.1)" onclick="changeQuestion(-1)">
          <i class="fas fa-chevron-left"></i> TRƯỚC
        </button>
        <button class="btn" id="nextBtn" style="background:var(--primary)" onclick="handleNextClick()">
          TIẾP THEO <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>

    <div class="nav-panel">
      <div style="font-size:0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Tiến độ bài làm</div>
      <div class="q-grid" id="qGrid"></div>
      <button class="submit-btn" onclick="checkBeforeSubmit()">NỘP BÀI THI</button>
    </div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzAnLalxZL4W3fcKLrScY-xI4gv1Pez9oYRC5z7kueRQVXDGvuigJ-NbN45dJoBLQBg/exec"; 
  let questions = [], currentIdx = 0, timeLeft = 0, timerInterval;
  let isSubmitting = false; 

  function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  window.onload = async () => {
    const testId = localStorage.getItem("currentTestId");
    if (!testId) return location.href = "select.html";

    document.getElementById("studentInfo").innerText = 
      `${localStorage.getItem("studentName") || 'Thí sinh'} • ${localStorage.getItem("schoolName") || 'Tự do'}`;
    
    await loadQuestions(testId);
  };

  async function loadQuestions(testId) {
    try {
      const res = await fetch(`${API}?action=getQuestions&testId=${encodeURIComponent(testId)}`);
      const data = await res.json();

      if (!Array.isArray(data) || data.length === 0) {
        document.getElementById("quizContent").innerHTML = `<div style="text-align:center;padding:60px;color:#94a3b8">Bài thi chưa có câu hỏi!</div>`;
        return;
      }

      questions = data.map(q => {
        let details = { items: [] };
        try { 
          details = (typeof q.answer === 'string') ? JSON.parse(q.answer) : (q.answer || { items: [] }); 
        } catch (e) { details = { items: [] }; }
        return { 
          ...q, 
          details,
          correct: (q.correct || q.correctAnswer || "").toString().trim()
        };
      });

      timeLeft = (parseInt(data[0]?.testTime) || 20) * 60;
      document.getElementById("quizTitle").innerText = localStorage.getItem("currentTestName") || "Bài thi Nebula";
      renderQuiz();
      renderNavGrid();
      showQuestion(0);
      startTimer();
    } catch (e) { 
      console.error(e);
      Swal.fire("Lỗi", "Không thể tải dữ liệu câu hỏi!", "error"); 
    }
  }

  function renderQuiz() {
    const content = document.getElementById("quizContent");
    content.innerHTML = "";

    questions.forEach((q, idx) => {
      const card = document.createElement("div");
      card.className = "question-card";
      card.id = `qCard${idx}`;
      
      let html = `<div class="q-text"><b>Câu ${idx + 1}:</b> ${q.question}</div>`;
      if (q.image && q.image.length > 10) html += `<img src="${q.image}" class="q-image">`;
      html += `<div class="ans-box">`;

      const type = (q.type || "single").toLowerCase();
      const items = q.details?.items || [];

      if (type === "single" || type === "mcq" || type === "tf") {
        html += `<div class="options-grid">`;
        const opts = type === "tf" ? ["Đúng", "Sai"] : items.map(o => typeof o === 'object' ? o.text : o);
        opts.forEach(txt => {
          html += `<label class="option-label">
                    <input type="radio" name="ans${idx}" value="${txt.replace(/"/g,"&quot;")}" 
                      onchange="markAsDone(${idx}); updateUI(this);">
                    <span>${txt}</span>
                  </label>`;
        });
        html += `</div>`;
      }
      else if (type === "multiple") {
        html += `<div class="options-grid">`;
        items.forEach((opt) => {
          const txt = typeof opt === 'object' ? opt.text : opt;
          html += `<label class="option-label">
                    <input type="checkbox" name="chk${idx}" value="${txt.replace(/"/g,"&quot;")}" 
                      onchange="markAsDone(${idx}); this.parentElement.classList.toggle('selected-card', this.checked);">
                    <span>${txt}</span>
                  </label>`;
        });
        html += `</div>`;
      }
      else if (type === "matching") {
        html += `<div class="matching-container">`;
        items.forEach((item, i) => {
          html += `<div class="matching-row">
                    <div class="match-left">${item.left || ''}</div>
                    <div class="match-right-zone" id="zone_${idx}_${i}"></div>
                  </div>`;
        });
        html += `<div class="match-pool" id="pool${idx}">`;
        shuffle(items.map(it => it.right)).forEach(text => {
          html += `<div class="drag-item">${text}</div>`;
        });
        html += `</div></div>`;
      }
      else if (type === "ordering") {
        html += `<div class="drag-list" id="sortList${idx}">`;
        const orderItems = items.map(it => typeof it === 'object' ? it.text : it);
        shuffle(orderItems).forEach((item) => {
          html += `<div class="drag-item">
                    <i class="fas fa-grip-lines"></i> <span>${item}</span>
                  </div>`;
        });
        html += `</div>`;
      }
      else if (type === "fill") {
        html += `<input type="text" class="input-fill" id="fill${idx}" placeholder="Nhập đáp án..." oninput="if(this.value.trim()){markAsDone(${idx})}">`;
      }

      card.innerHTML = html + `</div>`;
      content.appendChild(card);
      setTimeout(() => initDragDrop(idx, type, items.length), 100);
    });
  }

  function initDragDrop(qIdx, type, count) {
    if (type === 'ordering') {
      const el = document.getElementById(`sortList${qIdx}`);
      if(el) new Sortable(el, { animation: 250, onEnd: () => markAsDone(qIdx) });
    } else if (type === 'matching') {
      const pool = document.getElementById(`pool${qIdx}`);
      if(!pool) return;
      new Sortable(pool, { group: `match${qIdx}`, animation: 150 });
      for(let i = 0; i < count; i++) {
        const zone = document.getElementById(`zone_${qIdx}_${i}`);
        if(zone) new Sortable(zone, {
          group: `match${qIdx}`, animation: 150,
          onAdd: (evt) => {
            if (zone.children.length > 1) pool.appendChild(evt.item === zone.children[0] ? zone.children[1] : zone.children[0]);
            markAsDone(qIdx);
          }
        });
      }
    }
  }

  function renderNavGrid() {
    const grid = document.getElementById("qGrid");
    grid.innerHTML = "";
    questions.forEach((_, i) => {
      const btn = document.createElement("div");
      btn.className = "q-num"; btn.id = `qNum${i}`; btn.innerText = i + 1;
      btn.onclick = () => showQuestion(i);
      grid.appendChild(btn);
    });
  }

  function showQuestion(index) {
    currentIdx = index;
    document.querySelectorAll(".question-card").forEach(c => c.classList.remove("active"));
    document.getElementById(`qCard${index}`).classList.add("active");
    document.querySelectorAll(".q-num").forEach(n => n.classList.remove("current"));
    document.getElementById(`qNum${index}`).classList.add("current");
    document.getElementById("prevBtn").style.visibility = (index === 0) ? "hidden" : "visible";
    const nxt = document.getElementById("nextBtn");
    nxt.innerHTML = (index === questions.length - 1) ? `HOÀN THÀNH <i class="fas fa-check-circle"></i>` : `TIẾP THEO <i class="fas fa-chevron-right"></i>`;
    nxt.style.background = (index === questions.length - 1) ? "var(--accent)" : "var(--primary)";
    nxt.style.color = (index === questions.length - 1) ? "#000" : "#fff";
  }

  function handleNextClick() {
    if (currentIdx === questions.length - 1) checkBeforeSubmit();
    else showQuestion(currentIdx + 1);
  }

  function changeQuestion(s) { if(questions[currentIdx + s]) showQuestion(currentIdx + s); }
  function markAsDone(i) { document.getElementById(`qNum${i}`)?.classList.add("done"); }
  function updateUI(input) {
    input.closest('.ans-box').querySelectorAll('.option-label').forEach(l => l.classList.remove('selected-card'));
    input.parentElement.classList.add('selected-card');
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      document.getElementById("timer").innerText = `⏱️ ${m}:${s < 10 ? '0' : ''}${s}`;
      if (timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(); }
      timeLeft--;
    }, 1000);
  }

  function checkBeforeSubmit() {
    const done = document.querySelectorAll(".q-num.done").length;
    Swal.fire({
      title: "Nộp bài?", text: `Hoàn thành ${done}/${questions.length} câu.`,
      icon: "question", showCancelButton: true, confirmButtonText: "Nộp bài"
    }).then(r => { if(r.isConfirmed) submitQuiz(); });
  }

  async function submitQuiz() {
    if (isSubmitting) return;
    isSubmitting = true;
    clearInterval(timerInterval);
    Swal.fire({ title: 'Đang chấm điểm...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    let scoreCount = 0;
    
    // Hàm chuẩn hóa chuỗi để so sánh chính xác
    const cleanStr = (s) => s ? s.toString().split('|').map(x => x.trim()).join('|').trim() : "";

    questions.forEach((q, i) => {
      let correct = false;
      const type = (q.type || "single").toLowerCase();
      const ansKey = cleanStr(q.correct);

      if (type === "single" || type === "mcq" || type === "tf") {
        const val = (document.querySelector(`input[name="ans${i}"]:checked`)?.value || "").trim();
        correct = (val !== "" && val === ansKey);
      } 
      else if (type === "multiple") {
        const val = Array.from(document.querySelectorAll(`input[name="chk${i}"]:checked`))
                          .map(el => el.value.trim()).sort().join("|");
        const exp = ansKey.split("|").sort().join("|");
        correct = (val !== "" && val === exp);
      }
      else if (type === "fill") {
        const val = (document.getElementById(`fill${i}`)?.value || "").trim().toLowerCase();
        correct = (val !== "" && val === ansKey.toLowerCase());
      } 
      else if (type === "ordering") {
        const val = Array.from(document.querySelectorAll(`#sortList${i} .drag-item span`))
                          .map(el => el.innerText.trim()).join("|");
        correct = (val !== "" && val === ansKey);
      } 
      else if (type === "matching") {
        const pairs = [];
        document.querySelectorAll(`[id^="zone_${i}_"]`).forEach(z => {
          const left = z.closest('.matching-row').querySelector('.match-left').innerText.trim();
          const right = z.firstElementChild?.innerText?.trim() || "";
          if(right) pairs.push(`${left}-${right}`);
        });
        const val = pairs.sort().join("|");
        const exp = ansKey.split("|").map(s => s.trim()).sort().join("|");
        correct = (val !== "" && val === exp);
      }

      if (correct) scoreCount++;
    });

    const totalQ = questions.length;
    const finalScore = totalQ > 0 ? ((scoreCount / totalQ) * 10).toFixed(1) : "0.0";
    
    const submitData = {
      action: "submitResult",
      student: localStorage.getItem("studentName") || "Ẩn danh",
      school: localStorage.getItem("schoolName") || "",
      testName: localStorage.getItem("currentTestName") || "",
      score: finalScore,
      total: `${scoreCount}/${totalQ}`
    };

    try {
      await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(submitData) });
      localStorage.setItem("lastScore", finalScore);
      localStorage.setItem("correctCount", submitData.total);
      localStorage.setItem("quiz_submitted", "true");
      window.location.replace("result.html");
    } catch (e) { 
      Swal.fire("Lỗi", "Gửi bài thất bại!", "error"); 
      isSubmitting = false;
    }
  }
</script>
</body>
</html>

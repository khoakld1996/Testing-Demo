<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Làm Bài Thi | Nebula Quiz 2026</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  
  <style>
    :root {
      --primary: #4facfe; --accent: #00ffcc; --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.85); --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                  url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
      background-size: cover; color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center;
    }

    .quiz-header {
      width: 100%; max-width: 1100px; background: var(--card); backdrop-filter: blur(20px);
      padding: 20px 30px; border-radius: 25px; display: flex; justify-content: space-between;
      align-items: center; border: 1px solid var(--glass-border); position: sticky; top: 10px; z-index: 100; margin-bottom: 25px;
    }
    #timer { font-size: 1.5rem; font-weight: 800; color: #ff4757; font-family: monospace; }

    .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 25px; width: 100%; max-width: 1100px; }
    @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

    .question-card {
      background: var(--card); border-radius: 30px; padding: 40px; border: 1px solid var(--glass-border);
      display: none; animation: fadeIn 0.4s ease; min-height: 450px; backdrop-filter: blur(15px);
    }
    .question-card.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .q-text { font-size: 1.4rem; margin-bottom: 20px; font-weight: 600; line-height: 1.5; color: #fff; }
    .q-image { max-width: 100%; border-radius: 15px; margin-bottom: 20px; display: block; max-height: 300px; object-fit: contain; margin: 0 auto 20px auto; border: 1px solid var(--glass-border); }

    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    .option-label {
      background: rgba(255,255,255,0.05); padding: 18px; border-radius: 15px; border: 2px solid transparent;
      cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; color: #cbd5e1;
    }
    .option-label:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }
    .option-label input { display: none; }
    .selected-card { border-color: var(--accent) !important; background: rgba(0, 255, 204, 0.1) !important; color: #fff; }
    
    .input-fill { width: 100%; padding: 18px; border-radius: 15px; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--glass-border); font-size: 1.1rem; outline: none; }
    
    .drag-item { 
      background: rgba(79, 172, 254, 0.15); border: 1px solid var(--primary); 
      padding: 15px; border-radius: 12px; cursor: grab; display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }

    .matching-row { display: flex; gap: 15px; margin-bottom: 12px; }
    .match-left { flex: 1; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid var(--glass-border); }
    .match-right-zone { flex: 1; min-height: 55px; background: rgba(0,0,0,0.2); border: 2px dashed rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .match-pool { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 25px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 20px; min-height: 60px; }

    .nav-panel { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid var(--glass-border); height: fit-content; }
    .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
    .q-num {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.08); border-radius: 10px; cursor: pointer; font-size: 0.9rem;
    }
    .q-num.done { background: var(--accent); color: #000; font-weight: bold; }
    .q-num.current { border: 2px solid #fff; }

    .ctrl-btns { display: flex; gap: 10px; width: 100%; max-width: 1100px; margin-top: 20px; }
    .btn { padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; flex: 1; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
    .submit-btn { width: 100%; background: #ef4444; color: white; padding: 18px; border-radius: 15px; border: none; cursor: pointer; font-weight: 800; margin-top: 15px; }
    .sortable-ghost { opacity: 0.3; background: var(--accent) !important; }
  </style>
</head>
<body>

  <div class="quiz-header">
    <div>
      <h3 id="quizTitle" style="color:var(--accent);">Đang tải...</h3>
      <small id="studentInfo"></small>
    </div>
    <div id="timer">⏱️ 00:00</div>
  </div>

  <div class="main-layout">
    <div class="question-container">
      <div id="quizContent"></div>
      <div class="ctrl-btns">
        <button class="btn" id="prevBtn" style="background:rgba(255,255,255,0.1)" onclick="changeQuestion(-1)">
          <i class="fas fa-arrow-left"></i> TRƯỚC
        </button>
        <button class="btn" id="nextBtn" style="background:var(--primary)" onclick="handleNextClick()">
          TIẾP THEO <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <div class="nav-panel">
      <div style="font-size:0.75rem; font-weight: bold; color: #94a3b8; text-transform: uppercase;">Tiến độ</div>
      <div class="q-grid" id="qGrid"></div>
      <button class="submit-btn" id="finalSubmitBtn" onclick="checkBeforeSubmit()">NỘP BÀI</button>
    </div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbyX7PCWMwmKw86Iv3fsGX8vwTMYOCovEupXgxbzKLP7kSwMIoiVOfiQ1c60IR3tc4Hr/exec"; 
  let questions = [], currentIdx = 0, timeLeft = 0, timerInterval;
  let isSubmitting = false; 

  function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  window.onload = async () => {
    const testId = localStorage.getItem("currentTestId") || localStorage.getItem("selectedQuiz");
    if (!testId) return location.href = "index.html";
    
    document.getElementById("studentInfo").innerText = `${localStorage.getItem("studentName") || 'Thí sinh'} • ${localStorage.getItem("schoolName") || 'Tự do'}`;
    await loadQuestions(testId);
  };

  async function loadQuestions(testId) {
    try {
      const res = await fetch(`${API}?action=getQuestions&testId=${encodeURIComponent(testId)}`);
      let data = await res.json();
      
      questions = data.map(q => {
        let details = {};
        try {
            // Xử lý nếu answer là chuỗi JSON hoặc object
            details = (typeof q.answer === 'string') ? JSON.parse(q.answer) : q.answer;
        } catch (e) {
            console.error("Lỗi parse JSON câu hỏi:", q);
            // Fallback nếu không phải JSON (trắc nghiệm đơn giản)
            details = { items: [] }; 
        }
        return { ...q, details };
      });

      timeLeft = (parseInt(data[0]?.testTime) || 20) * 60;
      document.getElementById("quizTitle").innerText = localStorage.getItem("currentTestName") || testId;
      
      renderQuiz();
      renderNavGrid();
      showQuestion(0);
      startTimer();
    } catch (e) {
      Swal.fire("Lỗi", "Không thể tải câu hỏi. Hãy kiểm tra lại Apps Script!", "error");
    }
  }

  function renderQuiz() {
    const content = document.getElementById("quizContent");
    content.innerHTML = "";

    questions.forEach((q, idx) => {
      const card = document.createElement("div");
      card.className = "question-card";
      card.id = `qCard${idx}`;
      
      let html = `<div class="q-text">Câu ${idx + 1}: ${q.question || "Nội dung trống"}</div>`;
      if (q.image) html += `<img src="${q.image}" class="q-image">`;
      html += `<div class="ans-box">`;

      const type = (q.type || "mcq").toLowerCase();

      if (type.startsWith("mcq")) {
        const isMulti = type === "mcq-multi";
        html += `<div class="options-grid">`;
        (q.details.items || []).forEach((opt, i) => {
          html += `<label class="option-label">
                    <input type="${isMulti ? 'checkbox' : 'radio'}" name="ans${idx}" value="${i}" 
                           onchange="markAsDone(${idx}); updateUI(this, ${isMulti});">
                    <span>${opt.text}</span>
                  </label>`;
        });
        html += `</div>`;
      } 
      else if (type === "tf") {
        html += `<div class="options-grid">`;
        ["Đúng", "Sai"].forEach(val => {
          html += `<label class="option-label">
                    <input type="radio" name="ans${idx}" value="${val}" onchange="markAsDone(${idx}); updateUI(this, false);">
                    <span>${val}</span>
                  </label>`;
        });
        html += `</div>`;
      } 
      else if (type === "fill") {
        html += `<input type="text" class="input-fill" id="fill${idx}" placeholder="Nhập đáp án..." oninput="if(this.value.trim()){markAsDone(${idx})}">`;
      }
      else if (type === "ordering") {
        html += `<div class="drag-list" id="sortList${idx}">`;
        shuffle(q.details.items || []).forEach((item) => {
          html += `<div class="drag-item" data-val="${item}"><i class="fas fa-grip-vertical"></i> ${item}</div>`;
        });
        html += `</div>`;
      }
      else if (type === "matching") {
        html += `<div class="matching-container">`;
        (q.details.items || []).forEach((item, i) => {
          html += `<div class="matching-row">
                    <div class="match-left">${item.left}</div>
                    <div class="match-right-zone" id="zone_${idx}_${i}"></div>
                  </div>`;
        });
        html += `<div class="match-pool" id="pool${idx}">`;
        shuffle((q.details.items || []).map(it => it.right)).forEach(text => {
          html += `<div class="drag-item" data-val="${text}">${text}</div>`;
        });
        html += `</div></div>`;
      }

      card.innerHTML = html + `</div>`;
      content.appendChild(card);
      setTimeout(() => initDragDrop(idx, type, q.details.items?.length), 100);
    });
  }

  function initDragDrop(qIdx, type, count) {
    if (type === 'ordering') {
        new Sortable(document.getElementById(`sortList${qIdx}`), {
            animation: 150, ghostClass: 'sortable-ghost', onEnd: () => markAsDone(qIdx)
        });
    } else if (type === 'matching') {
        const pool = document.getElementById(`pool${qIdx}`);
        new Sortable(pool, { group: `match${qIdx}`, animation: 150 });
        for(let i=0; i<count; i++) {
            const zone = document.getElementById(`zone_${qIdx}_${i}`);
            if(zone) new Sortable(zone, {
                group: `match${qIdx}`, animation: 150,
                onAdd: (evt) => {
                    if (zone.children.length > 1) pool.appendChild(evt.item === zone.children[0] ? zone.children[1] : zone.children[0]);
                    markAsDone(qIdx);
                }
            });
        }
    }
  }

  function renderNavGrid() {
    const grid = document.getElementById("qGrid");
    grid.innerHTML = "";
    questions.forEach((_, i) => {
      const btn = document.createElement("div");
      btn.className = "q-num"; btn.id = `qNum${i}`; btn.innerText = i + 1;
      btn.onclick = () => showQuestion(i);
      grid.appendChild(btn);
    });
  }

  function showQuestion(index) {
    if (index < 0 || index >= questions.length) return;
    currentIdx = index;
    document.querySelectorAll(".question-card").forEach(c => c.classList.remove("active"));
    document.getElementById(`qCard${index}`).classList.add("active");
    document.querySelectorAll(".q-num").forEach(n => n.classList.remove("current"));
    document.getElementById(`qNum${index}`).classList.add("current");

    document.getElementById("prevBtn").disabled = (index === 0);
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.innerHTML = (index === questions.length - 1) ? `NỘP BÀI <i class="fas fa-paper-plane"></i>` : `TIẾP THEO <i class="fas fa-arrow-right"></i>`;
    nextBtn.style.background = (index === questions.length - 1) ? "#ef4444" : "var(--primary)";
  }

  function handleNextClick() {
    if (currentIdx === questions.length - 1) checkBeforeSubmit();
    else showQuestion(currentIdx + 1);
  }

  function changeQuestion(s) { showQuestion(currentIdx + s); }
  
  function markAsDone(i) { 
    document.getElementById(`qNum${i}`)?.classList.add("done"); 
  }

  function updateUI(input, isMulti) {
    const parent = input.closest('.ans-box');
    if (!isMulti) parent.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected-card'));
    input.checked ? input.parentElement.classList.add('selected-card') : input.parentElement.classList.remove('selected-card');
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      document.getElementById("timer").innerText = `⏱️ ${m}:${s < 10 ? '0' : ''}${s}`;
      if (timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(); }
      timeLeft--;
    }, 1000);
  }

  function checkBeforeSubmit() {
    if (isSubmitting) return;
    const done = document.querySelectorAll(".q-num.done").length;
    Swal.fire({
      title: "Nộp bài?",
      text: done < questions.length ? `Bạn mới làm ${done}/${questions.length} câu. Vẫn nộp chứ?` : "Bạn đã làm xong tất cả!",
      icon: "warning",
      showCancelButton: true,
      confirmButtonText: "Nộp bài",
      confirmButtonColor: "#ef4444"
    }).then(r => { if(r.isConfirmed) submitQuiz(); });
  }

  async function submitQuiz() {
    if (isSubmitting) return;
    isSubmitting = true;
    clearInterval(timerInterval);
    Swal.fire({ title: 'Đang lưu kết quả...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    let scoreCount = 0;
    questions.forEach((q, i) => {
      let isCorrect = false;
      const type = q.type.toLowerCase();
      try {
        if (type.startsWith("mcq")) {
          const user = Array.from(document.querySelectorAll(`input[name="ans${i}"]:checked`)).map(el => parseInt(el.value));
          const correct = q.details.items.map((it, idx) => it.isCorrect ? idx : null).filter(v => v !== null);
          isCorrect = JSON.stringify(user.sort()) === JSON.stringify(correct.sort());
        } else if (type === "tf") {
          const user = document.querySelector(`input[name="ans${i}"]:checked`)?.value;
          isCorrect = (user === q.details.correct);
        } else if (type === "fill") {
          isCorrect = (document.getElementById(`fill${i}`).value.trim().toLowerCase() === q.details.correct.toLowerCase());
        } else if (type === "ordering") {
          const userVal = Array.from(document.getElementById(`sortList${i}`).children).map(el => el.dataset.val.trim()).join(",");
          const correctVal = q.details.items.map(it => it.trim()).join(",");
          isCorrect = (userVal === correctVal);
        } else if (type === "matching") {
          isCorrect = q.details.items.every((it, j) => {
            const zone = document.getElementById(`zone_${i}_${j}`);
            return zone?.children.length > 0 && zone.children[0].dataset.val.trim() === it.right.trim();
          });
        }
      } catch (e) { console.error("Lỗi chấm câu " + i, e); }
      if (isCorrect) scoreCount++;
    });

    const finalScore = ((scoreCount / questions.length) * 10).toFixed(1);
    const dataSubmit = {
      action: "submitResult",
      student: localStorage.getItem("studentName"),
      school: localStorage.getItem("schoolName"),
      testName: localStorage.getItem("currentTestName"),
      score: finalScore,
      total: `${scoreCount}/${questions.length}`
    };

    try {
      await fetch(API, { method: "POST", mode: "no-cors", body: JSON.stringify(dataSubmit) });
      localStorage.setItem("lastScore", finalScore);
      localStorage.setItem("correctCount", dataSubmit.total);
      window.location.replace("result.html");
    } catch (e) {
      Swal.fire("Lỗi", "Không thể lưu kết quả. Hãy chụp màn hình điểm số!", "error");
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Làm Bài Thi | Quiz Online</title>
  <style>
    :root {
      --primary: #4facfe; --accent: #00ffcc; --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      min-height: 100vh; background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white; padding: 20px; display: flex; flex-direction: column; align-items: center;
    }

    /* Header */
    .quiz-header {
      width: 100%; max-width: 900px; background: var(--card); backdrop-filter: blur(10px);
      padding: 15px 25px; border-radius: 15px; display: flex; justify-content: space-between;
      align-items: center; border: 1px solid var(--glass-border); position: sticky; top: 10px; z-index: 100; margin-bottom: 20px;
    }
    #timer { font-size: 1.2rem; font-weight: bold; color: #ff4757; }

    /* Layout chính */
    .main-layout {
      display: grid; grid-template-columns: 1fr 280px; gap: 20px;
      width: 100%; max-width: 1000px;
    }
    @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } }

    /* Vùng câu hỏi */
    .question-container { min-height: 400px; }
    .question-card {
      background: var(--card); border-radius: 20px; padding: 30px;
      border: 1px solid var(--glass-border); display: none; /* Ẩn mặc định */
      animation: slideIn 0.3s ease-out;
    }
    .question-card.active { display: block; }

    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    .q-text { font-size: 1.3rem; margin-bottom: 20px; font-weight: 600; }
    .q-image { max-width: 100%; border-radius: 12px; margin-bottom: 20px; max-height: 250px; display: block; margin-left: auto; margin-right: auto; }

    /* Đáp án */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    .option-label {
      background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;
      border: 2px solid transparent; cursor: pointer; transition: 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center;
    }
    .option-label:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }
    .option-label input { display: none; }
    .selected-card { border-color: var(--accent) !important; background: rgba(0, 255, 204, 0.1) !important; }
    .opt-img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }

    /* Điều hướng câu hỏi (Bên phải) */
    .nav-panel {
      background: var(--card); border-radius: 20px; padding: 20px;
      border: 1px solid var(--glass-border); height: fit-content;
    }
    .nav-title { font-size: 0.9rem; margin-bottom: 15px; color: var(--accent); font-weight: bold; text-transform: uppercase; }
    .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .q-num {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer;
      font-weight: bold; transition: 0.3s; font-size: 0.9rem;
    }
    .q-num:hover { background: var(--primary); }
    .q-num.done { background: #10b981; color: white; } /* Đã làm */
    .q-num.current { border: 2px solid var(--accent); box-shadow: 0 0 10px var(--accent); }

    /* Nút bấm */
    .ctrl-btns { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
    .btn {
      padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer;
      font-weight: bold; transition: 0.3s; flex: 1;
    }
    .btn-prev { background: rgba(255,255,255,0.1); color: white; }
    .btn-next { background: var(--primary); color: white; }
    .submit-btn {
      width: 100%; background: linear-gradient(to right, #ef4444, #f87171);
      color: white; padding: 15px; border-radius: 12px; margin-top: 20px;
      font-weight: bold; border: none; cursor: pointer;
    }

    .input-fill {
      width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.2); color: white; font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="quiz-header">
    <div>
      <h3 id="quizTitle">Đang tải...</h3>
      <small id="studentInfo">Đang tải học sinh...</small>
    </div>
    <div id="timer">⏱️ 00:00</div>
  </div>

  <div class="main-layout">
    <!-- Vùng câu hỏi bên trái -->
    <div class="question-container">
      <div id="quizContent">
         <p style="text-align:center">Đang tải câu hỏi...</p>
      </div>
      
      <div class="ctrl-btns">
        <button class="btn btn-prev" onclick="changeQuestion(-1)">⬅️ Câu trước</button>
        <button class="btn btn-next" onclick="changeQuestion(1)">Câu sau ➡️</button>
      </div>
    </div>

    <!-- Bảng số câu hỏi bên phải -->
    <div class="nav-panel">
      <div class="nav-title">Danh sách câu hỏi</div>
      <div class="q-grid" id="qGrid"></div>
      <button class="submit-btn" onclick="submitQuiz()">NỘP BÀI 🏁</button>
    </div>
  </div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzhfdXXw8LVl75r4JkxJSVPpz2p8GDp7NEMQdl7381Fa3xj3pIdcTWgHg2lEeNNHevb/exec";
  
  let questions = [];
  let currentIdx = 0; // Câu hỏi hiện tại
  let timeLeft = 15 * 60;
  let timerInterval;

  window.onload = async () => {
    const testId = localStorage.getItem("currentTestId");
    if (!testId) return location.href = "index.html";

    document.getElementById("quizTitle").innerText = localStorage.getItem("currentTestName") || "Bài thi";
    document.getElementById("studentInfo").innerText = "Học sinh: " + (localStorage.getItem("studentName") || "Khách");

    await loadQuestions(testId);
  };

  async function loadQuestions(testId) {
    try {
      const res = await fetch(`${API}?action=getQuestions&testId=${testId}`);
      const data = await res.json();
      questions = data.map(q => ({ ...q, details: JSON.parse(q.answer) }));
      
      renderQuiz();
      renderNavGrid();
      showQuestion(0);
      startTimer();
    } catch (e) {
      document.getElementById("quizContent").innerHTML = "❌ Lỗi tải câu hỏi!";
    }
  }

  function renderQuiz() {
    const content = document.getElementById("quizContent");
    content.innerHTML = "";

    questions.forEach((q, idx) => {
      const card = document.createElement("div");
      card.className = "question-card";
      card.id = `qCard${idx}`;

      let html = `<div class="q-text">Câu ${idx + 1}: ${q.question}</div>`;
      if (q.image) html += `<img src="${q.image}" class="q-image">`;

      const type = q.details.type;
      html += `<div class="ans-box">`;

      if (type === "mcq") {
        html += `<div class="options-grid">`;
        const isMulti = q.details.items.filter(x => x.isCorrect).length > 1;
        q.details.items.forEach((opt, i) => {
          html += `
            <label class="option-label">
              <input type="${isMulti ? 'checkbox' : 'radio'}" name="ans${idx}" value="${i}" onchange="markAsDone(${idx}); updateUI(this, ${isMulti})">
              ${opt.img ? `<img src="${opt.img}" class="opt-img">` : ""}
              <span>${opt.text}</span>
            </label>`;
        });
        html += `</div>`;
      } 
      else if (type === "tf") {
        html += `<div class="options-grid">
          <label class="option-label"><input type="radio" name="ans${idx}" value="Đúng" onchange="markAsDone(${idx}); updateUI(this, false)"> Đúng</label>
          <label class="option-label"><input type="radio" name="ans${idx}" value="Sai" onchange="markAsDone(${idx}); updateUI(this, false)"> Sai</label>
        </div>`;
      }
      else if (type === "fill") {
        html += `<input type="text" class="input-fill" id="fill${idx}" placeholder="Nhập đáp án..." oninput="markAsDone(${idx})">`;
      }

      card.innerHTML = html + `</div>`;
      content.appendChild(card);
    });
  }

  function renderNavGrid() {
    const grid = document.getElementById("qGrid");
    grid.innerHTML = "";
    questions.forEach((_, i) => {
      const btn = document.createElement("div");
      btn.className = "q-num";
      btn.id = `qNum${i}`;
      btn.innerText = i + 1;
      btn.onclick = () => showQuestion(i);
      grid.appendChild(btn);
    });
  }

  function showQuestion(index) {
    if (index < 0 || index >= questions.length) return;
    
    // Ẩn tất cả, hiện câu được chọn
    document.querySelectorAll(".question-card").forEach(c => c.classList.remove("active"));
    document.getElementById(`qCard${index}`).classList.add("active");

    // Cập nhật trạng thái lưới điều hướng
    document.querySelectorAll(".q-num").forEach(n => n.classList.remove("current"));
    document.getElementById(`qNum${index}`).classList.add("current");
    
    currentIdx = index;
  }

  function changeQuestion(step) {
    showQuestion(currentIdx + step);
  }

  function markAsDone(index) {
    document.getElementById(`qNum${index}`).classList.add("done");
  }

  function updateUI(input, isMulti) {
    const parent = input.closest('.options-grid');
    if (!isMulti) parent.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected-card'));
    input.checked ? input.parentElement.classList.add('selected-card') : input.parentElement.classList.remove('selected-card');
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
      document.getElementById("timer").innerText = `⏱️ ${m}:${s < 10 ? '0' : ''}${s}`;
      if (timeLeft-- <= 0) { clearInterval(timerInterval); submitQuiz(); }
    }, 1000);
  }

  async function submitQuiz() {
    if(!confirm("Bạn có muốn nộp bài không?")) return;
    clearInterval(timerInterval);
    
    let score = 0;
    questions.forEach((q, i) => {
      const type = q.details.type;
      let isRight = false;
      if (type === "mcq") {
        const sel = Array.from(document.querySelectorAll(`input[name="ans${i}"]:checked`)).map(el => parseInt(el.value));
        const cor = q.details.items.map((it, idx) => it.isCorrect ? idx : null).filter(idx => idx !== null);
        isRight = JSON.stringify(sel.sort()) === JSON.stringify(cor.sort());
      } else if (type === "tf") {
        const sel = document.querySelector(`input[name="ans${i}"]:checked`)?.value;
        isRight = (sel === q.details.correct);
      } else if (type === "fill") {
        const val = document.getElementById(`fill${i}`).value.trim().toLowerCase();
        isRight = q.details.items.some(k => val === k.toLowerCase());
      }
      if (isRight) score++;
    });

    const final = ((score / questions.length) * 10).toFixed(1);
    
    // Gửi API (ẩn danh POST)
    try {
        await fetch(API, {
          method: "POST", mode: "no-cors",
          body: JSON.stringify({
            action: "submitResult",
            studentName: localStorage.getItem("studentName"),
            testName: localStorage.getItem("currentTestName"),
            score: final,
            details: `${score}/${questions.length}`
          })
        });
    } catch(e) {}

    alert(`Hoàn thành! Đúng ${score}/${questions.length} câu. Điểm: ${final}`);
    localStorage.setItem("lastScore", final);
    window.location.href = "result.html";
  }

  function startTimer() { /* Giữ nguyên hàm của bạn */ }

    // 4. Đồng hồ đếm ngược
    function startTimer() {
      timerInterval = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById("timer").innerText = `⏱️ ${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert("Hết giờ làm bài! Hệ thống sẽ tự động nộp.");
          submitQuiz();
        }
        timeLeft--;
      }, 1000);
    }

    // 5. Xử lý nộp bài
    async function submitQuiz() {
      clearInterval(timerInterval);
      const studentName = localStorage.getItem("studentName");
      const testName = localStorage.getItem("currentTestName");
      
      let score = 0;
      const userAnswers = [];

      questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const ansValue = selected ? selected.value : "";
        userAnswers.push(ansValue);
        
        if (ansValue === q.correctAnswer) {
          score++;
        }
      });

      const finalScore = ((score / questions.length) * 10).toFixed(2);
      
      // Gửi kết quả về Google Sheets
      const resultData = {
        action: "submitResult",
        studentName: studentName,
        testName: testName,
        score: finalScore,
        details: `${score}/${questions.length}`
      };

      try {
        await fetch(API, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(resultData)
        });
        
        // Lưu kết quả để hiển thị trang Result
        localStorage.setItem("lastScore", finalScore);
        localStorage.setItem("correctCount", `${score}/${questions.length}`);
        window.location.href = "result.html";
      } catch (err) {
        alert("Lỗi nộp bài, vui lòng báo giáo viên!");
      }
    }
  </script>
</body>
</html>
